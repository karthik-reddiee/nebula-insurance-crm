        asOf:
          type: string
          format: date
        assignment:
          allOf:
            - $ref: "#/components/schemas/TerritoryAssignment"
          nullable: true

    # ── Contact Schemas ─────────────────────────────────────────
    Contact:
      type: object
      description: Contact record. If parent broker Status=Inactive, email and phone are returned as null (masking sentinel).
      required:
        - id
        - fullName
        - email
        - phone
      properties:
        id:
          type: string
          format: uuid
        brokerId:
          type: string
          format: uuid
        accountId:
          type: string
          format: uuid
          nullable: true
        fullName:
          type: string
        email:
          type: string
          format: email
          nullable: true
          description: >
            Returned as null when parent broker Status=Inactive (masking sentinel).
            Consumers must treat null on an inactive broker's contact as "masked", not "missing".
        phone:
          type: string
          pattern: "^\\+?[1-9]\\d{7,14}$"
          nullable: true
          description: >
            Returned as null when parent broker Status=Inactive (masking sentinel).
            Consumers must treat null on an inactive broker's contact as "masked", not "missing".
        role:
          type: string

    ContactCreateRequest:
      type: object
      description: Payload to create a contact.
      required:
        - brokerId
        - fullName
        - email
        - phone
      properties:
        brokerId:
          type: string
          format: uuid
        fullName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          pattern: "^\\+?[1-9]\\d{7,14}$"
        role:
          type: string

    ContactUpdateRequest:
      type: object
      description: Payload to update a contact.
      required:
        - fullName
        - email
        - phone
      properties:
        fullName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        role:
          type: string

    PaginatedContactList:
      type: object
      description: Paginated list of contacts.
      required:
        - data
        - page
        - pageSize
        - totalCount
        - totalPages
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Contact"
        page:
          type: integer
        pageSize:
          type: integer
        totalCount:
          type: integer
        totalPages:
          type: integer

    # ── Account / MGA / Program Schemas ─────────────────────────
    # ── Account Schemas (F0016 — Account 360 & Insured Management) ──
    Account:
      type: object
      description: |
        Insured account. Tombstone-aware: Merged accounts include `survivorAccountId`;
        Deleted accounts return 410 Gone from GET and are not represented by this
        schema. See ADR-017.
      required:
        - id
        - displayName
        - stableDisplayName
        - status
        - rowVersion
        - createdAt
        - updatedAt
      properties:
        id: { type: string, format: uuid }
        displayName: { type: string, maxLength: 200 }
        stableDisplayName:
          type: string
          maxLength: 200
          description: Snapshot used by the dependent-view fallback contract (ADR-017). Frozen when status ∈ {Merged, Deleted}.
        legalName: { type: string, nullable: true, maxLength: 200 }
        taxId: { type: string, nullable: true, maxLength: 50 }
        industry: { type: string, nullable: true, maxLength: 100 }
        primaryLineOfBusiness: { type: string, nullable: true, maxLength: 50 }
        status:
          type: string
          enum: [Active, Inactive, Merged, Deleted]
        brokerOfRecordId: { type: string, format: uuid, nullable: true }
        brokerOfRecordName: { type: string, nullable: true }
        primaryProducerUserId: { type: string, format: uuid, nullable: true }
        primaryProducerDisplayName: { type: string, nullable: true }
        territoryCode: { type: string, nullable: true, maxLength: 50 }
        region: { type: string, nullable: true, maxLength: 50 }
        address1: { type: string, nullable: true }
        address2: { type: string, nullable: true }
        city: { type: string, nullable: true }
        state: { type: string, nullable: true }
        postalCode: { type: string, nullable: true }
        country: { type: string, nullable: true }
        mergedIntoAccountId:
          type: string
          format: uuid
          nullable: true
          description: Survivor account id when status=Merged.
        survivorAccountId:
          type: string
          format: uuid
          nullable: true
          description: Alias for mergedIntoAccountId on merged reads; present for client convenience.
        deleteReasonCode: { type: string, nullable: true }
        deleteReasonDetail: { type: string, nullable: true, maxLength: 500 }
        removedAt: { type: string, format: date-time, nullable: true }
        rowVersion: { type: string }
        createdAt: { type: string, format: date-time }
        createdByUserId: { type: string, format: uuid, nullable: true }
        updatedAt: { type: string, format: date-time }
        updatedByUserId: { type: string, format: uuid, nullable: true }

    AccountListItem:
      type: object
      description: Row returned by GET /accounts.
      required: [id, displayName, status, rowVersion]
      properties:
        id: { type: string, format: uuid }
        displayName: { type: string }
        legalName: { type: string, nullable: true }
        taxId: { type: string, nullable: true }
        status:
          type: string
          enum: [Active, Inactive, Merged, Deleted]
        brokerOfRecordId: { type: string, format: uuid, nullable: true }
        brokerOfRecordName: { type: string, nullable: true }
        territoryCode: { type: string, nullable: true }
        region: { type: string, nullable: true }
        primaryLineOfBusiness: { type: string, nullable: true }
        lastActivityAt: { type: string, format: date-time, nullable: true }
        activePolicyCount: { type: integer, nullable: true, description: "Present when include=summary" }
        openSubmissionCount: { type: integer, nullable: true, description: "Present when include=summary" }
        renewalDueCount: { type: integer, nullable: true, description: "Present when include=summary" }
        rowVersion: { type: string }

    AccountSummary:
      type: object
      description: Account 360 overview payload.
      required: [id, displayName, status, activePolicyCount, openSubmissionCount, renewalDueCount]
      properties:
        id: { type: string, format: uuid }
        displayName: { type: string }
        status:
          type: string
          enum: [Active, Inactive, Merged, Deleted]
        brokerOfRecordName: { type: string, nullable: true }
        primaryProducerDisplayName: { type: string, nullable: true }
        territoryCode: { type: string, nullable: true }
        region: { type: string, nullable: true }
        activePolicyCount: { type: integer }
        openSubmissionCount: { type: integer }
        renewalDueCount: { type: integer }
        lastActivityAt: { type: string, format: date-time, nullable: true }
        rowVersion: { type: string }

    AccountCreateRequest:
      type: object
      description: Request body for POST /accounts.
      required: [displayName]
      properties:
        displayName: { type: string, maxLength: 200 }
        legalName: { type: string, nullable: true, maxLength: 200 }
        taxId: { type: string, nullable: true, maxLength: 50 }
        industry: { type: string, nullable: true, maxLength: 100 }
        primaryLineOfBusiness: { type: string, nullable: true, maxLength: 50 }
        brokerOfRecordId: { type: string, format: uuid, nullable: true }
        primaryProducerUserId: { type: string, format: uuid, nullable: true }
        territoryCode: { type: string, nullable: true, maxLength: 50 }
        region: { type: string, nullable: true, maxLength: 50 }
        address1: { type: string, nullable: true }
        address2: { type: string, nullable: true }
        city: { type: string, nullable: true }
        state: { type: string, nullable: true }
        postalCode: { type: string, nullable: true }
        country: { type: string, nullable: true }
        linkFromSubmissionId:
          type: string
          format: uuid
          nullable: true
          description: Convenience link — attach this new account to an existing submission on commit.
        linkFromPolicyId:
          type: string
          format: uuid
          nullable: true
          description: Convenience link — attach this new account to an existing policy on commit.

    AccountUpdateRequest:
      type: object
      description: Request body for PUT /accounts/{accountId}. Requires If-Match.
      properties:
        displayName: { type: string, maxLength: 200 }
        legalName: { type: string, nullable: true, maxLength: 200 }
        taxId: { type: string, nullable: true, maxLength: 50 }
        industry: { type: string, nullable: true, maxLength: 100 }
        primaryLineOfBusiness: { type: string, nullable: true, maxLength: 50 }
        territoryCode: { type: string, nullable: true, maxLength: 50 }
        region: { type: string, nullable: true, maxLength: 50 }
        address1: { type: string, nullable: true }
        address2: { type: string, nullable: true }
        city: { type: string, nullable: true }
        state: { type: string, nullable: true }
        postalCode: { type: string, nullable: true }
        country: { type: string, nullable: true }

    AccountLifecycleRequest:
      type: object
      description: Body for POST /accounts/{accountId}/lifecycle (deactivate / reactivate / delete).
      required: [toState]
      properties:
        toState:
          type: string
          enum: [Active, Inactive, Deleted]
        reasonCode:
          type: string
          nullable: true
          enum: [DuplicateOfAnother, InvalidOrTestRecord, ReplacedByExternalSystem, RequestedByInsured, Other, null]
          description: Required when toState=Deleted.
        reasonDetail:
          type: string
          nullable: true
          maxLength: 500
          description: Required when reasonCode=Other; optional otherwise.

    AccountMergeRequest:
      type: object
      description: Body for POST /accounts/{accountId}/merge. Source is the {accountId}; survivor is in the body.
      required: [survivorAccountId]
      properties:
        survivorAccountId:
          type: string
          format: uuid
        notes:
          type: string
          nullable: true
          maxLength: 500

    AccountContact:
      type: object
      required: [id, accountId, fullName, isPrimary, rowVersion]
      properties:
        id: { type: string, format: uuid }
        accountId: { type: string, format: uuid }
        fullName: { type: string, maxLength: 200 }
        role: { type: string, nullable: true, maxLength: 100 }
        email: { type: string, format: email, nullable: true, maxLength: 200 }
        phone: { type: string, nullable: true, maxLength: 50 }
        isPrimary: { type: boolean }
        rowVersion: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    AccountContactRequest:
      type: object
      required: [fullName]
      properties:
        fullName: { type: string, maxLength: 200 }
        role: { type: string, nullable: true, maxLength: 100 }
        email: { type: string, format: email, nullable: true, maxLength: 200 }
        phone: { type: string, nullable: true, maxLength: 50 }
        isPrimary: { type: boolean, default: false }

    AccountRelationshipRequest:
      type: object
      description: Body for POST /accounts/{accountId}/relationships — broker-of-record / producer / territory change.
      required: [relationshipType, newValue]
      properties:
        relationshipType:
          type: string
          enum: [BrokerOfRecord, PrimaryProducer, Territory]
        newValue:
          type: string
          description: Broker id (uuid) / user id (uuid) / territory code depending on relationshipType.
        notes:
          type: string
          nullable: true
          maxLength: 500

    MGA:
      type: object
      description: MGA profile.
      required:
        - id
        - name
        - status
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string

    Program:
      type: object
      description: Insurance program profile.
      required:
        - id
        - name
        - mgaId
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        mgaId:
          type: string
          format: uuid

    # ── Dynamic LOB Attribute Schemas (F0034) ───────────────────
    LobStage:
      type: string
      enum: [submission, policy, endorsement, renewal]

    LobProductKind:
      type: string
      enum: [Standard, Unspecified, Legacy, Bridge]

    LobProductVersionStatus:
      type: string
      enum: [Draft, Active, Deprecated, Retired, Internal]

    LobAttributeEnvelope:
      type: object
      description: |
        Schema-pinned dynamic product attribute envelope. Runtime validation
        dispatches by lobProductVersionId; OpenAPI describes the envelope only.
      required:
        - lobProductVersionId
        - attributes
      properties:
        lobProductVersionId:
          type: string
          format: uuid
        lobProductId:
          type: string
          format: uuid
          nullable: true
        lobProductCode:
          type: string
          nullable: true
        lobProductVersionStatus:
          allOf:
            - $ref: "#/components/schemas/LobProductVersionStatus"
          nullable: true
        lobSchemaVersion:
          type: string
          nullable: true
          pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
        lobSchemaHash:
          type: string
          nullable: true
          pattern: "^sha256:[0-9a-f]{64}$"
        attributes:
          type: object
          additionalProperties: true

    LobSchemaBundle:
      type: object
      required: [productVersionId, productCode, lineOfBusiness, version, status, stage, etag, schemaHash, dataSchema, uiSchema, rules, projections]
      properties:
        productVersionId: { type: string, format: uuid }
        productId: { type: string, format: uuid }
        productCode: { type: string }
        productKind:
          $ref: "#/components/schemas/LobProductKind"
        lineOfBusiness:
          type: string
          enum: [Property, GeneralLiability, CommercialAuto, WorkersCompensation, ProfessionalLiability, Marine, Umbrella, Surety, Cyber, DirectorsOfficers]
        version:
          type: string
          pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
        status:
          $ref: "#/components/schemas/LobProductVersionStatus"
        stage:
          $ref: "#/components/schemas/LobStage"
        etag: { type: string }
        schemaHash:
          type: string
          pattern: "^sha256:[0-9a-f]{64}$"
        dataSchema:
          type: object
          additionalProperties: true
        uiSchema:
          type: object
          additionalProperties: true
        rules:
          type: array
          items:
            type: object
            additionalProperties: true
        projections:
          type: array
          items:
            type: object
            additionalProperties: true

    LobActiveBundleSet:
      type: object
      required: [generatedAt, bundles]
      properties:
        generatedAt: { type: string, format: date-time }
        bundles:
          type: array
          items:
            $ref: "#/components/schemas/LobSchemaBundle"

    LobBundleActivationRequest:
      type: object
      required: [targetStatus, activationReason]
      properties:
        targetStatus:
          type: string
          enum: [Active, Deprecated, Retired]
        activationReason:
          type: string
          minLength: 1
          maxLength: 500
        effectiveAt:
          type: string
          format: date-time
          nullable: true
        stages:
          type: array
          items:
            $ref: "#/components/schemas/LobStage"
          nullable: true

    LobValidationProblemDetails:
      type: object
      description: |
        RFC 7807-compatible dynamic LOB validation error. Does not use
        ProblemDetails.errors; normalized validator errors live in lobErrors[].
      required: [type, title, status, code, traceId, lobErrors]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer, minimum: 400, maximum: 599 }
        detail: { type: string }
        instance: { type: string, format: uri }
        code:
          type: string
          enum: [VALIDATION_ERROR, LOB_PRODUCT_MISMATCH, LEGACY_SENTINEL_WRITE_BLOCKED, LOB_SCHEMA_NOT_ACTIVE, LOB_SCHEMA_NOT_FOUND, LOB_RULE_FAILED, LOB_VALIDATION_TIMEOUT]
        traceId: { type: string }
        productVersionId: { type: string, format: uuid, nullable: true }
        stage:
          allOf:
            - $ref: "#/components/schemas/LobStage"
          nullable: true
        lobErrors:
          type: array
          items:
            type: object
            required: [code, pointer, keyword]
            properties:
              code:
                type: string
                enum: [RANGE_BELOW_MIN, RANGE_ABOVE_MAX, ENUM_MISMATCH, PATTERN_MISMATCH, REQUIRED_MISSING, TYPE_MISMATCH, FORMAT_INVALID, LENGTH_BELOW_MIN, LENGTH_ABOVE_MAX, ITEMS_BELOW_MIN, ITEMS_ABOVE_MAX, UNIQUE_ITEMS_VIOLATED, ADDITIONAL_PROPERTY, DISCRIMINATOR_MISMATCH, CONDITIONAL_BRANCH_FAILED, RULE_FAILED, TIMEOUT]
              pointer: { type: string }
              schemaPath: { type: string, nullable: true }
              keyword: { type: string }
              constraint:
                nullable: true
                oneOf:
                  - type: string
                  - type: number
                  - type: boolean
                  - type: object
                    additionalProperties: true
                  - type: array
                    items: {}

    # ── Submission Schemas (redesigned — F0006) ─────────────────
    Submission:
      type: object
      description: |
        Submission detail response (F0006). Includes denormalized linked entity
        context, completeness evaluation, available transitions, stale flag,
        and the current optimistic-concurrency token for follow-up mutations.
      required:
        - id
        - accountId
        - brokerId
        - currentStatus
        - effectiveDate
        - lobAttributes
        - assignedToUserId
        - rowVersion
        - createdAt
        - createdByUserId
        - updatedAt
        - updatedByUserId
        - completeness
      properties:
        id:
          type: string
          format: uuid
        accountId:
          type: string
          format: uuid
        brokerId:
          type: string
          format: uuid
        programId:
          type: string
          format: uuid
          nullable: true
        lineOfBusiness:
          type: string
          maxLength: 50
          nullable: true
          enum:
            - Property
            - GeneralLiability
            - CommercialAuto
            - WorkersCompensation
            - ProfessionalLiability
            - Marine
            - Umbrella
            - Surety
            - Cyber
            - DirectorsOfficers
        lobAttributes:
          $ref: "#/components/schemas/LobAttributeEnvelope"
        currentStatus:
          type: string
          enum:
            - Received
            - Triaging
            - WaitingOnBroker
            - ReadyForUWReview
            - InReview
            - Quoted
            - BindRequested
            - Bound
            - Declined
            - Withdrawn
        effectiveDate:
          type: string
          format: date
        expirationDate:
          type: string
          format: date
          nullable: true
          description: Defaults to effectiveDate + 12 months when not set.
        premiumEstimate:
          type: number
          format: double
          minimum: 0
          nullable: true
        description:
          type: string
          maxLength: 2000
          nullable: true
        assignedToUserId:
          type: string
          format: uuid
          description: Internal UserId (uuid) of assigned user per F0005.
        accountName:
          type: string
          description: Denormalized from Account.
        accountRegion:
          type: string
          nullable: true
          description: Denormalized from Account.
        accountIndustry:
          type: string
          nullable: true
          description: Denormalized from Account.
        brokerName:
          type: string
          description: Denormalized from Broker.
        brokerLicenseNumber:
          type: string
          nullable: true
          description: Denormalized from Broker.
        programName:
          type: string
          nullable: true
          description: Denormalized from Program.
        assignedToDisplayName:
          type: string
          nullable: true
          description: Denormalized from UserProfile.
        isStale:
          type: boolean
          description: Whether submission exceeds stale threshold for its current state.
        ageDaysInState:
          type: integer
          minimum: 0
          description: Number of whole days since the submission entered its current workflow state.
        approvalStatus:
          type: string
          description: Current downstream approval status for the quote/proposal packet.
          enum: [NotRequired, Pending, Granted, Declined]
        approvalPending:
          type: boolean
          description: True when a ready quote/proposal packet is awaiting approval.
        isArchived:
          type: boolean
          description: True when the submission has been archived and is read-only.
        archivedAt:
          type: string
          format: date-time
          nullable: true
        archivedByUserId:
          type: string
          format: uuid
          nullable: true
        quotePacket:
          $ref: "#/components/schemas/SubmissionQuotePacket"
        approvalDecisions:
          type: array
          items:
            $ref: "#/components/schemas/SubmissionApprovalDecision"
        bindHandoff:
          $ref: "#/components/schemas/SubmissionBindHandoff"
        completeness:
          $ref: "#/components/schemas/SubmissionCompleteness"
        availableTransitions:
          type: array
          items:
            type: string
          description: Valid next states for the authenticated user.
        rowVersion:
          type: string
          description: Opaque optimistic concurrency token. Echo this value in `If-Match` for update, assignment, and transition requests.
        createdAt:
          type: string
          format: date-time
        createdByUserId:
          type: string
          format: uuid
          description: Internal UserId (uuid) of creator per F0005.
        updatedAt:
          type: string
          format: date-time
        updatedByUserId:
          type: string
          format: uuid
          description: Internal UserId (uuid) of last updater per F0005.

    SubmissionListItem:
      type: object
      description: Submission pipeline list item (F0006-S0001).
      required:
        - id
        - accountName
        - brokerName
        - currentStatus
        - effectiveDate
        - assignedToUserId
        - createdAt
        - isStale
      properties:
        id:
          type: string
          format: uuid
        accountName:
          type: string
        brokerName:
          type: string
        lineOfBusiness:
          type: string
          nullable: true
        currentStatus:
          type: string
        effectiveDate:
          type: string
          format: date
        assignedToUserId:
          type: string
          format: uuid
        assignedToDisplayName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        isStale:
          type: boolean
          description: Whether submission exceeds stale threshold.
        ageDaysInState:
          type: integer
          minimum: 0
          description: Number of whole days since the submission entered its current workflow state.
        approvalStatus:
          type: string
          enum: [NotRequired, Pending, Granted, Declined]
        approvalPending:
          type: boolean
        isArchived:
          type: boolean
        stuckFlag:
          type: boolean
          description: True when the submission exceeds its configured aging threshold.

    SubmissionQuotePacket:
      type: object
      description: Downstream quote/proposal packet for F0019 submission quoting.
      required:
        - submissionId
        - status
        - linkedDocumentRefs
        - readinessState
        - rowVersion
      properties:
        id:
          type: string
          format: uuid
          nullable: true
        submissionId:
          type: string
          format: uuid
        status:
          type: string
          enum: [Draft, ReadyForApproval, Approved]
        linkedDocumentRefs:
          type: array
          items:
            type: string
            format: uuid
        recordedPremiumAmount:
          type: number
          format: double
          nullable: true
        recordedLimits:
          type: string
          nullable: true
        recordedDeductibles:
          type: string
          nullable: true
        effectiveDate:
          type: string
          format: date-time
          nullable: true
        carrierMarket:
          type: string
          nullable: true
        readinessState:
          type: string
          enum: [Draft, ReadyForApproval, Approved]
        readyAt:
          type: string
          format: date-time
          nullable: true
        readyByUserId:
          type: string
          format: uuid
          nullable: true
        approvedAt:
          type: string
          format: date-time
          nullable: true
        approvedByUserId:
          type: string
          format: uuid
          nullable: true
        rowVersion:
          type: string

    SubmissionQuotePacketUpdateRequest:
      type: object
      description: Quote/proposal packet mutation payload.
      properties:
        linkedDocumentRefs:
          type: array
          nullable: true
          items:
            type: string
            format: uuid
        recordedPremiumAmount:
          type: number
          format: double
          nullable: true
        recordedLimits:
          type: string
          nullable: true
        recordedDeductibles:
          type: string
          nullable: true
        effectiveDate:
          type: string
          format: date-time
          nullable: true
        carrierMarket:
          type: string
          nullable: true
        markReady:
          type: boolean
          default: false

    SubmissionApprovalDecision:
      type: object
      description: Immutable approval decision for a submission quote/proposal packet.
      required:
        - id
        - submissionId
        - decision
        - approverUserId
        - reason
        - blockingConditions
        - decidedAt
      properties:
        id:
          type: string
          format: uuid
        submissionId:
          type: string
          format: uuid
        decision:
          type: string
          enum: [Granted, Declined]
        approverUserId:
          type: string
          format: uuid
        reason:
          type: string
          maxLength: 2000
        blockingConditions:
          type: array
          items:
            type: string
        decidedAt:
          type: string
          format: date-time

    SubmissionApprovalRequest:
      type: object
      description: Approval decision payload for the current quote/proposal packet.
      required:
        - decision
        - reason
      properties:
        decision:
          type: string
          enum: [Granted, Declined]
        reason:
          type: string
          maxLength: 2000
        blockingConditions:
          type: array
          nullable: true
          items:
            type: string

    SubmissionBindRequest:
      type: object
      description: Optional idempotency payload for bind handoff actions.
      properties:
        idempotencyKey:
          type: string
          nullable: true

    SubmissionBindHandoff:
      type: object
      description: Idempotent bind handoff record for a submission.
      required:
        - id
        - submissionId
        - idempotencyKey
        - status
        - correlationId
        - requestedAt
      properties:
        id:
          type: string
          format: uuid
        submissionId:
          type: string
          format: uuid
        idempotencyKey:
          type: string
        status:
          type: string
          enum: [Pending, Completed]
        correlationId:
          type: string
          format: uuid
        requestedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true

    SubmissionArchiveRequest:
      type: object
      description: Archive or reactivation reason payload.
      required:
        - reason
      properties:
        reason:
          type: string
          maxLength: 2000

    SubmissionCompleteness:
      type: object
      description: Completeness evaluation result (F0006-S0005).
      required:
        - isComplete
        - fieldChecks
        - documentChecks
        - missingItems
      properties:
        isComplete:
          type: boolean
          description: True only when all field and document requirements pass.
        fieldChecks:
          type: array
          items:
            type: object
            required: [field, required, status]
            properties:
              field:
                type: string
              required:
                type: boolean
              status:
                type: string
                enum: [pass, missing]
        documentChecks:
          type: array
          items:
            type: object
            required: [category, required, status]
            properties:
              category:
                type: string
              required:
                type: boolean
              status:
                type: string
                enum: [pass, missing, unavailable]
        missingItems:
          type: array
          items:
            type: string
          description: Human-readable list of missing items.

    SubmissionAssignmentRequest:
      type: object
      description: Assign or reassign submission ownership (F0006-S0006).
      required:
        - assignedToUserId
      properties:
        assignedToUserId:
          type: string
          format: uuid
          description: Target user. When in ReadyForUWReview, must have Underwriter role.

    SubmissionUpdateRequest:
      type: object
      description: Update mutable submission fields.
      properties:
        programId:
          type: string
          format: uuid
          nullable: true
        lineOfBusiness:
          type: string
          maxLength: 50
          nullable: true
          enum:
            - Property
            - GeneralLiability
            - CommercialAuto
            - WorkersCompensation
            - ProfessionalLiability
            - Marine
            - Umbrella
            - Surety
            - Cyber
            - DirectorsOfficers
        lobAttributes:
          $ref: "#/components/schemas/LobAttributeEnvelope"
        effectiveDate:
          type: string
          format: date
        expirationDate:
          type: string
          format: date
          nullable: true
        premiumEstimate:
          type: number
          format: double
          minimum: 0
          nullable: true
        description:
          type: string
          maxLength: 2000
          nullable: true

    SubmissionTransitionRequest:
      type: object
      description: |
        Request to transition a submission workflow state. F0006 owns only intake
        transitions; downstream states remain part of the shared submission status
        vocabulary because F0019 continues using the same resource.
      required:
        - toState
      properties:
        toState:
          type: string
          description: Target submission workflow state.
          enum:
            - Received
            - Triaging
            - WaitingOnBroker
            - ReadyForUWReview
            - InReview
            - Quoted
            - BindRequested
            - Bound
            - Declined
            - Withdrawn
        reason:
          type: string
          nullable: true
          maxLength: 2000
          description: Optional transition comment. Recommended for `WaitingOnBroker` transitions.
        reasonCode:
          type: string
          nullable: true
          description: Required for Declined and Withdrawn submission transitions.
        reasonDetail:
          type: string
          nullable: true
          maxLength: 500
          description: Required when reasonCode=Other.

    # ── Submission / Renewal Schemas (continued) ─────────────────

    Renewal:
      type: object
      description: |
        Renewal workflow entity (redesigned for F0007). Linked to an expiring policy.
        Includes computed urgency (overdue/approaching) and available transitions
        for the authenticated user.
      required:
        - id
        - accountId
        - brokerId
        - policyId
        - currentStatus
        - policyExpirationDate
        - targetOutreachDate
        - lobAttributes
        - assignedToUserId
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        accountId:
          type: string
          format: uuid
        brokerId:
          type: string
          format: uuid
        policyId:
          type: string
          format: uuid
          description: Expiring policy this renewal is linked to.
        currentStatus:
          type: string
          enum:
            - Identified
            - Outreach
            - InReview
            - Quoted
            - Completed
            - Lost
        lineOfBusiness:
          type: string
          maxLength: 50
          nullable: true
          enum:
            - Property
            - GeneralLiability
            - CommercialAuto
            - WorkersCompensation
            - ProfessionalLiability
            - Marine
            - Umbrella
            - Surety
            - Cyber
            - DirectorsOfficers
        lobAttributes:
          $ref: "#/components/schemas/LobAttributeEnvelope"
        policyExpirationDate:
          type: string
          format: date
          description: Expiration date of the linked policy.
        targetOutreachDate:
          type: string
          format: date
          description: Computed at creation from expiration date minus LOB outreach target days.
        assignedToUserId:
          type: string
          format: uuid
          description: Internal UserId (uuid) of current owner.
        lostReasonCode:
          type: string
          nullable: true
          description: Set when currentStatus=Lost.
          enum:
            - NonRenewal
            - CompetitiveLoss
            - BusinessClosed
            - CoverageNoLongerNeeded
            - PricingDeclined
            - Other
        lostReasonDetail:
          type: string
          nullable: true
          maxLength: 500
          description: Free-text detail when lostReasonCode=Other.
        boundPolicyId:
          type: string
          format: uuid
          nullable: true
          description: Linked bound/renewed policy when currentStatus=Completed.
        renewalSubmissionId:
          type: string
          format: uuid
          nullable: true
          description: Linked renewal submission when currentStatus=Completed.
        urgency:
          type: string
          nullable: true
          enum:
            - overdue
            - approaching
          description: Computed server-side from timing thresholds. Null if on track or past Identified.
        availableTransitions:
          type: array
          items:
            type: string
          description: Transitions available to the authenticated user based on current state and role.
        assignedUserDisplayName:
          type: string
          nullable: true
          description: Display name of the assigned user (resolved from UserProfile).
        accountName:
          type: string
          nullable: true
          description: Name of the linked account (resolved from Account).
        brokerName:
          type: string
          nullable: true
          description: Legal name of the linked broker (resolved from Broker).
        rowVersion:
          type: string
          description: Optimistic concurrency token.
        createdAt:
          type: string
          format: date-time
        createdByUserId:
          type: string
          format: uuid
        updatedAt:
          type: string
          format: date-time
        updatedByUserId:
          type: string
          format: uuid

    RenewalListItem:
      type: object
      description: Renewal list item with computed fields for pipeline display.
      required:
        - id
        - accountName
        - brokerName
        - currentStatus
        - policyExpirationDate
        - assignedToUserId
      properties:
        id:
          type: string
          format: uuid
        accountName:
          type: string
        brokerName:
          type: string
        lineOfBusiness:
          type: string
          nullable: true
        currentStatus:
          type: string
          enum: [Identified, Outreach, InReview, Quoted, Completed, Lost]
        policyExpirationDate:
          type: string
          format: date
        targetOutreachDate:
          type: string
          format: date
        assignedToUserId:
          type: string
          format: uuid
        assignedUserDisplayName:
          type: string
          nullable: true
        urgency:
          type: string
          nullable: true
          enum: [overdue, approaching]
          description: Computed from timing thresholds. Null if on track or past Identified.

    SubmissionCreateRequest:
      type: object
      description: |
        Payload for new business submission creation (F0006-S0002).
        Status defaults to Received. AssignedToUserId defaults to creator.
        ExpirationDate defaults to effectiveDate + 12 months.
      required:
        - accountId
        - brokerId
        - effectiveDate
      properties:
        accountId:
          type: string
          format: uuid
          description: Must reference a valid, non-deleted account.
        brokerId:
          type: string
          format: uuid
          description: Must reference a valid, non-deleted, active broker. Region alignment enforced.
        effectiveDate:
          type: string
          format: date
          description: Requested coverage effective date. May be past or future.
        programId:
          type: string
          format: uuid
          nullable: true
        lineOfBusiness:
          type: string
          maxLength: 50
          nullable: true
          enum:
            - Property
            - GeneralLiability
            - CommercialAuto
            - WorkersCompensation
            - ProfessionalLiability
            - Marine
            - Umbrella
            - Surety
            - Cyber
            - DirectorsOfficers
        lobAttributes:
          $ref: "#/components/schemas/LobAttributeEnvelope"
        premiumEstimate:
          type: number
          format: double
          minimum: 0
          nullable: true
        expirationDate:
          type: string
          format: date
          nullable: true
          description: Defaults to effectiveDate + 12 months when not provided.
        description:
          type: string
          maxLength: 2000
          nullable: true

    # Note: SubmissionUpdateRequest is defined in the schemas section above (line ~2578).
    # The old SubmissionUpdateRequest below is replaced by the F0006 version above.

    RenewalCreateRequest:
      type: object
      description: |
        Payload for creating a renewal from an expiring policy. Only policyId is
        required — accountId, brokerId, LOB, and expiration date are inherited from
        the policy. assignedToUserId defaults to the creating user if omitted.
      required:
        - policyId
      properties:
        policyId:
          type: string
          format: uuid
          description: The expiring policy to create a renewal for.
        assignedToUserId:
          type: string
          format: uuid
          description: Override default self-assignment (DistributionManager/Admin only).
        lineOfBusiness:
          type: string
          maxLength: 50
          nullable: true
          description: Override if policy LOB is null or needs correction.
          enum:
            - Property
            - GeneralLiability
            - CommercialAuto
            - WorkersCompensation
            - ProfessionalLiability
            - Marine
            - Umbrella
            - Surety
            - Cyber
            - DirectorsOfficers
        lobAttributes:
          $ref: "#/components/schemas/LobAttributeEnvelope"

    RenewalAssignmentRequest:
      type: object
      description: Payload for assigning or reassigning renewal ownership.
      required:
        - assignedToUserId
      properties:
        assignedToUserId:
          type: string
          format: uuid
          description: Target user for assignment. Must be active with a compatible role.

    # ── Workflow Schemas ────────────────────────────────────────
    WorkflowTransitionRequest:
      type: object
      description: |
        Request to transition workflow state. Additional fields are conditionally
        required based on target state: Lost requires reasonCode; Completed requires
        boundPolicyId or renewalSubmissionId. See F0007 README transition matrix.
      required:
        - toState
      properties:
        toState:
          type: string
          description: Target workflow state.
        reason:
          type: string
          description: Optional transition comment/reason.
        reasonCode:
          type: string
          description: Required when toState=Lost (renewal workflow). Validated against known set.
          enum:
            - NonRenewal
            - CompetitiveLoss
            - BusinessClosed
            - CoverageNoLongerNeeded
            - PricingDeclined
            - Other
        reasonDetail:
          type: string
          maxLength: 500
          description: Required when reasonCode=Other. Free-text explanation.
        boundPolicyId:
          type: string
          format: uuid
          description: Required when toState=Completed (unless renewalSubmissionId provided). Links to the bound/renewed policy.
        renewalSubmissionId:
          type: string
          format: uuid
          description: Required when toState=Completed (unless boundPolicyId provided). Links to the renewal submission.

    WorkflowTransitionRecord:
      type: object
      description: Immutable workflow transition record.
      required:
        - id
        - workflowType
        - entityId
        - fromState
        - toState
        - occurredAt
      properties:
        id:
          type: string
          format: uuid
        workflowType:
          type: string
        entityId:
          type: string
          format: uuid
        fromState:
          type: string
        toState:
          type: string
        reason:
          type: string
        occurredAt:
          type: string
          format: date-time

    # ── Dashboard Schemas (NEW) ─────────────────────────────────
    DashboardKpis:
      type: object
      description: Aggregated KPI metrics for the dashboard, computed over the requested trailing time window.
      required:
        - activeBrokers
        - openSubmissions
        - renewalRate
        - avgTurnaroundDays
      properties:
        activeBrokers:
          type: integer
          description: Count of brokers with Status=Active, ABAC-scoped. Always current (not windowed).
          example: 142
        openSubmissions:
          type: integer
          description: Count of submissions in non-terminal status, ABAC-scoped. Always current (not windowed).
          example: 38
        renewalRate:
          type: number
          format: double
          minimum: 0
          maximum: 100
          nullable: true
          description: |
            Percentage of renewals reaching Completed out of all renewals
            that exited the opportunities funnel in the requested trailing window
            (default 90 days). Null if no data.
          example: 72.5
        avgTurnaroundDays:
          type: number
          format: double
          nullable: true
          description: |
            Mean calendar days from Submission.CreatedAt to first terminal
            state transition in the requested trailing window (default 90 days).
            Null if no data.
          example: 4.2

    DashboardOpportunities:
      type: object
      description: Opportunities summary counts grouped by status.
      required:
        - submissions
        - renewals
      properties:
        submissions:
          type: array
          description: Submission opportunity-stage counts (non-terminal only).
          items:
            $ref: "#/components/schemas/OpportunityStatusCount"
        renewals:
          type: array
          description: Renewal opportunity-stage counts (non-terminal only).
          items:
            $ref: "#/components/schemas/OpportunityStatusCount"

    OpportunityOutcomes:
      type: object
      description: Terminal outcome summary for the selected trailing window.
      required:
        - periodDays
        - totalExits
        - outcomes
      properties:
        periodDays:
          type: integer
          minimum: 1
          maximum: 730
          example: 180
        totalExits:
          type: integer
          minimum: 0
          example: 48
        outcomes:
          type: array
          items:
            $ref: "#/components/schemas/OpportunityOutcome"

    OpportunityOutcome:
      type: object
      description: Aggregated terminal outcome row.
      required:
        - key
        - label
        - branchStyle
        - count
        - percentOfTotal
      properties:
        key:
          type: string
          enum: [bound, no_quote, declined, expired, lost_competitor]
        label:
          type: string
          example: Declined
        branchStyle:
          type: string
          enum: [solid, red_dashed, gray_dotted]
        count:
          type: integer
          minimum: 0
          example: 14
        percentOfTotal:
          type: number
          format: double
          minimum: 0
          maximum: 100
          example: 29.2
        averageDaysToExit:
          type: number
          format: double
          minimum: 0
          nullable: true
          example: 7.6

    OpportunityStatusCount:
      type: object
      description: Count of entities in a specific workflow status.
      required:
        - status
        - count
        - colorGroup
      properties:
        status:
          type: string
          description: Workflow status label.
          example: WaitingOnBroker
        count:
          type: integer
          minimum: 0
          example: 5
        colorGroup:
          type: string
          description: UI color group for the opportunity stage pill.
          enum: [intake, triage, waiting, review, decision]

    OpportunityFlow:
      type: object
      description: Transition flow graph for an opportunity Sankey widget.
      required:
        - entityType
        - periodDays
        - windowStartUtc
        - windowEndUtc
        - nodes
        - links
      properties:
        entityType:
          type: string
          enum: [submission, renewal]
        periodDays:
          type: integer
          minimum: 1
          maximum: 730
          example: 180
        windowStartUtc:
          type: string
          format: date-time
        windowEndUtc:
          type: string
          format: date-time
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/OpportunityFlowNode"
        links:
          type: array
          items:
            $ref: "#/components/schemas/OpportunityFlowLink"

    OpportunityFlowNode:
      type: object
      description: |
        Flow node representing a workflow status in the connected canvas.
        Used for both the base flow visualization and the Friction chapter overlay.
      required:
        - status
        - label
        - isTerminal
        - displayOrder
        - colorGroup
        - currentCount
        - inflowCount
        - outflowCount
      properties:
        status:
          type: string
          example: WaitingOnBroker
        label:
          type: string
          example: Waiting on Broker
        isTerminal:
          type: boolean
          example: false
        displayOrder:
          type: integer
          description: Deterministic sort order for left-to-right rendering.
          example: 5
        colorGroup:
          type: string
          enum: [intake, triage, waiting, review, decision]
          description: Visual grouping for warm-to-cool color progression across flow stages.
        currentCount:
          type: integer
          minimum: 0
          example: 17
        inflowCount:
          type: integer
          minimum: 0
          example: 25
        outflowCount:
          type: integer
          minimum: 0
          example: 23
        avgDwellDays:
          type: number
          format: double
          nullable: true
          description: |
            Average calendar days items currently spend in this status.
            Computed from the most recent WorkflowTransition into this status
            for each entity currently in this state. Null if no entities in status.
            Used by the Friction chapter overlay to identify bottleneck stages.
          example: 8.3
        emphasis:
          type: string
          nullable: true
          enum: [normal, active, blocked, bottleneck]
          description: |
            Server-computed emphasis hint for the Friction chapter overlay.
            - bottleneck: highest currentCount concentration among non-terminal stages
            - blocked: highest avgDwellDays among non-terminal stages
            - active: rightmost non-zero non-terminal stage in display order
            - normal: default (no special emphasis)
            Null when emphasis is not computed (e.g., insufficient data).
          example: bottleneck

    OpportunityFlowLink:
      type: object
      description: Sankey link between workflow statuses with aggregated transition count.
      required:
        - sourceStatus
        - targetStatus
        - count
      properties:
        sourceStatus:
          type: string
          example: InReview
        targetStatus:
          type: string
          example: Declined
        count:
          type: integer
          minimum: 1
          example: 12

    OpportunityBreakdown:
      type: object
      description: Grouped stage breakdown for a specific workflow status.
      required:
        - entityType
        - status
        - groupBy
        - periodDays
        - groups
        - total
      properties:
        entityType:
          type: string
          enum: [submission, renewal]
        status:
          type: string
          example: Received
        groupBy:
          type: string
          enum: [assignedUser, broker, program, lineOfBusiness, brokerState]
        periodDays:
          type: integer
          minimum: 1
          maximum: 730
          example: 180
        groups:
          type: array
          items:
            $ref: "#/components/schemas/OpportunityBreakdownGroup"
        total:
          type: integer
          minimum: 0
          example: 73

    OpportunityBreakdownGroup:
      type: object
      description: Single grouped bucket for status breakdown.
      required:
        - label
        - count
      properties:
        key:
          type: string
          nullable: true
          example: Property
        label:
          type: string
          example: Property
        count:
          type: integer
          minimum: 0
          example: 42

    OpportunityAging:
      type: object
      description: Per-status aging matrix with optional SLA context.
      required:
        - entityType
        - periodDays
        - statuses
      properties:
        entityType:
          type: string
          enum: [submission, renewal]
        periodDays:
          type: integer
          minimum: 1
          maximum: 730
          example: 180
        statuses:
          type: array
          items:
            $ref: "#/components/schemas/OpportunityAgingStatus"

    OpportunityAgingStatus:
      type: object
      description: Aging distribution and SLA information for a single workflow status.
      required:
        - status
        - label
        - colorGroup
        - displayOrder
        - sla
        - buckets
        - total
      properties:
        status:
          type: string
          example: Received
        label:
          type: string
          example: Received
        colorGroup:
          type: string
          example: intake
        displayOrder:
          type: integer
          example: 1
        sla:
          allOf:
            - $ref: "#/components/schemas/OpportunityAgingSla"
          nullable: true
        buckets:
          type: array
          items:
            $ref: "#/components/schemas/OpportunityAgingBucket"
        total:
          type: integer
          minimum: 0
          example: 19

    OpportunityAgingSla:
      type: object
      description: SLA thresholds and computed dwell-band counts for the status.
      required:
        - warningDays
        - targetDays
        - onTimeCount
        - approachingCount
        - overdueCount
      properties:
        warningDays:
          type: integer
          minimum: 0
          example: 1
        targetDays:
          type: integer
          minimum: 1
          example: 2
        onTimeCount:
          type: integer
          minimum: 0
          example: 15
        approachingCount:
          type: integer
          minimum: 0
          example: 3
        overdueCount:
          type: integer
          minimum: 0
          example: 1

    OpportunityAgingBucket:
      type: object
      description: Aging day-range bucket count for a workflow status.
      required:
        - key
        - label
        - count
      properties:
        key:
          type: string
          example: 0-2
        label:
          type: string
          example: 0–2 days
        count:
          type: integer
          minimum: 0
          example: 8

    OpportunityHierarchy:
      type: object
      description: Hierarchical tree for opportunity composition views.
      required:
        - periodDays
        - root
      properties:
        periodDays:
          type: integer
          minimum: 1
          maximum: 730
          example: 180
        root:
          $ref: "#/components/schemas/OpportunityHierarchyNode"

    OpportunityHierarchyNode:
      type: object
      description: Tree node for hierarchy composition.
      required:
        - id
        - label
        - count
      properties:
        id:
          type: string
          example: submission:intake
        label:
          type: string
          example: Intake
        count:
          type: integer
          minimum: 0
          example: 42
        levelType:
          type: string
          nullable: true
          enum: [entityType, colorGroup, status]
        colorGroup:
          type: string
          nullable: true
          enum: [intake, triage, waiting, review, decision, won, lost]
        children:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/OpportunityHierarchyNode"

    OpportunityMiniCard:
      type: object
      description: Compact item card for the opportunities popover.
      required:
        - entityId
        - entityName
        - daysInStatus
      properties:
        entityId:
          type: string
          format: uuid
        entityName:
          type: string
          description: Account or Broker name.
          example: Acme Corp
        amount:
          type: number
          format: double
          minimum: 0
          nullable: true
          description: Premium estimate (submissions) or null (renewals).
          example: 45000
        daysInStatus:
          type: integer
          minimum: 0
          description: Calendar days since last transition to current status.
          example: 12
        assignedUserInitials:
          type: string
          maxLength: 2
          description: Two-character initials of assigned user.
          example: JM
        assignedUserDisplayName:
          type: string
          description: Full display name (for tooltip).
          example: John Miller

    NudgeCard:
      type: object
      description: A prioritized action prompt for the dashboard.
      required:
        - nudgeType
        - title
        - description
        - linkedEntityType
        - linkedEntityId
        - linkedEntityName
        - urgencyValue
        - ctaLabel
      properties:
        nudgeType:
          type: string
          enum: [OverdueTask, StaleSubmission, UpcomingRenewal]
        title:
          type: string
          description: Nudge card title.
          example: Follow up with Acme Insurance
        description:
          type: string
          description: Urgency context.
          example: 3 days overdue
        linkedEntityType:
          type: string
          description: Type of linked entity for CTA navigation.
          example: Broker
        linkedEntityId:
          type: string
          format: uuid
        linkedEntityName:
          type: string
          description: Display name for context.
          example: Acme Insurance
        urgencyValue:
          type: integer
          description: |
            Days overdue (OverdueTask), days stuck (StaleSubmission),
            or days until renewal (UpcomingRenewal).
          example: 3
        ctaLabel:
          type: string
          description: Call-to-action button label.
          example: Review Now

    # ── Task Schemas (NEW) ──────────────────────────────────────
    Task:
