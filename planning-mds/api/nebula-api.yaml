          enum: [CoverageIncrease, CoverageDecrease, CoverageAdded, CoverageRemoved, PremiumAdjustment, NamedInsuredChange, AddressChange, DeductibleChange, OtherAdministrative]
        endorsementReasonDetail: { type: string, nullable: true, maxLength: 1000 }
        effectiveDate: { type: string, format: date }
        premiumDelta: { type: number }
        premiumCurrency:
          type: string
          nullable: true
          enum: [USD]
        lobAttributes:
          allOf:
