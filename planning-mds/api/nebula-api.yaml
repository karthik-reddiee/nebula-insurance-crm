  # ──────────────────────────────────────────────────────────────
  # Submission endpoints (redesigned — F0006)
  # ──────────────────────────────────────────────────────────────
  /submissions:
    get:
      operationId: listSubmissions
      summary: List submissions with intake status filtering
      description: |
        Returns a paginated, filterable submission pipeline list. Supports status,
        broker, account, LOB, assigned user, stale, and sort filters.
        Each item includes computed isStale flag.
        ABAC-scoped to the authenticated user's permissions.
      tags: [Submissions]
      parameters:
        - name: status
          in: query
          required: false
          description: Comma-separated status filter. Defaults to non-terminal intake statuses.
          schema:
            type: string
        - name: brokerId
          in: query
          required: false
          description: Filter by broker.
          schema:
            type: string
            format: uuid
        - name: accountId
          in: query
          required: false
          description: Filter by account.
          schema:
            type: string
            format: uuid
        - name: lineOfBusiness
          in: query
          required: false
          description: Filter by LOB.
          schema:
            type: string
        - name: assignedToUserId
          in: query
          required: false
          description: Filter by assigned user.
          schema:
            type: string
            format: uuid
        - name: stale
          in: query
          required: false
          description: Filter by stale flag. True returns only stale submissions.
          schema:
            type: boolean
        - name: approvalPending
          in: query
          required: false
          description: Filter to quoted submissions whose current quote packet is ready and awaiting approval.
          schema:
            type: boolean
        - name: stuckOnly
          in: query
          required: false
          description: Filter to submissions that exceed their current workflow aging threshold.
          schema:
            type: boolean
        - name: includeArchived
          in: query
          required: false
          description: Include archived submissions. Defaults to false.
          schema:
            type: boolean
            default: false
        - name: sort
          in: query
          required: false
          description: Sort field.
          schema:
            type: string
            enum: [createdAt, effectiveDate, accountName, currentStatus]
            default: createdAt
        - name: sortDir
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Paginated submission list
          content:
            application/json:
              schema:
                type: object
                required: [data, page, pageSize, totalCount, totalPages]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SubmissionListItem"
                  page:
                    type: integer
                  pageSize:
                    type: integer
                  totalCount:
                    type: integer
                  totalPages:
                    type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createSubmission
      summary: Create submission for new business intake
      description: |
        Creates a new business submission in Received status. AssignedToUserId defaults
        to the authenticated user. ExpirationDate defaults to effectiveDate + 12 months.
        Region alignment enforced: Account.Region must be in broker's BrokerRegion set.
        Atomically creates WorkflowTransition (null→Received) and ActivityTimelineEvent.
      tags: [Submissions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmissionCreateRequest"
      responses:
        "201":
          description: Submission created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /submissions/{submissionId}:
    parameters:
      - $ref: "#/components/parameters/SubmissionId"
    get:
      operationId: getSubmissionById
      summary: Get submission detail with intake context
      description: |
        Returns full submission details including denormalized account/broker/program
        context, completeness evaluation, available transitions for the authenticated
        user, and stale flag. ABAC-scoped.
      tags: [Submissions]
      responses:
        "200":
          description: Submission details with completeness and context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateSubmission
      summary: Update submission fields
      description: |
        Updates mutable submission fields (description, LOB, premium, expiration date,
        program). Creates a SubmissionUpdated ActivityTimelineEvent. Requires
        `If-Match` with the current `rowVersion`; stale versions return HTTP 412
        with `code=precondition_failed`.
      tags: [Submissions]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmissionUpdateRequest"
      responses:
        "200":
          description: Submission updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "412":
          $ref: "#/components/responses/PreconditionFailed"

  /submissions/{submissionId}/quote-packet:
    parameters:
      - $ref: "#/components/parameters/SubmissionId"
    get:
      operationId: getSubmissionQuotePacket
      summary: Get submission quote/proposal packet
      description: Returns the current quote/proposal packet for a submission, or null fields when no packet has been started.
      tags: [Submissions]
      responses:
        "200":
          description: Quote/proposal packet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmissionQuotePacket"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateSubmissionQuotePacket
      summary: Update submission quote/proposal packet
      description: |
        Upserts the downstream quote/proposal packet and optionally marks it ready.
        When marked ready, the submission transitions to Quoted if prerequisites pass.
        Requires `If-Match` with the submission `rowVersion`.
      tags: [Submissions]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmissionQuotePacketUpdateRequest"
      responses:
        "200":
          description: Submission updated with current packet state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "422":
          $ref: "#/components/responses/UnprocessableContent"

  /submissions/{submissionId}/approval:
    parameters:
      - $ref: "#/components/parameters/SubmissionId"
    post:
      operationId: approveSubmissionQuotePacket
      summary: Record submission approval decision
      description: |
        Records an approval decision for the current ready quote packet. A granted
        decision unblocks bind request; a declined decision preserves the packet
        and records blocking conditions. Requires `If-Match`.
      tags: [Submissions]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmissionApprovalRequest"
      responses:
        "200":
          description: Submission updated with approval decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "422":
          $ref: "#/components/responses/UnprocessableContent"

  /submissions/{submissionId}/bind-request:
    parameters:
      - $ref: "#/components/parameters/SubmissionId"
    post:
      operationId: requestSubmissionBind
      summary: Request bind handoff for an approved submission
      description: |
        Starts the bind handoff for an approved quoted submission, transitions the
        submission to BindRequested, and records an idempotent handoff record.
        Accepts an `Idempotency-Key` header or request-body key. Requires `If-Match`.
      tags: [Submissions]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
          description: Optional idempotency key for bind handoff creation.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmissionBindRequest"
      responses:
        "200":
          description: Submission transitioned to BindRequested or existing idempotent result returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "422":
          $ref: "#/components/responses/UnprocessableContent"

  /submissions/{submissionId}/bind-confirmation:
    parameters:
      - $ref: "#/components/parameters/SubmissionId"
    post:
      operationId: confirmSubmissionBind
      summary: Confirm bind handoff completion
      description: Confirms the bind handoff and transitions the submission to Bound. Requires `If-Match`.
      tags: [Submissions]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
          description: Optional idempotency key matching the bind handoff.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmissionBindRequest"
      responses:
        "200":
          description: Submission transitioned to Bound
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "422":
          $ref: "#/components/responses/UnprocessableContent"

  /submissions/{submissionId}/archive:
    parameters:
      - $ref: "#/components/parameters/SubmissionId"
    post:
      operationId: archiveSubmission
      summary: Archive a terminal submission
      description: Archives a terminal submission and makes it read-only until reactivated. Requires `If-Match`.
      tags: [Submissions]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmissionArchiveRequest"
      responses:
        "200":
          description: Submission archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"

