          description: Paginated timeline events
          content:
            application/json:
              schema:
                type: object
                required: [data, page, pageSize, totalCount, totalPages]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TimelineEvent"
                  page:
                    type: integer
                  pageSize:
                    type: integer
                  totalCount:
                    type: integer
                  totalPages:
                    type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────────────────────────
  # Renewal endpoints (redesigned — F0007)
  # ──────────────────────────────────────────────────────────────
  /renewals:
    get:
      operationId: listRenewals
      summary: List renewals with due-window filtering
      description: |
        Returns a paginated, filterable renewal pipeline list. Supports due-window
        filters (90/60/45 days, overdue), status, owner, LOB, and sort options.
        Each item includes computed urgency (overdue/approaching/null).
        ABAC-scoped to the authenticated user's permissions.
      tags: [Renewals]
      parameters:
        - name: dueWindow
          in: query
          required: false
          description: Filter by due window (days until policy expiration).
          schema:
            type: string
            enum: [all, 90, 60, 45, overdue]
            default: all
        - name: status
          in: query
          required: false
          description: Comma-separated status filter. Defaults to non-terminal statuses.
          schema:
            type: string
        - name: assignedToUserId
          in: query
          required: false
          description: Filter by assigned user. Omit for "all" (managers), or set to own UserId for "my renewals".
          schema:
            type: string
            format: uuid
        - name: lineOfBusiness
          in: query
          required: false
          description: Filter by LOB.
          schema:
            type: string
        - name: accountId
          in: query
          required: false
          description: Filter by account.
          schema:
            type: string
            format: uuid
        - name: brokerId
          in: query
          required: false
          description: Filter by broker.
          schema:
            type: string
            format: uuid
        - name: includeTerminal
          in: query
          required: false
          description: Include terminal states (Completed, Lost). Default false.
          schema:
            type: boolean
            default: false
        - name: sort
          in: query
          required: false
          description: Sort field.
          schema:
            type: string
            enum: [policyExpirationDate, accountName, currentStatus, assignedToUserId]
            default: policyExpirationDate
        - name: sortDir
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Paginated renewal list
          content:
            application/json:
              schema:
                type: object
                required: [data, page, pageSize, totalCount, totalPages]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/RenewalListItem"
                  page:
                    type: integer
                  pageSize:
                    type: integer
                  totalCount:
                    type: integer
                  totalPages:
                    type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createRenewal
      summary: Create renewal from expiring policy
      description: |
        Creates a renewal linked to an expiring policy. Inherits accountId, brokerId,
        LOB, and expiration date from the policy. Computes targetOutreachDate from
        LOB-specific WorkflowSlaThreshold. Initial status is Identified.
        One active (non-deleted, non-terminal) renewal per policy enforced.
      tags: [Renewals]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenewalCreateRequest"
      responses:
        "201":
          description: Renewal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Renewal"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /renewals/{renewalId}:
    parameters:
      - $ref: "#/components/parameters/RenewalId"
    get:
      operationId: getRenewalById
      summary: Get renewal detail with policy context
      description: |
        Returns full renewal detail including linked policy, account, and broker
        context. Includes computed urgency (overdue/approaching/null) and available
        transitions for the authenticated user's role.
      tags: [Renewals]
      responses:
        "200":
          description: Renewal details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Renewal"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /renewals/{renewalId}/assignment:
    parameters:
      - $ref: "#/components/parameters/RenewalId"
    put:
      operationId: assignRenewal
      summary: Assign or reassign renewal ownership
      description: |
        Assigns or reassigns the renewal to a user. DistributionManager and Admin
        can assign to any user in scope. DistributionUser can self-assign unassigned
        renewals. Assignment to terminal-state renewals is rejected (409).
        Creates an ActivityTimelineEvent recording the assignment change.
      tags: [Renewals]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenewalAssignmentRequest"
      responses:
        "200":
          description: Renewal assignment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Renewal"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /renewals/{renewalId}/timeline:
    parameters:
      - $ref: "#/components/parameters/RenewalId"
    get:
      operationId: listRenewalTimeline
      summary: List renewal activity timeline
      description: |
        Returns paginated ActivityTimelineEvent records for a renewal, sorted
        reverse chronologically (newest first). Includes transitions, assignments,
        creation, and outreach events.
      tags: [Renewals]
      parameters:
        - $ref: "#/components/parameters/Page"
        - name: pageSize
          in: query
          required: false
          description: Events per page. Default 20.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated timeline events
          content:
            application/json:
              schema:
                type: object
                required: [data, page, pageSize, totalCount, totalPages]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TimelineEvent"
                  page:
                    type: integer
                  pageSize:
                    type: integer
                  totalCount:
                    type: integer
                  totalPages:
                    type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────────────────────────
  # Workflow transition endpoints (existing)
  # ──────────────────────────────────────────────────────────────
  /submissions/{submissionId}/transitions:
    parameters:
      - $ref: "#/components/parameters/SubmissionId"
    get:
      operationId: listSubmissionTransitions
      summary: List submission transitions
      tags: [Submissions]
      responses:
        "200":
          description: Submission transition history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkflowTransitionRecord"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: transitionSubmission
      summary: Transition submission workflow state
      description: |
        Transitions a submission workflow state. F0006 owns the intake transitions
        through `ReadyForUWReview`; F0019 continues the downstream submission
        lifecycle on the same resource. Requires `If-Match` with the current
        `rowVersion`; stale versions return HTTP 412 with
        `code=precondition_failed`.
      tags: [Submissions]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmissionTransitionRequest"
      responses:
        "201":
          description: Transition recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowTransitionRecord"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"

  /renewals/{renewalId}/transitions:
    parameters:
      - $ref: "#/components/parameters/RenewalId"
    post:
      operationId: transitionRenewal
      summary: Transition renewal workflow state
      tags: [Renewals]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowTransitionRequest"
      responses:
        "201":
          description: Transition recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowTransitionRecord"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  # ──────────────────────────────────────────────────────────────
  # Neuron Companion engine endpoints (F0038) — ADR-027, ADR-028
  # Called by the Neuron service AS THE USER (forwarded token). Engine
  # enforces Casbin ABAC and remains the CRM source of truth.
  # ──────────────────────────────────────────────────────────────
  /renewals/needs-attention:
    get:
      operationId: listRenewalsNeedingAttention
      summary: List the current user's renewals needing attention (Neuron Renewals zone)
      description: >
        F0038-S0003. Permission-scoped to the forwarded user token (Casbin ABAC).
        Returns renewals in Identified/Outreach within the configured window
        (default 90 days) of expiry, ordered by urgency, flagging no-contact-30d.
        Intra-zone only — no cross-zone ranking.
      tags: [NeuronCompanion]
      parameters:
        - name: withinDays
          in: query
          required: false
          schema: { type: integer, default: 90, minimum: 1, maximum: 365 }
          description: Needs-attention window in days (default 90, configurable).
      responses:
        "200":
          description: Needs-attention list, urgency-ordered.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                additionalProperties: false
                properties:
                  data:
                    type: array
                    items:
                      $ref: "https://nebula.local/schemas/renewal-needs-attention-item.schema.json"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /renewals/{renewalId}/companion-context:
    parameters:
      - $ref: "#/components/parameters/RenewalId"
    get:
      operationId: getRenewalCompanionContext
      summary: Per-renewal drill context for the Neuron companion
      description: >
        F0038-S0003. Account, broker/contact, and renewal timeline for one
        renewal, permission-scoped via the forwarded token. Feeds the drill view
        and the proactive draft CTA.
      tags: [NeuronCompanion]
      responses:
        "200":
          description: Drill context for the renewal.
          content:
            application/json:
              schema:
                type: object
                required: [renewalId, accountName, workflowState]
                additionalProperties: false
                properties:
                  renewalId: { type: string, format: uuid }
                  accountName: { type: string }
                  brokerName: { type: string }
                  contactName: { type: string }
                  workflowState: { type: string, enum: [Identified, Outreach] }
                  expiryDate: { type: string, format: date }
                  canDraftOutreach:
                    type: boolean
                    description: True when the user holds renewal:draft_outreach and the renewal is draftable.
                  timeline:
                    type: array
                    items: { $ref: "#/components/schemas/TimelineEvent" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /renewals/{renewalId}/outreach-draft:
    parameters:
      - $ref: "#/components/parameters/RenewalId"
    post:
      operationId: persistRenewalOutreachDraft
      summary: Persist a generated/edited renewal outreach draft as a timeline event
      description: >
        F0038-S0005. Authorized by renewal:draft_outreach (Underwriter only).
        Persists the draft as an InternalOnly, AI-generated-labelled renewal
        ActivityTimelineEvent with full provenance. Does NOT transition the
        renewal (transition fires only on mock-send). Content constraints
        (no premium/quote/coverage-terms/binding-commitment) are validated; a
        generation/validation failure persists nothing (no partial draft).
      tags: [NeuronCompanion]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "https://nebula.local/schemas/renewal-outreach-draft-request.schema.json"
      responses:
        "201":
          description: Draft persisted as a timeline event.
          content:
            application/json:
              schema:
                type: object
                required: [timelineEventId, renewalId]
                additionalProperties: false
                properties:
                  timelineEventId: { type: string, format: uuid }
                  renewalId: { type: string, format: uuid }
                  internalOnly: { type: boolean }
                  event: { $ref: "#/components/schemas/TimelineEvent" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422":
          description: Draft content violated the no-premium/quote/terms/binding constraint.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }
  /renewals/{renewalId}/outreach-mock-send:
    parameters:
      - $ref: "#/components/parameters/RenewalId"
    post:
      operationId: mockSendRenewalOutreach
      summary: Mock-send — commit Identified -> Outreach without dispatching email
      description: >
        F0038-S0006. Authorized by renewal:draft_outreach (Underwriter only;
        dedicated least-privilege action per ADR-028 §3 — NOT renewal:transition).
        Commits the real Identified -> Outreach WorkflowTransition and a
        "sent (simulated)" ActivityTimelineEvent atomically, but fakes SMTP — no
        real email is dispatched. Requires If-Match (rowVersion). The renewal must
        be in Identified; otherwise 409 invalid_transition.
      tags: [NeuronCompanion]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "https://nebula.local/schemas/renewal-outreach-mock-send-request.schema.json"
      responses:
        "201":
          description: Transition committed; simulated-send event recorded; no email dispatched.
          content:
            application/json:
              schema:
                type: object
                required: [transition, simulatedSendEventId]
                additionalProperties: false
                properties:
                  transition: { $ref: "#/components/schemas/WorkflowTransitionRecord" }
                  simulatedSendEventId: { type: string, format: uuid }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }
  /internal/telemetry/neuron-companion:
    post:
      operationId: ingestNeuronCompanionTelemetry
      summary: Ingest a batch of F0038 Neuron companion telemetry events
      description: >
        F0038-S0008. Accepts companion telemetry (needs-attention-surfaced /
        draft-ready primary timestamps + the minimal secondary set). Validates
        each event against neuron-companion-telemetry-event.schema.json and writes
        accepted events to Serilog under category `Nebula.Neuron.Companion`.
        Fire-and-forget: failures here MUST NOT affect the companion flow.
        Same authenticated bearer-token boundary as other protected APIs.
        PII boundary enforced by the schema (correlation ids + metric fields only;
        no draft body, raw prompts, credentials, email, name, or IP).
      tags: [NeuronCompanion]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [events]
              additionalProperties: false
              properties:
                events:
                  type: array
                  minItems: 1
                  maxItems: 50
                  items:
                    $ref: "https://nebula.local/schemas/neuron-companion-telemetry-event.schema.json"
      responses:
        "202":
          description: Events accepted for async write to Serilog. Body is empty.
        "400":
          description: One or more events failed schema validation.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # ──────────────────────────────────────────────────────────────
  # Policy endpoints (F0018)
  # ──────────────────────────────────────────────────────────────
  /policies:
    get:
      operationId: listPolicies
      summary: List policies with search and filtering
      description: F0018-S0001. Paginated, ABAC-scoped. Fallback-aware account columns per ADR-017.
      tags: [Policies]
      parameters:
        - $ref: "#/components/parameters/PolicySearchQuery"
        - $ref: "#/components/parameters/PolicyStatusFilter"
        - $ref: "#/components/parameters/PolicyLobFilter"
        - $ref: "#/components/parameters/PolicyCarrierFilter"
        - $ref: "#/components/parameters/PolicyBrokerFilter"
        - $ref: "#/components/parameters/PolicyExpiringBeforeFilter"
        - $ref: "#/components/parameters/PolicySortBy"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Paginated policy list
          content:
            application/json:
              schema:
                type: object
                required: [data, page, pageSize, totalCount, totalPages]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PolicyListItem"
                  page: { type: integer }
                  pageSize: { type: integer }
                  totalCount: { type: integer }
                  totalPages: { type: integer }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      operationId: createPolicy
      summary: Create a policy in Pending state
      description: F0018-S0002. Manual create returns Pending. Import-lite uses the dedicated `/policies/import` endpoint.
      tags: [Policies]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyCreateRequest"
      responses:
        "201":
          description: Policy created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }

  /policies/from-bind:
    post:
      operationId: createPolicyFromBind
      summary: F0019 bind-hook — create a Pending policy from a bound submission/quote handoff
      description: F0018-S0002. Contract specified in MVP; when implemented it creates a Pending policy and preserves explicit Pending → Issued issuance. Server may return 501 until F0019 is built.
      tags: [Policies]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyFromBindRequest"
      responses:
        "201":
          description: Policy created (Pending)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "501":
          description: Not implemented yet (F0019 not yet built). Contract is stable; clients may retry once F0019 ships.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /policies/import:
    post:
      operationId: importPolicies
      summary: Import-lite CSV ingest for historical policies
      description: F0018-S0002. Per-row validation; rows that fail return a detail block. All successes land in Issued.
      tags: [Policies]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyImportRequest"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                type: object
                required: [accepted, rejected]
                properties:
                  accepted:
                    type: array
                    items:
                      $ref: "#/components/schemas/Policy"
                  rejected:
                    type: array
                    items:
                      type: object
                      required: [index, code, message]
                      properties:
                        index: { type: integer }
                        code: { type: string }
                        message: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /policies/{policyId}:
    parameters:
      - $ref: "#/components/parameters/PolicyId"
    get:
      operationId: getPolicyById
      summary: Get policy by id
      tags: [Policies]
      responses:
        "200":
          description: Policy detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      operationId: updatePolicy
      summary: Update policy profile fields
      description: F0018-S0003. Material-term edits on Issued/Cancelled/Expired policies return 409 code=must_use_endorse.
      tags: [Policies]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyUpdateRequest"
      responses:
        "200":
          description: Updated policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }

  /policies/{policyId}/summary:
    parameters:
      - $ref: "#/components/parameters/PolicyId"
    get:
      operationId: getPolicySummary
      summary: Policy 360 summary (composed payload with rail preview counts)
      description: F0018-S0004.
      tags: [Policies]
      responses:
        "200":
          description: Policy summary payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicySummary"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /policies/{policyId}/issue:
    parameters:
      - $ref: "#/components/parameters/PolicyId"
    post:
      operationId: issuePolicy
      summary: Transition a Pending policy to Issued
      description: Captures the initial PolicyVersion snapshot (VersionReason=IssuedInitial). See ADR-018.
      tags: [Policies]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyIssueRequest"
      responses:
        "200":
          description: Policy issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }

  /policies/{policyId}/endorse:
    parameters:
      - $ref: "#/components/parameters/PolicyId"
    post:
      operationId: endorsePolicy
      summary: Apply an endorsement (F0018-S0006)
      description: Produces a new PolicyVersion + PolicyEndorsement + re-materialized PolicyCoverageLine[] atomically.
      tags: [Policies]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyEndorsementRequest"
      responses:
        "201":
          description: Endorsement applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyEndorsement"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }

  /policies/{policyId}/cancel:
    parameters:
      - $ref: "#/components/parameters/PolicyId"
    post:
      operationId: cancelPolicy
      summary: Cancel an Issued policy (F0018-S0007)
      description: Computes ReinstatementDeadline from LOB-configured window.
      tags: [Policies]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyCancelRequest"
      responses:
        "200":
          description: Policy cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }

  /policies/{policyId}/reinstate:
    parameters:
      - $ref: "#/components/parameters/PolicyId"
    post:
      operationId: reinstatePolicy
      summary: Reinstate a Cancelled policy within the LOB window (F0018-S0008)
      description: Produces a new PolicyVersion (VersionReason=Reinstatement).
      tags: [Policies]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyReinstateRequest"
      responses:
        "200":
          description: Policy reinstated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Invalid transition or reinstatement window expired
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "412": { $ref: "#/components/responses/PreconditionFailed" }

  /policies/{policyId}/versions:
    parameters:
      - $ref: "#/components/parameters/PolicyId"
    get:
      operationId: listPolicyVersions
      summary: List PolicyVersion rows for a policy (F0018-S0005)
      description: Descending by VersionNumber. Immutable snapshots.
      tags: [Policies]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Paginated version list
          content:
            application/json:
              schema:
                type: object
                required: [data, page, pageSize, totalCount, totalPages]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PolicyVersion"
                  page: { type: integer }
                  pageSize: { type: integer }
                  totalCount: { type: integer }
                  totalPages: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /policies/{policyId}/versions/{versionId}:
    parameters:
      - $ref: "#/components/parameters/PolicyId"
      - $ref: "#/components/parameters/PolicyVersionId"
    get:
      operationId: getPolicyVersionById
      summary: Get a specific PolicyVersion snapshot
      tags: [Policies]
      responses:
        "200":
          description: Version detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyVersion"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /policies/{policyId}/endorsements:
    parameters:
      - $ref: "#/components/parameters/PolicyId"
    get:
      operationId: listPolicyEndorsements
      summary: List endorsements on a policy (F0018-S0006)
      tags: [Policies]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Paginated endorsement list
          content:
            application/json:
              schema:
                type: object
                required: [data, page, pageSize, totalCount, totalPages]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PolicyEndorsement"
                  page: { type: integer }
                  pageSize: { type: integer }
                  totalCount: { type: integer }
                  totalPages: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /policies/{policyId}/coverages:
    parameters:
      - $ref: "#/components/parameters/PolicyId"
    get:
      operationId: listPolicyCoverages
      summary: Current-version coverage lines (F0018-S0004 Coverages rail)
      description: Returns rows where IsCurrent=true. Historical coverage sets are accessible via the corresponding PolicyVersion.
      tags: [Policies]
      responses:
        "200":
          description: Coverage list for the current version
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PolicyCoverageLine"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /policies/{policyId}/timeline:
    parameters:
      - $ref: "#/components/parameters/PolicyId"
    get:
      operationId: listPolicyTimeline
      summary: Policy activity timeline (F0018-S0010)
      description: Append-only; paginated newest-first.
      tags: [Policies]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Paginated timeline events
          content:
            application/json:
              schema:
                type: object
                required: [data, page, pageSize, totalCount, totalPages]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TimelineEvent"
                  page: { type: integer }
                  pageSize: { type: integer }
                  totalCount: { type: integer }
                  totalPages: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ──────────────────────────────────────────────────────────────
  # F0023 Global search, saved views, and operational reporting
  # ──────────────────────────────────────────────────────────────
  /search-results:
    get:
      operationId: searchGlobalRecords
      summary: Search permission-filtered CRM records
      description: |
        Returns cross-object results from the F0023 `SearchDocument` read model.
        Results, facets, snippets, and counts are filtered server-side before
        data leaves the API. External broker/MGA users are out of scope and
        receive forbidden responses.
      tags: [Search]
      parameters:
        - name: q
          in: query
          required: true
          description: Search text. The service trims whitespace and requires at least 2 characters.
          schema:
            type: string
            minLength: 2
            maxLength: 200
        - name: objectTypes
          in: query
          required: false
          description: Optional comma-separated result type filter.
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
              enum: [Broker, MGA, Program, Account, Policy, Submission, Renewal, Task]
        - name: status
          in: query
          required: false
          schema:
            type: string
            maxLength: 80
        - name: ownerUserId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: rootNodeId
          in: query
          required: false
          description: Optional hierarchy root filter. Must be within the caller's resolved distribution scope.
          schema:
            type: string
            format: uuid
        - name: territoryId
          in: query
          required: false
          description: Optional territory filter. Must be within the caller's resolved distribution scope.
          schema:
            type: string
            format: uuid
        - name: producerUserId
          in: query
          required: false
          description: Optional producer/user ownership filter. Must be within the caller's resolved distribution scope.
          schema:
            type: string
            format: uuid
        - name: asOf
          in: query
          required: false
          description: Point-in-time date for effective-dated hierarchy, ownership, and territory scope.
          schema:
            type: string
            format: date
        - name: region
          in: query
          required: false
          schema:
            type: string
            maxLength: 80
        - name: lineOfBusiness
          in: query
          required: false
          schema:
            type: string
            maxLength: 80
        - name: sort
          in: query
          required: false
          description: Sort order for result list.
          schema:
            type: string
            enum: [relevance:desc, updatedAt:desc, title:asc]
            default: relevance:desc
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Paginated, permission-filtered global search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlobalSearchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /saved-views:
    get:
      operationId: listSavedViews
      summary: List personal and team saved views visible to the current user
      description: |
        Returns saved criteria visible to the authenticated internal user.
        Personal views are owner-only. Team views are filtered by the user's
        role/region/program/territory eligibility and never grant record access.
      tags: [SavedViews]
      parameters:
        - name: viewType
          in: query
          required: false
          schema:
            type: string
            enum: [Search, WorkloadReport, WorkflowAgingReport]
        - name: visibility
          in: query
          required: false
          schema:
            type: string
            enum: [Personal, Team]
        - name: includeArchived
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Saved views visible to the caller
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedSavedViewList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createSavedView
      summary: Create a personal or team saved view
      description: |
        Creates reusable criteria for search or operational reports. Team views
        require manager/admin authority for the requested team scope. Successful
        mutations append a `SavedViewAuditEvent`.
      tags: [SavedViews]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedViewUpsertRequest"
      responses:
        "201":
          description: Saved view created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedView"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /saved-views/{savedViewId}:
    parameters:
      - $ref: "#/components/parameters/SavedViewId"
    get:
      operationId: getSavedView
      summary: Get a saved view
      tags: [SavedViews]
      responses:
        "200":
          description: Saved view detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedView"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateSavedView
      summary: Update saved view metadata, criteria, or archived state
      description: |
        Requires `If-Match` with the saved view `rowVersion`. Personal updates
        are owner-only. Team updates require manager/admin authority for the
        target team scope. Successful updates append a `SavedViewAuditEvent`.
      tags: [SavedViews]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedViewUpsertRequest"
      responses:
        "200":
          description: Saved view updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedView"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
    delete:
      operationId: archiveSavedView
      summary: Archive a saved view
      description: |
        Soft-archives the saved view. Requires `If-Match`. Successful archive
        appends a `SavedViewAuditEvent`; criteria remain available for audit.
      tags: [SavedViews]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      responses:
        "204":
          description: Saved view archived
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "412":
          $ref: "#/components/responses/PreconditionFailed"

  /saved-views/{savedViewId}/default:
    parameters:
      - $ref: "#/components/parameters/SavedViewId"
    put:
      operationId: setSavedViewDefault
      summary: Mark a saved view as default for its personal or team scope
      description: |
        Requires `If-Match`. Setting a default clears the prior default for the
        same `(visibility, teamScopeType, teamScopeKey, ownerUserId, viewType)`
        scope in one transaction.
      tags: [SavedViews]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      responses:
        "200":
          description: Default saved view updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedView"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"

  /operational-reports/workload:
    get:
      operationId: getOperationalWorkloadReport
      summary: Get daily workload report
      description: |
        Returns ABAC-scoped due-today, overdue, owner, and status workload rows
        from the F0023 `OperationalReportProjection` read model. Drilldown rows
        use the same shape and authorization behavior as global search results.
      tags: [OperationalReports]
      parameters:
        - name: asOf
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: objectTypes
          in: query
          required: false
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
              enum: [Submission, Renewal, Policy, Task]
        - name: ownerUserId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: rootNodeId
          in: query
          required: false
          description: Optional hierarchy root filter. Must be within the caller's resolved distribution scope.
          schema:
            type: string
            format: uuid
        - name: territoryId
          in: query
          required: false
          description: Optional territory filter. Must be within the caller's resolved distribution scope.
          schema:
            type: string
            format: uuid
        - name: producerUserId
          in: query
          required: false
          description: Optional producer/user ownership filter. Must be within the caller's resolved distribution scope.
          schema:
            type: string
            format: uuid
        - name: region
          in: query
          required: false
          schema:
            type: string
            maxLength: 80
        - name: lineOfBusiness
          in: query
          required: false
          schema:
            type: string
            maxLength: 80
      responses:
        "200":
          description: Daily operational workload report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationalWorkloadReport"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /operational-reports/workflow-aging:
    get:
      operationId: getWorkflowAgingReport
      summary: Get workflow aging and backlog report
      description: |
        Returns ABAC-scoped submission and renewal aging buckets, backlog by
        owner, and drilldown rows. Counts are computed after authorization
        filtering so hidden records are indistinguishable from non-matches.
      tags: [OperationalReports]
      parameters:
        - name: asOf
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: workflowTypes
          in: query
          required: false
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
              enum: [Submission, Renewal]
        - name: ownerUserId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: rootNodeId
          in: query
          required: false
          description: Optional hierarchy root filter. Must be within the caller's resolved distribution scope.
          schema:
            type: string
            format: uuid
        - name: territoryId
          in: query
          required: false
          description: Optional territory filter. Must be within the caller's resolved distribution scope.
          schema:
            type: string
            format: uuid
        - name: producerUserId
          in: query
          required: false
          description: Optional producer/user ownership filter. Must be within the caller's resolved distribution scope.
          schema:
            type: string
            format: uuid
        - name: region
          in: query
          required: false
          schema:
            type: string
            maxLength: 80
        - name: lineOfBusiness
          in: query
          required: false
          schema:
            type: string
            maxLength: 80
      responses:
        "200":
          description: Workflow aging and backlog report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowAgingReport"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /operational-reports/distribution-rollups:
    get:
      operationId: getDistributionRollupReport
      summary: Get hierarchy-aware distribution rollups
      description: |
        Returns production, workflow, or activity rollups grouped by hierarchy,
        territory, or producer. The service resolves the caller's distribution
        scope from role, hierarchy, territory, producer ownership, source-record
        visibility, and `asOf`; rows, totals, counts, and drilldown links are
        computed after that scope is applied. Hidden records are omitted rather
        than surfaced as hidden-source counts.
      tags: [OperationalReports]
      parameters:
        - name: groupBy
          in: query
          required: true
          schema:
            type: string
            enum: [Hierarchy, Territory, Producer]
        - name: metricFamily
          in: query
          required: true
          schema:
            type: string
            enum: [Production, Workflow, Activity]
        - name: asOf
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: rootNodeId
          in: query
          required: false
          description: Optional hierarchy root filter. Must be within the caller's resolved distribution scope.
          schema:
            type: string
            format: uuid
        - name: territoryId
          in: query
          required: false
          description: Optional territory filter. Must be within the caller's resolved distribution scope.
          schema:
            type: string
            format: uuid
        - name: producerUserId
          in: query
          required: false
          description: Optional producer/user ownership filter. Must be within the caller's resolved distribution scope.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Scoped distribution rollup report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DistributionRollupReport"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ──────────────────────────────────────────────────────────────
  # F0008 Broker Insights
  # ──────────────────────────────────────────────────────────────
  /broker-insights/scorecards:
    get:
      operationId: listBrokerInsightScorecards
      summary: List broker insight scorecards
      description: |
        Returns permission-filtered broker scorecards for the selected broker
        and time window. Metrics are computed after source-record authorization
        filtering and include denominator and refresh provenance. External users
        are out of scope.
      tags: [BrokerInsights]
      parameters:
        - name: brokerId
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: periodStart
          in: query
          required: true
          schema: { type: string, format: date }
        - name: periodEnd
          in: query
          required: true
          schema: { type: string, format: date }
        - name: producerId
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: territoryId
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: programId
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: lineOfBusiness
          in: query
          required: false
          schema: { type: string, maxLength: 80 }
        - name: region
          in: query
          required: false
          schema: { type: string, maxLength: 80 }
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Paginated broker insight scorecards
          content:
            application/json:
              schema:
                type: object
                required: [items, page, pageSize, totalCount, totalPages]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/BrokerInsightScorecard" }
                  page: { type: integer, minimum: 1 }
                  pageSize: { type: integer, minimum: 1 }
                  totalCount: { type: integer, minimum: 0 }
                  totalPages: { type: integer, minimum: 0 }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /broker-insights/{brokerId}/trends:
    parameters:
      - $ref: "#/components/parameters/BrokerId"
    get:
      operationId: getBrokerInsightTrend
      summary: Get broker insight trend and source rows
      description: |
        Returns trend points and permission-filtered source rows for one broker
        metric. Source rows reuse the GlobalSearchResult shape for navigation.
      tags: [BrokerInsights]
      parameters:
        - name: metricKey
          in: query
          required: true
          schema:
            type: string
            enum: [quoteCount, bindCount, quoteToBindRate, retentionRate, openPipelineCount, activityCount, productionAmount]
        - name: periodStart
          in: query
          required: true
          schema: { type: string, format: date }
        - name: periodEnd
          in: query
          required: true
          schema: { type: string, format: date }
        - name: bucket
          in: query
          required: false
          schema:
            type: string
            enum: [day, week, month, quarter]
            default: month
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Broker insight trend
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerInsightTrend"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /broker-insights/{brokerId}/benchmarks:
    parameters:
      - $ref: "#/components/parameters/BrokerId"
    get:
      operationId: getBrokerInsightBenchmark
      summary: Get authorized broker benchmark comparison
      description: |
        Compares the selected broker against an authorized peer set. Rank and
        percentile are suppressed when fewer than five visible peers match.
      tags: [BrokerInsights]
      parameters:
        - name: periodStart
          in: query
          required: true
          schema: { type: string, format: date }
        - name: periodEnd
          in: query
          required: true
          schema: { type: string, format: date }
        - name: peerSet
          in: query
          required: false
          schema:
            type: string
            enum: [visibleBrokerGroup, producer, territory, program, region]
            default: visibleBrokerGroup
      responses:
        "200":
          description: Authorized benchmark comparison
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerInsightBenchmark"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /broker-insights/{brokerId}/snapshot:
    parameters:
      - $ref: "#/components/parameters/BrokerId"
    get:
      operationId: getBrokerInsightSnapshot
      summary: Get broker review snapshot
      description: |
        Returns a read-only, review-ready broker insight snapshot. It does not
        create a file, email, timeline event, or saved report.
      tags: [BrokerInsights]
      parameters:
        - name: periodStart
          in: query
          required: true
          schema: { type: string, format: date }
        - name: periodEnd
          in: query
          required: true
          schema: { type: string, format: date }
      responses:
        "200":
          description: Broker insight review snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerInsightSnapshot"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ──────────────────────────────────────────────────────────────
  # Dashboard endpoints (NEW — F0001)
  # ──────────────────────────────────────────────────────────────
  /dashboard/kpis:
    get:
      operationId: getDashboardKpis
      summary: Get dashboard KPI metrics
      description: |
        Returns aggregated KPI metrics for the dashboard: active broker count,
        open submission count, renewal rate, and average turnaround days.
        Values are computed over the specified trailing time window and
        ABAC-scoped to the authenticated user's permissions.
      tags: [Dashboard]
      parameters:
        - name: periodDays
          in: query
          required: false
          description: |
            Trailing time window in days for rate and turnaround calculations
            (capped server-side). Active broker count is always current.
          schema:
            type: integer
            minimum: 1
            maximum: 730
            default: 90
      responses:
        "200":
          description: KPI metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardKpis"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dashboard/opportunities:
    get:
      operationId: getDashboardOpportunities
      summary: Get opportunities summary counts
      description: |
        Returns submission and renewal opportunity-stage counts grouped by
        non-terminal status. Used by the Opportunities summary widget.
        Counts are scoped to the selected trailing window and remain ABAC-scoped.
      tags: [Dashboard]
      parameters:
        - name: periodDays
          in: query
          required: false
          description: Trailing time window in days (capped server-side).
          schema:
            type: integer
            minimum: 1
            maximum: 730
            default: 180
      responses:
        "200":
          description: Opportunities summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardOpportunities"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dashboard/opportunities/outcomes:
    get:
      operationId: getDashboardOpportunityOutcomes
      summary: Get terminal outcomes summary
      description: |
        Returns terminal outcome counts, percentages, and average days-to-exit
        for opportunities in the selected trailing window.
      tags: [Dashboard]
      parameters:
        - name: periodDays
          in: query
          required: false
          description: Trailing time window in days (capped server-side).
          schema:
            type: integer
            minimum: 1
            maximum: 730
            default: 180
      responses:
        "200":
          description: Terminal outcomes summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpportunityOutcomes"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dashboard/opportunities/outcomes/{outcomeKey}/items:
    parameters:
      - name: outcomeKey
        in: path
        required: true
        description: Terminal outcome category key.
        schema:
          type: string
          enum: [bound, no_quote, declined, expired, lost_competitor]
    get:
      operationId: getDashboardOpportunityOutcomeItems
      summary: Get opportunity mini-cards for a terminal outcome
      description: |
        Returns up to 5 mini-card items for a specific terminal outcome in the
        selected trailing window, sorted by days-to-exit descending.
      tags: [Dashboard]
      parameters:
        - name: periodDays
          in: query
          required: false
          description: Trailing time window in days (capped server-side).
          schema:
            type: integer
            minimum: 1
            maximum: 730
            default: 180
      responses:
        "200":
          description: Terminal outcome mini-card items
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                  - totalCount
                properties:
                  items:
                    type: array
                    maxItems: 5
                    items:
                      $ref: "#/components/schemas/OpportunityMiniCard"
                  totalCount:
                    type: integer
                    description: Total items in this outcome category.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dashboard/opportunities/flow:
    get:
      operationId: getDashboardOpportunityFlow
      summary: Get opportunity transition flow (connected canvas data)
      description: |
        Returns node/link transition counts derived from WorkflowTransitions for
        submissions or renewals over a trailing time window. Used by the
        dashboard connected flow canvas to show stage progression, branching,
        and terminal exits. Includes optional avgDwellDays and emphasis hints
        for the Friction chapter overlay.
      tags: [Dashboard]
      parameters:
        - name: entityType
          in: query
          required: true
          description: Entity type to aggregate.
          schema:
            type: string
            enum: [submission, renewal]
        - name: periodDays
          in: query
          required: false
          description: Trailing time window in days (capped server-side).
          schema:
            type: integer
            minimum: 1
            maximum: 730
            default: 180
      responses:
        "200":
          description: Opportunity flow graph for Sankey visualization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpportunityFlow"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dashboard/opportunities/{entityType}/{status}/items:
    parameters:
      - name: entityType
        in: path
        required: true
        description: Entity type for opportunity items.
        schema:
          type: string
          enum: [submission, renewal]
      - name: status
        in: path
        required: true
        description: Workflow status to filter by.
        schema:
          type: string
    get:
      operationId: getDashboardOpportunityItems
      summary: Get opportunity mini-cards for a status
      description: |
        Returns up to 5 mini-card items for a specific opportunity stage, sorted
        by days-in-status descending (longest stuck first). Lazy-loaded by the
        frontend on hover/click of an opportunity stage pill. ABAC-scoped.
      tags: [Dashboard]
      responses:
        "200":
          description: Opportunity mini-card items
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                  - totalCount
                properties:
                  items:
                    type: array
                    maxItems: 5
                    items:
                      $ref: "#/components/schemas/OpportunityMiniCard"
                  totalCount:
                    type: integer
                    description: Total items in this status (for "View all N" link).
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dashboard/opportunities/{entityType}/{status}/breakdown:
    parameters:
      - name: entityType
        in: path
        required: true
        description: Entity type for the workflow stage.
        schema:
          type: string
          enum: [submission, renewal]
      - name: status
        in: path
        required: true
        description: Workflow status to filter by.
        schema:
          type: string
    get:
      operationId: getDashboardOpportunityBreakdown
      summary: Get grouped stage breakdown for a workflow status
      description: |
        Returns grouped counts for items currently in the specified workflow status.
        Supports assigned user, broker, program, line of business, and broker state
        dimensions. Results are ABAC-scoped and include an "Unknown" group for null values.
      tags: [Dashboard]
      parameters:
        - name: groupBy
          in: query
          required: true
          description: Grouping dimension.
          schema:
            type: string
            enum: [assignedUser, broker, program, lineOfBusiness, brokerState]
        - name: periodDays
          in: query
          required: false
          description: Trailing creation window in days (capped server-side).
          schema:
            type: integer
            minimum: 1
            maximum: 730
            default: 180
      responses:
        "200":
          description: Grouped stage breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpportunityBreakdown"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dashboard/opportunities/aging:
    get:
      operationId: getDashboardOpportunityAging
      summary: Get stage aging distribution with SLA bands
      description: |
        Returns per-status aging buckets and SLA context (warning/target thresholds with
        on-time/approaching/overdue counts) for submissions or renewals.
      tags: [Dashboard]
      parameters:
        - name: entityType
          in: query
          required: true
          description: Entity type to aggregate.
          schema:
            type: string
            enum: [submission, renewal]
        - name: periodDays
          in: query
          required: false
          description: Trailing time window in days (capped server-side).
          schema:
            type: integer
            minimum: 1
            maximum: 730
            default: 180
      responses:
        "200":
          description: Opportunity aging matrix with SLA context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpportunityAging"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dashboard/opportunities/hierarchy:
    get:
      operationId: getDashboardOpportunityHierarchy
      summary: Get opportunity hierarchy tree
      description: |
        Returns the entityType → colorGroup → status hierarchy tree used by composition
        visualizations.
      tags: [Dashboard]
      parameters:
        - name: periodDays
          in: query
          required: false
          description: Trailing time window in days (capped server-side).
          schema:
            type: integer
            minimum: 1
            maximum: 730
            default: 180
      responses:
        "200":
          description: Opportunity hierarchy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpportunityHierarchy"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dashboard/nudges:
    get:
      operationId: getDashboardNudges
      summary: Get nudge cards
      description: |
        Returns up to 3 prioritized nudge cards for the authenticated user.
        Priority order: overdue tasks > stale submissions (>5 days in status) >
        upcoming renewals (within 14 days). All results are ABAC-scoped and
        filtered by task ownership.
      tags: [Dashboard]
      responses:
        "200":
          description: Nudge cards
          content:
            application/json:
              schema:
                type: object
                required:
                  - nudges
                properties:
                  nudges:
                    type: array
                    maxItems: 3
                    items:
                      $ref: "#/components/schemas/NudgeCard"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ──────────────────────────────────────────────────────────────
  # User endpoints (NEW — F0004)
  # ──────────────────────────────────────────────────────────────
  /users:
    get:
      operationId: searchUsers
      summary: Search users for assignee picker
      description: |
        Searches UserProfile by DisplayName and Email (case-insensitive substring).
        Returns only active users by default. All internal roles have access.
        Does not expose IdpIssuer or IdpSubject.
      tags: [Users]
      parameters:
        - name: q
          in: query
          required: true
          description: Search query (min 2 characters). Searches DisplayName and Email.
          schema:
            type: string
            minLength: 2
            maxLength: 100
        - name: activeOnly
          in: query
          required: false
          description: If true (default), only active users returned.
          schema:
            type: boolean
            default: true
        - name: limit
          in: query
          required: false
          description: Max results (default 20, max 50).
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        "200":
          description: Matching users
          content:
            application/json:
              schema:
                type: object
                required:
                  - users
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ──────────────────────────────────────────────────────────────
  # Task endpoints (F0001 + F0003 + F0004)
  # ──────────────────────────────────────────────────────────────
  /tasks:
    get:
      operationId: listTasks
      summary: Paginated task list with filters and views
      description: |
        Returns a paginated, filterable list of tasks. Supports two views:
        - myWork (default): tasks assigned to the authenticated user
        - assignedByMe: tasks created by the authenticated user and assigned to others
          (requires DistributionManager or Admin role)
      tags: [Tasks]
      parameters:
        - name: view
          in: query
          required: false
          description: View mode. myWork (default) or assignedByMe (DistributionManager/Admin only).
          schema:
            type: string
            enum: [myWork, assignedByMe]
            default: myWork
        - name: status
          in: query
          required: false
          description: Comma-separated status filter.
          schema:
            type: string
        - name: priority
          in: query
          required: false
          description: Comma-separated priority filter.
          schema:
            type: string
        - name: dueDateFrom
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: dueDateTo
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: overdue
          in: query
          required: false
          schema:
            type: boolean
        - name: assigneeId
          in: query
          required: false
          description: Filter by assignee UserId (assignedByMe view only).
          schema:
            type: string
            format: uuid
        - name: linkedEntityType
          in: query
          required: false
          description: Comma-separated linked entity type filter.
          schema:
            type: string
        - name: createdById
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: sort
          in: query
          required: false
          description: Sort field.
          schema:
            type: string
            enum: [dueDate, priority, createdAt, status]
            default: dueDate
        - name: sortDir
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Paginated task list
          content:
            application/json:
              schema:
                type: object
                required: [data, page, pageSize, totalCount, totalPages]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TaskListItem"
                  page:
                    type: integer
                  pageSize:
                    type: integer
                  totalCount:
                    type: integer
                  totalPages:
                    type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /my/tasks:
    get:
      operationId: getMyTasks
      summary: Get tasks assigned to the authenticated user
      description: |
        Returns tasks assigned to the current user (matched by authenticated user's UserId),
        filtered to Open and InProgress status, sorted by DueDate ascending
        (soonest first, nulls last). Used by the My Tasks dashboard widget.
      tags: [Tasks]
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of tasks to return.
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        "200":
          description: User's tasks
          content:
            application/json:
              schema:
                type: object
                required:
                  - tasks
                  - totalCount
                properties:
                  tasks:
                    type: array
                    items:
                      $ref: "#/components/schemas/TaskSummary"
                  totalCount:
                    type: integer
                    description: Total open/in-progress tasks (for "View all" link).
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /tasks:
    post:
      operationId: createTask
      summary: Create a task
      description: |
        Creates a task. All internal roles can create self-assigned tasks.
        DistributionManager and Admin can assign tasks to any active internal user (F0004).
        Non-manager roles must set assignedToUserId to their own UserId.
      tags: [Tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCreateRequest"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /tasks/{taskId}:
    parameters:
      - $ref: "#/components/parameters/TaskId"
    get:
      operationId: getTaskById
      summary: Get task by id
      tags: [Tasks]
      responses:
        "200":
          description: Task details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateTask
      summary: Update task
      description: |
        Updates a task. Assignee can edit all fields including status.
        Creator (DistributionManager/Admin) can edit fields and reassign, but cannot
        change status on tasks assigned to others (F0004).
      tags: [Tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdateRequest"
      responses:
        "200":
          description: Task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteTask
      summary: Soft delete task
      description: |
        Soft-deletes a task. Assignee can delete own tasks. Creator (DistributionManager/Admin)
        can delete tasks they created (F0004).
      tags: [Tasks]
      responses:
        "204":
          description: Task deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────────────────────────
  # Timeline endpoints (NEW — dashboard activity feed)
  # ──────────────────────────────────────────────────────────────
  /timeline/events:
    get:
      operationId: listTimelineEvents
      summary: List timeline events
      description: |
        Returns recent ActivityTimelineEvents filtered by entity type.
        Used by the Broker Activity Feed dashboard widget and by entity 360 views.
        All results are ABAC-scoped.
      tags: [Timeline]
      parameters:
        - name: entityType
          in: query
          required: true
          description: Filter events by entity type.
          schema:
            type: string
            enum: [Broker, Account, Submission, Renewal, Task]
        - name: entityId
          in: query
          required: false
          description: Filter events for a specific entity.
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: false
          description: Page number (1-based). Default 1.
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          description: Events per page. Default 50, max 100.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: limit
          in: query
          required: false
          description: "Deprecated: use page/pageSize. Retained for BrokerUser path compatibility."
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated timeline events
          content:
            application/json:
              schema:
                type: object
                required: [data, page, pageSize, totalCount, totalPages]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TimelineEvent"
                  page:
                    type: integer
                  pageSize:
                    type: integer
                  totalCount:
                    type: integer
                  totalPages:
                    type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ──────────────────────────────────────────────────────────────
  # Document endpoints (F0020 — Documents + DocumentTemplates)
  # ──────────────────────────────────────────────────────────────
  /documents:
    get:
      operationId: listDocuments
      summary: List documents for a parent record
      description: >
        Paginated list of documents linked to a parent record (account, submission, policy, renewal).
        Classifications the caller cannot read are excluded regardless of the `classification` filter
        (closed-by-default per ADR-012). Ordered by latestUpload desc.
      tags: [Documents]
      parameters:
        - in: query
          name: parent.type
          required: true
          schema: { type: string, enum: [account, submission, policy, renewal] }
        - in: query
          name: parent.id
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: classification
          required: false
          description: Comma-separated subset of public,confidential,restricted.
          schema: { type: string }
        - in: query
          name: type
          required: false
          description: Comma-separated taxonomy types from configuration/taxonomy.yaml.
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        "200":
          description: Paginated documents list.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedDocumentList" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: uploadDocuments
      summary: Upload one or more documents (single + bulk)
      description: >
        Multipart upload to a parent record. Each accepted file is written to quarantine and a sidecar
        JSON is created. ADR-019 promote pipeline flips status to available after the configured hold.
        Allowed types: pdf, png, docx, xlsx, csv. Max per file: 5 MB. Max files per request: 25.
        Total request body cap: 50 MB.
      tags: [Documents]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [parentType, parentId, files]
              properties:
                parentType: { type: string, enum: [account, submission, policy, renewal] }
                parentId: { type: string, format: uuid }
                defaultClassification: { type: string, enum: [public, confidential, restricted], default: public }
                files:
                  type: array
                  minItems: 1
                  maxItems: 25
                  items:
                    type: string
                    format: binary
                metadata:
                  type: array
                  description: Optional per-file classification/type/tags and type-specific JSON metadata aligned by index with files[].
                  items: { $ref: "#/components/schemas/DocumentUploadFileMetadata" }
      responses:
        "202":
          description: All files accepted and quarantined.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DocumentUploadResponse" }
        "207":
          description: Partial accept — at least one file accepted and at least one rejected.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DocumentUploadResponse" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          description: File or batch exceeds size cap.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }
        "415":
          description: Disallowed content type.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }

  /documents/{documentId}:
    get:
      operationId: getDocumentDetail
      summary: Get document detail (sidecar JSON + previewUrls)
      tags: [Documents]
      parameters:
        - in: path
          name: documentId
          required: true
          schema: { type: string, pattern: "^doc_[0-9A-HJKMNP-TV-Z]{26}$" }
      responses:
        "200":
          description: Document detail with sidecar JSON and previewUrls aligned to versions[].
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DocumentDetail" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /documents/{documentId}/replace:
    put:
      operationId: replaceDocument
      summary: Replace a document with an immutable new version
      description: >
        Writes a new -v{N+1} binary colocated with prior versions. Quarantine pipeline applies.
        Classification cannot change via replace (use PATCH /documents/{id}/metadata).
      tags: [Documents]
      parameters:
        - in: path
          name: documentId
          required: true
          schema: { type: string, pattern: "^doc_[0-9A-HJKMNP-TV-Z]{26}$" }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "202":
          description: New version accepted and quarantined.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DocumentReplaceResponse" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Latest version is not in available state and cannot be replaced yet.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }
        "413":
          description: File exceeds size cap.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }
        "415":
          description: Disallowed content type.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }

  /documents/{documentId}/metadata:
    patch:
      operationId: updateDocumentMetadata
      summary: Update document metadata without creating a new binary version
      tags: [Documents]
      parameters:
        - in: path
          name: documentId
          required: true
          schema: { type: string, pattern: "^doc_[0-9A-HJKMNP-TV-Z]{26}$" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DocumentMetadataUpdateRequest" }
      responses:
        "200":
          description: Metadata updated; sidecar JSON `events[]` carries the audit row.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DocumentDetail" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /documents/metadata-schemas:
    get:
      operationId: listDocumentMetadataSchemas
      summary: List active document metadata schemas
      description: >
        Returns the current active JSON Schema for each document type from
        <docroot>/configuration/metadata-schemas/registry.yaml. Documents remain pinned to
        the metadataSchema version stored in their sidecar JSON.
      tags: [Documents]
      responses:
        "200":
          description: Active document metadata schema registry.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DocumentMetadataSchemaRegistry" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /documents/{documentId}/versions/{versionRef}/binary:
    get:
      operationId: downloadDocumentVersion
      summary: Download a document version (current or prior)
      tags: [Documents]
      parameters:
        - in: path
          name: documentId
          required: true
          schema: { type: string, pattern: "^doc_[0-9A-HJKMNP-TV-Z]{26}$" }
        - in: path
          name: versionRef
          required: true
          description: "`latest` resolves to the latest available version; otherwise an integer matching versions[].n."
          schema: { type: string, pattern: "^(latest|[1-9][0-9]*)$" }
      responses:
        "200":
          description: Binary stream.
          headers:
            Content-Disposition:
              schema: { type: string }
              description: '`attachment; filename="{logicalName}-v{N}.{ext}"`'
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Requested version is not in available state.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }

  /documents/completeness:
    get:
      operationId: getDocumentCompleteness
      summary: Soft completeness signal — counts by category and classification
      description: >
        Read-only summary other features consume. Counts are masked by the caller's classification
        access; this endpoint never returns isComplete (consumers compose their own logic).
      tags: [Documents]
      parameters:
        - in: query
          name: parent.type
          required: true
          schema: { type: string, enum: [account, submission, policy, renewal] }
        - in: query
          name: parent.id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Completeness summary.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DocumentCompletenessSignal" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /document-templates:
    get:
      operationId: listDocumentTemplates
      summary: List document templates
      tags: [DocumentTemplates]
      parameters:
        - in: query
          name: type
          schema: { type: string }
        - in: query
          name: classification
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        "200":
          description: Templates list.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedDocumentTemplateList" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: uploadDocumentTemplate
      summary: Upload a new document template
      tags: [DocumentTemplates]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
                classification: { type: string, enum: [public, confidential, restricted], default: public }
                tags:
                  type: array
                  maxItems: 10
                  items: { type: string, maxLength: 32 }
      responses:
        "202":
          description: Template upload accepted and quarantined.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DocumentTemplate" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          description: File exceeds size cap.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }
        "415":
          description: Disallowed content type.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }

  /document-templates/{templateId}/link:
    post:
      operationId: linkDocumentTemplateToParent
      summary: Materialise a template into a parent record
      description: >
        Copies the template binary into the parent's documents folder via the quarantine pipeline.
        The new parent-side document carries `provenance.source = "template:{templateId}"`.
      tags: [DocumentTemplates]
      parameters:
        - in: path
          name: templateId
          required: true
          schema: { type: string, pattern: "^doc_[0-9A-HJKMNP-TV-Z]{26}$" }
        - in: query
          name: parent.type
          required: true
          schema: { type: string, enum: [account, submission, policy, renewal] }
        - in: query
          name: parent.id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "202":
          description: Template materialised into the parent record (still subject to quarantine).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DocumentUploadAcceptedItem" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────────────────────────
  # Outbound document generation (F0027)
  # ──────────────────────────────────────────────────────────────
  /outbound-documents/preview:
    post:
      operationId: previewOutboundDocument
      summary: Preview an outbound generated document
      description: >
        Validates merge data and returns an ephemeral preview for COI, ACORD, or reusable proposal output.
        Preview never creates a document sidecar and cannot be used as final issue input.
      tags: [OutboundDocumentGeneration]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GeneratedDocumentRequest" }
      responses:
        "200":
          description: Preview status, diagnostics, and optional short-lived preview URL.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GeneratedDocumentPreviewResponse" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Source record or template is not eligible for preview.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }

  /outbound-documents/issue:
    post:
      operationId: issueOutboundDocument
      summary: Issue a final outbound generated document
      description: >
        Reassembles source data server-side, renders a final PDF, and stores the generated artifact
        through the ADR-012 document repository. Issue is explicit and auditable.
      tags: [OutboundDocumentGeneration]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GeneratedDocumentRequest" }
      responses:
        "201":
          description: Generated artifact issued and stored as a parent-linked document.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GeneratedDocumentIssueResponse" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Source record or template is not eligible for issue.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }

  /outbound-documents/{documentId}/regenerate:
    post:
      operationId: regenerateOutboundDocument
      summary: Regenerate a previously issued outbound generated document
      description: >
        Creates a new generated artifact linked to a prior issued generated document. The prior issued
        artifact remains immutable and downloadable.
      tags: [OutboundDocumentGeneration]
      parameters:
        - in: path
          name: documentId
          required: true
          schema: { type: string, pattern: "^doc_[0-9A-HJKMNP-TV-Z]{26}$" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GeneratedDocumentRequest" }
      responses:
        "201":
          description: Replacement generated artifact issued as a new document.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GeneratedDocumentIssueResponse" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Prior artifact, source record, or template is not eligible for regeneration.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }

  # ──────────────────────────────────────────────────────────────
  # F0035 Session Continuity telemetry ingest (ADR-024)
  # ──────────────────────────────────────────────────────────────
  /internal/telemetry/session-continuity:
    post:
      operationId: ingestSessionContinuityTelemetry
      summary: Ingest a batch of F0035 session-continuity telemetry events
      description: >
        Accepts a batch of session-continuity events emitted by the frontend
        (silent renewal, idle warning, forced redirect, auth-error classification,
        form-snapshot skip). Backend validates each event against
        `planning-mds/schemas/session-continuity-event.schema.json` and writes
        accepted events to Serilog under category `Nebula.Session.Continuity`.

        Fire-and-forget contract: failures here MUST NOT affect frontend
        session-continuity behaviour. The endpoint is not publicly addressable;
        same authenticated bearer-token boundary as other protected APIs.

        Governed by ADR-024 §6. PII boundary enforced per
        `session-continuity-event.schema.json` (UserId + session_id only;
        no email/name/IP/raw tokens/broker_tenant_id/role list).
      tags: [SessionTelemetry]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [events]
              additionalProperties: false
              properties:
                events:
                  type: array
                  minItems: 1
                  maxItems: 10
                  description: Batch of 1-10 session-continuity events.
                  items:
                    $ref: "https://nebula.local/schemas/session-continuity-event.schema.json"
      responses:
        "202":
          description: Events accepted for async write to Serilog. Body is empty.
        "400":
          description: One or more events failed schema validation.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ──────────────────────────────────────────────────────────────
  # F0032 Admin configuration and reference data console
  # ──────────────────────────────────────────────────────────────
  /admin/configuration-domains:
    get:
      operationId: listAdminConfigurationDomains
      summary: List governed admin configuration domains
      description: |
        Returns supported and read-only configuration domains with current
        published version, draft state, validation state, and refresh status.
        Unsupported domains expose no editable payload.
      tags: [AdminConfiguration]
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [Supported, Unsupported, ReadOnly]
      responses:
        "200":
          description: Admin configuration domain catalog
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminConfigurationDomain"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/configuration-domains/{domainKey}:
    parameters:
      - $ref: "#/components/parameters/ConfigurationDomainKey"
    get:
      operationId: getAdminConfigurationDomain
      summary: Get configuration domain detail
      tags: [AdminConfiguration]
      responses:
        "200":
          description: Domain detail including current draft and latest published state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminConfigurationDomainDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/configuration-domains/{domainKey}/drafts:
    parameters:
      - $ref: "#/components/parameters/ConfigurationDomainKey"
    post:
      operationId: createAdminConfigurationDraft
      summary: Create a configuration draft from the current published version
      description: |
        Creates a draft payload for one supported domain. The current published
        version remains authoritative until a later publish succeeds.
      tags: [AdminConfiguration]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminConfigurationDraftCreateRequest"
      responses:
        "201":
          description: Configuration draft created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminConfigurationDraft"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /admin/configuration-drafts/{draftId}:
    parameters:
      - $ref: "#/components/parameters/ConfigurationDraftId"
    patch:
      operationId: updateAdminConfigurationDraft
      summary: Update a configuration draft payload
      description: Requires `If-Match`; stale row versions return `412`.
      tags: [AdminConfiguration]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminConfigurationDraftUpdateRequest"
      responses:
        "200":
          description: Configuration draft updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminConfigurationDraft"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"

  /admin/configuration-drafts/{draftId}/validation:
    parameters:
      - $ref: "#/components/parameters/ConfigurationDraftId"
    post:
      operationId: validateAdminConfigurationDraft
      summary: Validate a configuration draft
      description: |
        Runs schema and domain-adapter validation for the current draft payload.
        A failed validation returns 200 with `status=Failed`; malformed requests
        still use ProblemDetails.
      tags: [AdminConfiguration]
      responses:
        "200":
          description: Validation result for the draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminConfigurationValidationResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /admin/configuration-drafts/{draftId}/comparison:
    parameters:
      - $ref: "#/components/parameters/ConfigurationDraftId"
    get:
      operationId: compareAdminConfigurationDraft
      summary: Compare a draft against the current published version
      tags: [AdminConfiguration]
      responses:
        "200":
          description: Draft comparison summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminConfigurationValidationResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/configuration-drafts/{draftId}/publish:
    parameters:
      - $ref: "#/components/parameters/ConfigurationDraftId"
    post:
      operationId: publishAdminConfigurationDraft
      summary: Publish a validated configuration draft
      description: |
        Publishes a draft only when the latest validation passed and matches the
        current draft payload hash. Publish appends audit evidence and returns
        downstream refresh status.
      tags: [AdminConfiguration]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminConfigurationPublishRequest"
      responses:
        "200":
          description: Published configuration set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminConfigurationPublishedSet"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /admin/configuration-domains/{domainKey}/rollback:
    parameters:
      - $ref: "#/components/parameters/ConfigurationDomainKey"
    post:
      operationId: rollbackAdminConfigurationDomain
      summary: Roll back a domain to a previous eligible published version
      tags: [AdminConfiguration]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminConfigurationPublishRequest"
      responses:
        "200":
          description: New published configuration set created from rollback
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminConfigurationPublishedSet"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /admin/configuration-audit-events:
    get:
      operationId: listAdminConfigurationAuditEvents
      summary: Search permission-safe configuration audit history
      tags: [AdminConfiguration]
      parameters:
        - name: domainKey
          in: query
          required: false
          schema:
            type: string
            enum: [queue-routing, workflow-sla-thresholds, search-report-defaults, template-metadata]
        - name: action
          in: query
          required: false
          schema:
            type: string
            enum: [DraftCreated, DraftUpdated, ValidationPassed, ValidationFailed, Published, RollbackPublished]
        - name: actorUserId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Configuration audit events
          content:
            application/json:
              schema:
                type: object
                required: [items, page, pageSize, totalCount]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminConfigurationAuditEvent"
                  page: { type: integer, minimum: 1 }
                  pageSize: { type: integer, minimum: 1, maximum: 100 }
                  totalCount: { type: integer, minimum: 0 }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    BrokerSearchQuery:
      name: q
      in: query
      required: false
      description: Case-insensitive broker name search. License number search is exact match only. Leading/trailing spaces are trimmed.
      schema:
        type: string
        minLength: 1
        maxLength: 100
    BrokerStatusFilter:
      name: status
      in: query
      required: false
      description: Optional broker status filter.
      schema:
        type: string
        enum:
          - Active
          - Inactive
          - Pending
    BrokerId:
      name: brokerId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DistributionNodeId:
      name: nodeId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TerritoryId:
      name: territoryId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Depth:
      name: depth
      in: query
      required: false
      description: Maximum descendant levels to return for lazy expansion.
      schema:
        type: integer
        minimum: 1
        maximum: 10
        default: 2
    AsOfDate:
      name: asOf
      in: query
      required: false
      description: Point-in-time date for effective-dated reads. Defaults to current date.
      schema:
        type: string
        format: date
    OwnershipScopeType:
      name: scopeType
      in: query
      required: true
      schema:
        $ref: "#/components/schemas/ProducerOwnershipScopeType"
    OwnershipScopeId:
      name: scopeId
      in: query
      required: true
      schema:
        type: string
        format: uuid
    TerritoryMemberType:
      name: memberType
      in: query
      required: true
      schema:
        $ref: "#/components/schemas/TerritoryMemberType"
    TerritoryMemberId:
      name: memberId
      in: query
      required: true
      schema:
        type: string
        format: uuid
    ContactId:
      name: contactId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CarrierMarketId:
      name: carrierMarketId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AppetiteNoteId:
      name: appetiteNoteId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AppointmentId:
      name: appointmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SubmissionId:
      name: submissionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RenewalId:
      name: renewalId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AccountId:
      name: accountId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    QueueId:
      name: queueId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RuleId:
      name: ruleId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CoverageWindowId:
      name: coverageWindowId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    QueueItemId:
      name: queueItemId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SavedViewId:
      name: savedViewId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ConfigurationDomainKey:
      name: domainKey
      in: path
      required: true
      schema:
        type: string
        enum: [queue-routing, workflow-sla-thresholds, search-report-defaults, template-metadata]
    ConfigurationDraftId:
      name: draftId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PolicyId:
      name: policyId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PolicyVersionId:
      name: versionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PolicySearchQuery:
      name: q
      in: query
      required: false
      description: Case-insensitive search across policyNumber and account display name. Leading/trailing spaces trimmed.
      schema:
        type: string
        minLength: 1
        maxLength: 100
    PolicyStatusFilter:
      name: status
      in: query
      required: false
      description: Optional policy status filter.
      schema:
        type: string
        enum: [Pending, Issued, Cancelled, Expired]
    PolicyLobFilter:
      name: lineOfBusiness
      in: query
      required: false
      description: Optional LOB filter.
      schema:
        type: string
        enum:
          - Property
          - GeneralLiability
          - CommercialAuto
          - WorkersCompensation
          - ProfessionalLiability
          - Marine
          - Umbrella
          - Surety
          - Cyber
          - DirectorsOfficers
    ProductVersionId:
      name: productVersionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    LobStagePath:
      name: stage
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/LobStage"
    LobStageFilter:
      name: stage
      in: query
      required: false
      description: Optional lifecycle stage filter for active bundle bootstrap.
      schema:
        $ref: "#/components/schemas/LobStage"
    PolicyCarrierFilter:
      name: carrierId
      in: query
      required: false
      schema:
        type: string
        format: uuid
    PolicyBrokerFilter:
      name: brokerOfRecordId
      in: query
      required: false
      schema:
        type: string
        format: uuid
    PolicyExpiringBeforeFilter:
      name: expiringBefore
      in: query
      required: false
      description: Return policies with expirationDate on or before this date.
      schema:
        type: string
        format: date
    PolicySortBy:
      name: sort
      in: query
      required: false
      description: Sort order.
      schema:
        type: string
        enum:
          - expirationDate:asc
          - expirationDate:desc
          - effectiveDate:asc
          - effectiveDate:desc
          - policyNumber:asc
          - policyNumber:desc
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: >
        Client-supplied idempotency token. Retried writes with the same key return the prior response
        (deduplicated by key + route + payload hash). See ADR-018.
      schema:
        type: string
        maxLength: 64
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: >
        Optimistic concurrency token. Must equal the `rowVersion` value returned
        in the last GET response for this resource. If the resource has been
        modified since then, the server returns HTTP 412 with code=precondition_failed.
      schema:
        type: string
    Page:
      name: page
      in: query
      required: false
      description: Page number (1-based).
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      required: false
      description: Items per page.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    BadRequest:
      description: Invalid input
      headers:
        X-Request-Id:
          $ref: "#/components/headers/XRequestId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    Unauthorized:
      description: Authentication required or invalid token
      headers:
        X-Request-Id:
          $ref: "#/components/headers/XRequestId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    Forbidden:
      description: Authenticated but not allowed
      headers:
        X-Request-Id:
          $ref: "#/components/headers/XRequestId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    NotFound:
      description: Resource not found
      headers:
        X-Request-Id:
          $ref: "#/components/headers/XRequestId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    Conflict:
      description: Conflict with current state (for example invalid transition)
      headers:
        X-Request-Id:
          $ref: "#/components/headers/XRequestId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    PreconditionFailed:
      description: Precondition failed (for example stale If-Match value)
      headers:
        X-Request-Id:
          $ref: "#/components/headers/XRequestId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    UnprocessableContent:
      description: Request semantic validation failed
      headers:
        X-Request-Id:
          $ref: "#/components/headers/XRequestId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    TooManyRequests:
      description: Rate limit exceeded
      headers:
        X-Request-Id:
          $ref: "#/components/headers/XRequestId"
        Retry-After:
          description: Suggested delay before retrying the request.
          schema:
            type: string
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    ServiceUnavailable:
      description: Service or dependency unavailable
      headers:
        X-Request-Id:
          $ref: "#/components/headers/XRequestId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

  headers:
    XRequestId:
      description: Correlation identifier echoed for request tracing.
      schema:
        type: string

  schemas:
    # ── Error Contract ──────────────────────────────────────────
    ProblemDetails:
      type: object
      description: RFC Problem Details payload with Nebula-specific extension fields. Used with application/problem+json. See `planning-mds/architecture/error-codes.md` for the authoritative code list.
      required:
        - type
        - title
        - status
        - code
        - traceId
      properties:
        type:
          type: string
          format: uri
          description: URI reference that identifies the problem type.
        title:
          type: string
          description: Short, human-readable summary of the problem.
        status:
          type: integer
          minimum: 400
          maximum: 599
          description: HTTP status code generated for this problem instance.
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence.
        instance:
          type: string
          format: uri
          description: URI reference identifying this specific occurrence.
        code:
          type: string
          description: "Stable machine-readable domain error code. See planning-mds/architecture/error-codes.md for the authoritative list."
        traceId:
          type: string
          description: Correlation identifier for diagnostics and tracing.
        errors:
          type: object
          description: Optional validation error map keyed by field.
          additionalProperties:
            type: array
            items:
              type: string

    # ── Admin Configuration Schemas (F0032) ─────────────────────
    AdminConfigurationDomain:
      type: object
      required: [domainKey, displayName, owningModule, status, editableSchemaRef, supportsRollback, currentPublishedVersion, draftStatus, lastValidationStatus, lastPublishedBy, lastPublishedAt]
      properties:
        domainKey: { type: string, enum: [queue-routing, workflow-sla-thresholds, search-report-defaults, template-metadata] }
        displayName: { type: string, minLength: 1, maxLength: 120 }
        owningModule: { type: string, enum: [F0022, F0023, F0027, F0032] }
        status: { type: string, enum: [Supported, Unsupported, ReadOnly] }
        editableSchemaRef: { type: string, maxLength: 200 }
        supportsRollback: { type: boolean }
        currentPublishedVersion: { type: integer, minimum: 1, nullable: true }
        draftStatus: { type: string, enum: [Draft, ValidationFailed, ValidationPassed, Published, Superseded], nullable: true }
        lastValidationStatus: { type: string, enum: [Passed, Failed], nullable: true }
        lastPublishedBy: { type: string, nullable: true, format: uuid }
        lastPublishedAt: { type: string, format: date-time, nullable: true }

    AdminConfigurationDomainDetail:
      type: object
      required: [domain, activeDraft, currentPublishedSet, refreshStatuses, publishedSets]
      properties:
        domain: { $ref: "#/components/schemas/AdminConfigurationDomain" }
        activeDraft:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/AdminConfigurationDraft"
        currentPublishedSet:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/AdminConfigurationPublishedSet"
        refreshStatuses:
          type: array
          items:
            $ref: "#/components/schemas/AdminConfigurationRefreshStatus"
        publishedSets:
          type: array
          items:
            $ref: "#/components/schemas/AdminConfigurationPublishedSet"

    AdminConfigurationDraft:
      type: object
      required: [id, domainKey, basePublishedVersion, draftVersion, status, payload, payloadHash, createdByUserId, createdAt, updatedAt, rowVersion]
      properties:
        id: { type: string, format: uuid }
        domainKey: { type: string, enum: [queue-routing, workflow-sla-thresholds, search-report-defaults, template-metadata] }
        basePublishedVersion: { type: integer, minimum: 1 }
        draftVersion: { type: integer, minimum: 1 }
        status: { type: string, enum: [Draft, ValidationFailed, Validated, Published, Abandoned] }
        payload:
          type: object
          additionalProperties: true
        payloadHash:
          type: string
          pattern: "^sha256:[0-9a-f]{64}$"
        latestValidation:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/AdminConfigurationValidationResult"
        createdByUserId: { type: string, format: uuid }
        updatedByUserId: { type: string, format: uuid, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        rowVersion: { type: string }

    AdminConfigurationDraftCreateRequest:
      type: object
      required: [reason]
      properties:
        reason: { type: string, minLength: 1, maxLength: 500 }

    AdminConfigurationDraftUpdateRequest:
      type: object
      required: [payload, reason]
      properties:
        payload:
          type: object
          additionalProperties: true
        reason: { type: string, minLength: 1, maxLength: 500 }

    AdminConfigurationValidationResult:
      type: object
      required: [id, draftId, status, draftPayloadHash, blockingErrors, warnings, compareSummary]
      properties:
        id: { type: string, format: uuid }
        draftId: { type: string, format: uuid }
        status: { type: string, enum: [Passed, Failed, Compared] }
        draftPayloadHash:
          type: string
          pattern: "^sha256:[0-9a-f]{64}$"
        blockingErrors:
          type: array
          items: { $ref: "#/components/schemas/AdminConfigurationValidationIssue" }
        warnings:
          type: array
          items: { $ref: "#/components/schemas/AdminConfigurationValidationIssue" }
        compareSummary:
          type: array
          items: { $ref: "#/components/schemas/AdminConfigurationChangeSummary" }

    AdminConfigurationValidationIssue:
      type: object
      required: [code, message]
      properties:
        code: { type: string, maxLength: 80 }
        path: { type: string, nullable: true, maxLength: 200 }
        message: { type: string, minLength: 1, maxLength: 500 }

    AdminConfigurationChangeSummary:
      type: object
      required: [path, changeType]
      properties:
        path: { type: string, maxLength: 200 }
        changeType: { type: string, enum: [Added, Modified, Removed, Unchanged] }
        before: { nullable: true }
        after: { nullable: true }

    AdminConfigurationPublishRequest:
      type: object
      required: [reason]
      properties:
        reason: { type: string, minLength: 1, maxLength: 500 }
        targetPublishedVersion: { type: integer, minimum: 1, nullable: true }

    AdminConfigurationPublishedSet:
      type: object
      required: [id, domainKey, publishedVersion, payloadSnapshot, payloadHash, publishedByUserId, publishedAt, publishReason, refreshStatuses]
      properties:
        id: { type: string, format: uuid }
        domainKey: { type: string, enum: [queue-routing, workflow-sla-thresholds, search-report-defaults, template-metadata] }
        publishedVersion: { type: integer, minimum: 1 }
        payloadSnapshot:
          type: object
          additionalProperties: true
        payloadHash:
          type: string
          pattern: "^sha256:[0-9a-f]{64}$"
        publishedByUserId: { type: string, format: uuid }
        publishedAt: { type: string, format: date-time }
        publishReason: { type: string, minLength: 1, maxLength: 500 }
        refreshStatuses:
          type: array
          items: { $ref: "#/components/schemas/AdminConfigurationRefreshStatus" }

    AdminConfigurationRefreshStatus:
      type: object
      required: [id, consumerKey, status, refreshedAt, errorSummary]
      properties:
        id: { type: string, format: uuid }
        consumerKey: { type: string, maxLength: 120 }
        status: { type: string, enum: [Refreshed, Pending, Failed] }
        refreshedAt: { type: string, format: date-time, nullable: true }
        errorSummary: { type: string, nullable: true, maxLength: 500 }

    AdminConfigurationAuditEvent:
      type: object
      required: [id, domainKey, action, outcome, actorUserId, createdAt, summary]
      properties:
        id: { type: string, format: uuid }
        domainKey: { type: string, enum: [queue-routing, workflow-sla-thresholds, search-report-defaults, template-metadata] }
        draftId: { type: string, format: uuid, nullable: true }
        publishedSetId: { type: string, format: uuid, nullable: true }
        action: { type: string, enum: [DraftCreated, DraftUpdated, ValidationPassed, ValidationFailed, Published, RollbackPublished] }
        outcome: { type: string, enum: [Succeeded, Passed, Failed] }
        actorUserId: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }
        summary:
          type: object
          additionalProperties: true

    # ── Work Queue Schemas (F0022) ──────────────────────────────
    WorkQueue:
      type: object
      required: [id, name, workType, status, isFallback, openItemCount, overdueItemCount, rowVersion]
      properties:
        id: { type: string, format: uuid }
        name: { type: string, minLength: 1, maxLength: 120 }
        description: { type: string, nullable: true, maxLength: 1000 }
        workType: { type: string, enum: [Task, Submission, Renewal, Mixed] }
        status: { type: string, enum: [Active, Inactive] }
        isFallback: { type: boolean }
        openItemCount: { type: integer, minimum: 0 }
        overdueItemCount: { type: integer, minimum: 0 }
        rowVersion: { type: string }

    WorkQueueUpsertRequest:
      type: object
      required: [name, workType, status]
      properties:
        name: { type: string, minLength: 1, maxLength: 120 }
        description: { type: string, nullable: true, maxLength: 1000 }
        workType: { type: string, enum: [Task, Submission, Renewal, Mixed] }
        status: { type: string, enum: [Active, Inactive] }

    QueueMemberUpsertRequest:
      type: object
      required: [members]
      properties:
        members:
          type: array
          items:
            type: object
            required: [userProfileId, role, effectiveFrom]
            properties:
              userProfileId: { type: string, format: uuid }
              role: { type: string, enum: [Member, Manager, Backup] }
              effectiveFrom: { type: string, format: date }
              effectiveTo: { type: string, format: date, nullable: true }

    AssignmentRule:
      type: object
      required: [id, workQueueId, ruleType, precedence, version, status, conditions, matchReasonTemplate, rowVersion]
      properties:
        id: { type: string, format: uuid }
        workQueueId: { type: string, format: uuid }
        ruleType: { type: string, enum: [ManualOverride, Coverage, TerritoryOwnership, WorkloadBalance, Fallback] }
        precedence: { type: integer, minimum: 1, maximum: 999 }
        version: { type: integer, minimum: 1 }
        status: { type: string, enum: [Draft, Active, Superseded, Disabled] }
        conditions:
          type: object
          additionalProperties: true
        matchReasonTemplate: { type: string, minLength: 1, maxLength: 500 }
        rowVersion: { type: string }

    AssignmentRuleUpsertRequest:
      type: object
      required: [workQueueId, ruleType, precedence, status, conditions, matchReasonTemplate]
      properties:
        workQueueId: { type: string, format: uuid }
        ruleType: { type: string, enum: [ManualOverride, Coverage, TerritoryOwnership, WorkloadBalance, Fallback] }
        precedence: { type: integer, minimum: 1, maximum: 999 }
        status: { type: string, enum: [Draft, Active, Disabled] }
        conditions:
          type: object
          additionalProperties: true
        matchReasonTemplate: { type: string, minLength: 1, maxLength: 500 }

    CoverageWindow:
      type: object
      required: [id, coveredUserId, backupUserId, startsAt, endsAt, status, rowVersion]
      properties:
        id: { type: string, format: uuid }
        coveredUserId: { type: string, format: uuid }
        backupUserId: { type: string, format: uuid }
        workQueueId: { type: string, format: uuid, nullable: true }
        startsAt: { type: string, format: date-time }
        endsAt: { type: string, format: date-time }
        status: { type: string, enum: [Active, Cancelled, Expired] }
        reason: { type: string, nullable: true, maxLength: 500 }
        rowVersion: { type: string }

    CoverageWindowUpsertRequest:
      type: object
      required: [coveredUserId, backupUserId, startsAt, endsAt, status]
      properties:
        coveredUserId: { type: string, format: uuid }
        backupUserId: { type: string, format: uuid }
        workQueueId: { type: string, format: uuid, nullable: true }
        startsAt: { type: string, format: date-time }
        endsAt: { type: string, format: date-time }
        status: { type: string, enum: [Active, Cancelled] }
        reason: { type: string, nullable: true, maxLength: 500 }

    QueueWorkItem:
      type: object
      required: [id, workQueueId, sourceType, sourceId, queueStatus, routedAt, ageHours, rowVersion]
      properties:
        id: { type: string, format: uuid }
        workQueueId: { type: string, format: uuid }
        sourceType: { type: string, enum: [Task, Submission, Renewal] }
        sourceId: { type: string, format: uuid }
        sourceLabel: { type: string, maxLength: 200 }
        assignedToUserId: { type: string, format: uuid, nullable: true }
        assignedToDisplayName: { type: string, nullable: true }
        queueStatus: { type: string, enum: [Open, InProgress, Closed, Skipped] }
        routedAt: { type: string, format: date-time }
        ageHours: { type: integer, minimum: 0 }
        ruleVersion: { type: string, nullable: true }
        matchReason: { type: string, nullable: true, maxLength: 500 }
        rowVersion: { type: string }

    QueueReassignmentRequest:
      type: object
      required: [assignedToUserId, overrideReason]
      properties:
        assignedToUserId: { type: string, format: uuid }
        overrideReason: { type: string, minLength: 3, maxLength: 500 }

    QueueRebalanceRequest:
      type: object
      required: [queueWorkItemIds, assignedToUserId, overrideReason]
      properties:
        queueWorkItemIds:
          type: array
          minItems: 1
          maxItems: 100
          items: { type: string, format: uuid }
        assignedToUserId: { type: string, format: uuid }
        overrideReason: { type: string, minLength: 3, maxLength: 500 }

    RoutingEvent:
      type: object
      required: [id, sourceType, sourceId, outcome, reasonCode, occurredAt]
      properties:
        id: { type: string, format: uuid }
        queueWorkItemId: { type: string, format: uuid, nullable: true }
        sourceType: { type: string, enum: [Task, Submission, Renewal] }
        sourceId: { type: string, format: uuid }
        outcome: { type: string, enum: [Matched, Fallback, Skipped, Reassigned, Rebalanced, Exception] }
        reasonCode: { type: string, maxLength: 60 }
        ruleVersion: { type: string, nullable: true, maxLength: 60 }
        selectedQueueId: { type: string, format: uuid, nullable: true }
        selectedAssigneeId: { type: string, format: uuid, nullable: true }
        actorUserId: { type: string, format: uuid, nullable: true }
        occurredAt: { type: string, format: date-time }

    # ── Broker Schemas ──────────────────────────────────────────
    Broker:
      type: object
      description: >
        Broker profile. If Status=Inactive, email and phone fields are returned
        as null (masking sentinel). The frontend should display these as "Masked"
        or equivalent placeholder text rather than treating them as absent data.
      required:
        - id
        - legalName
        - licenseNumber
        - state
        - status
      properties:
        id:
          type: string
          format: uuid
        legalName:
          type: string
        licenseNumber:
          type: string
        state:
          type: string
        status:
          type: string
          enum:
            - Active
            - Inactive
            - Pending
        email:
          type: string
          format: email
          nullable: true
          description: >
            Returned as null when Status=Inactive (masking sentinel).
            Consumers must treat null on an inactive broker as "masked", not "missing".
        phone:
          type: string
          pattern: "^\\+?[1-9]\\d{7,14}$"
          nullable: true
          description: >
            Returned as null when Status=Inactive (masking sentinel).
            Consumers must treat null on an inactive broker as "masked", not "missing".
        rowVersion:
          type: string
          description: >
            Optimistic concurrency token. Clients must echo this value in the
            If-Match header on subsequent PUT requests. Value is opaque; do not
            parse or compare numerically.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BrokerCreateRequest:
      type: object
      description: >
        Payload to create a broker. Status is not included; the server
        defaults new brokers to "Pending".
      required:
        - legalName
        - licenseNumber
        - state
      properties:
        legalName:
          type: string
          minLength: 1
          maxLength: 255
        licenseNumber:
          type: string
          minLength: 1
          maxLength: 50
        state:
          type: string
          pattern: "^[A-Z]{2}$"
          description: Two-letter US state code (e.g. CA, NY).
        email:
          type: string
          format: email
        phone:
          type: string
          pattern: "^\\+?[1-9]\\d{7,14}$"

    BrokerUpdateRequest:
      type: object
      description: Payload to update a broker. License number is immutable after creation.
      required:
        - legalName
        - state
        - status
      properties:
        legalName:
          type: string
          minLength: 1
          maxLength: 255
        state:
          type: string
          pattern: "^[A-Z]{2}$"
          description: Two-letter US state code (e.g. CA, NY).
        status:
          type: string
          enum:
            - Active
            - Inactive
            - Pending
        email:
          type: string
          format: email
        phone:
          type: string
          pattern: "^\\+?[1-9]\\d{7,14}$"

    PaginatedBrokerList:
      type: object
      description: Paginated list of brokers.
      required:
        - data
        - page
        - pageSize
        - totalCount
        - totalPages
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Broker"
        page:
          type: integer
        pageSize:
          type: integer
        totalCount:
          type: integer
        totalPages:
          type: integer

    # ── F0017 Distribution Hierarchy / Ownership / Territory Schemas ──
    DistributionNodeType:
      type: string
      description: Distribution hierarchy node category. Ordering is advisory; depth is unbounded.
      enum:
        - MGA
        - Broker
        - SubBroker
        - Producer

    DistributionNode:
      type: object
      description: Distribution hierarchy node for MGA, broker, sub-broker, or producer.
      required:
        - id
        - nodeType
        - displayName
        - parentId
        - ancestryPath
        - depth
        - childCount
        - rowVersion
      properties:
        id:
          type: string
          format: uuid
        nodeType:
          $ref: "#/components/schemas/DistributionNodeType"
        displayName:
          type: string
          minLength: 1
          maxLength: 255
        parentId:
          type: string
          format: uuid
          nullable: true
        ancestryPath:
          type: array
          description: Root-to-node path including this node.
          items:
            type: string
            format: uuid
        depth:
          type: integer
          minimum: 0
        childCount:
          type: integer
          minimum: 0
        isActive:
          type: boolean
          default: true
        rowVersion:
          type: string
          description: Optimistic concurrency token for reparenting.

    DistributionNodeParentRequest:
      type: object
      description: Body for PUT /distribution-nodes/{nodeId}/parent.
      required:
        - parentId
      additionalProperties: false
      properties:
        parentId:
          type: string
          format: uuid
          nullable: true
          description: Parent node id; null clears the parent and makes the node a root.
        note:
          type: string
          maxLength: 500
          nullable: true

    DistributionNodeAncestorsResponse:
      type: object
      required:
        - node
        - ancestors
      additionalProperties: false
      properties:
        node:
          $ref: "#/components/schemas/DistributionNode"
        ancestors:
          type: array
          description: Ordered root-to-parent ancestors for the node.
          items:
            $ref: "#/components/schemas/DistributionNode"

    PaginatedDistributionNodeList:
      type: object
      required:
        - data
        - page
        - pageSize
        - totalCount
        - totalPages
      additionalProperties: false
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/DistributionNode"
        page:
          type: integer
        pageSize:
          type: integer
        totalCount:
          type: integer
        totalPages:
          type: integer

