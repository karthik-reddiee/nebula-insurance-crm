        effectiveTo:
          type: string
          format: date
          nullable: true
        assignmentReason:
          type: string
          nullable: true
          maxLength: 500
        rowVersion:
          type: string
        changedBy:
          type: string
          format: uuid
          nullable: true
        changedAt:
          type: string
          format: date-time
          nullable: true

    TerritoryMemberAssignmentRequest:
      type: object
      description: Body for POST /territories/{territoryId}/members.
      required:
        - memberType
        - memberId
        - effectiveFrom
      additionalProperties: false
