    TaskListItem:
      type: object
      description: Task representation for the Task Center list view (F0004).
      required:
        - id
        - title
        - status
        - priority
        - assignedToUserId
        - assignedToDisplayName
        - createdByUserId
        - createdByDisplayName
        - isOverdue
