    get:
      operationId: listSubmissionTimeline
      summary: List submission activity timeline
      description: |
        Returns paginated ActivityTimelineEvents for the submission in reverse
        chronological order. Inherits submission:read ABAC scope.
      tags: [Submissions]
      parameters:
        - $ref: "#/components/parameters/Page"
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
