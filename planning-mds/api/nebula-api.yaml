    parameters:
      - $ref: "#/components/parameters/SubmissionId"
    post:
      operationId: reactivateSubmission
      summary: Reactivate an archived submission
      description: Reactivates an archived submission and restores it to the active submission list. Requires `If-Match`.
      tags: [Submissions]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmissionArchiveRequest"
      responses:
        "200":
          description: Submission reactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"

  /submissions/{submissionId}/assignment:
    parameters:
      - $ref: "#/components/parameters/SubmissionId"
    put:
      operationId: assignSubmission
      summary: Assign or reassign submission ownership
      description: |
        Assigns or reassigns submission ownership. When submission is in ReadyForUWReview,
        target must have Underwriter role. No-op when assigning to the already-assigned user.
        Creates SubmissionAssigned ActivityTimelineEvent. Requires `If-Match` with
        the current `rowVersion`; stale versions return HTTP 412 with
        `code=precondition_failed`.
      tags: [Submissions]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
