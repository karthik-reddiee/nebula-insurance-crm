        createdAt: { type: string, format: date-time }
        createdByUserId: { type: string, format: uuid, nullable: true }

    CarrierRef:
      type: object
      required: [id, code, name, isActive, createdAt]
      properties:
        id: { type: string, format: uuid }
        code: { type: string, maxLength: 40 }
        name: { type: string, maxLength: 200 }
        naicCode: { type: string, nullable: true, maxLength: 10 }
        amBestRating: { type: string, nullable: true, maxLength: 10 }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time, nullable: true }

    PolicyAccountSummary:
      type: object
      required:
        - accountId
        - activePolicyCount
        - expiredPolicyCount
        - cancelledPolicyCount
        - pendingPolicyCount
        - totalCurrentPremium
        - premiumCurrency
        - computedAt
      properties:
        accountId: { type: string, format: uuid }
        activePolicyCount: { type: integer, minimum: 0 }
        expiredPolicyCount: { type: integer, minimum: 0 }
        cancelledPolicyCount: { type: integer, minimum: 0 }
        pendingPolicyCount: { type: integer, minimum: 0 }
        nextExpiringDate: { type: string, format: date, nullable: true }
        nextExpiringPolicyId: { type: string, format: uuid, nullable: true }
        nextExpiringPolicyNumber: { type: string, nullable: true }
        totalCurrentPremium: { type: number, minimum: 0 }
        premiumCurrency:
          type: string
          enum: [USD, MIXED]
        computedAt: { type: string, format: date-time }

    PolicyFromBindRequest:
      type: object
      required:
        - submissionId
        - quoteId
        - accountId
        - brokerOfRecordId
        - lineOfBusiness
        - carrierId
        - effectiveDate
        - expirationDate
        - totalPremium
        - premiumCurrency
        - coverages
      properties:
        submissionId: { type: string, format: uuid }
        quoteId: { type: string, format: uuid }
        accountId: { type: string, format: uuid }
        brokerOfRecordId: { type: string, format: uuid }
        lineOfBusiness:
          type: string
          enum: [Property, GeneralLiability, CommercialAuto, WorkersCompensation, ProfessionalLiability, Marine, Umbrella, Surety, Cyber, DirectorsOfficers]
        carrierId: { type: string, format: uuid }
        effectiveDate: { type: string, format: date }
        expirationDate: { type: string, format: date }
        totalPremium: { type: number, minimum: 0 }
        premiumCurrency:
          type: string
          enum: [USD]
        producerUserId: { type: string, format: uuid, nullable: true }
        predecessorPolicyId: { type: string, format: uuid, nullable: true }
        externalPolicyReference: { type: string, nullable: true, maxLength: 100 }
        lobAttributes:
          allOf:
            - $ref: "#/components/schemas/LobAttributeEnvelope"
          description: Dynamic policy-stage attributes carried from the bound F0019 submission/quote. Persistence targets the initial PolicyVersion.
        coverages:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/PolicyCoverageInput"

    PolicyImportRequest:
      type: object
      required: [rows]
      properties:
        importBatchReference: { type: string, nullable: true, maxLength: 100 }
        rows:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: "#/components/schemas/PolicyCreateRequest"

    # ──────────────────────────────────────────────────────────────
    # F0023 Search, saved views, and operational reporting schemas
    # Source-of-truth schemas live in planning-mds/schemas/*search*.json,
    # planning-mds/schemas/saved-view*.json, and
    # planning-mds/schemas/*report*.json.
    # ──────────────────────────────────────────────────────────────
    GlobalSearchResult:
      type: object
      required: [objectType, objectId, title, targetUrl, score, lastUpdatedAt]
      properties:
        objectType:
          type: string
          enum: [Broker, MGA, Program, Account, Policy, Submission, Renewal, Task]
        objectId: { type: string, format: uuid }
        title: { type: string, minLength: 1, maxLength: 200 }
        subtitle: { type: string, nullable: true, maxLength: 300 }
        status: { type: string, nullable: true, maxLength: 80 }
        ownerUserId: { type: string, format: uuid, nullable: true }
        ownerDisplayName: { type: string, nullable: true, maxLength: 160 }
        lineOfBusiness: { type: string, nullable: true, maxLength: 80 }
        region: { type: string, nullable: true, maxLength: 80 }
        matchedFields:
          type: array
          items: { type: string, maxLength: 80 }
          uniqueItems: true
        snippet: { type: string, nullable: true, maxLength: 500 }
        targetUrl: { type: string, minLength: 1, maxLength: 300 }
        score: { type: number, minimum: 0 }
        lastUpdatedAt: { type: string, format: date-time }
        indexedAt: { type: string, format: date-time }

    SearchFacetBucket:
      type: object
      required: [value, count]
      properties:
        value: { type: string, minLength: 1, maxLength: 120 }
        label: { type: string, nullable: true, maxLength: 160 }
        count: { type: integer, minimum: 0 }

    GlobalSearchFacets:
      type: object
      required: [objectTypes, statuses, owners]
      properties:
        objectTypes:
          type: array
          items: { $ref: "#/components/schemas/SearchFacetBucket" }
        statuses:
          type: array
          items: { $ref: "#/components/schemas/SearchFacetBucket" }
        owners:
          type: array
          items: { $ref: "#/components/schemas/SearchFacetBucket" }

    GlobalSearchResponse:
      type: object
      required: [data, facets, page, pageSize, totalCount, totalPages, generatedAt]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/GlobalSearchResult" }
        facets: { $ref: "#/components/schemas/GlobalSearchFacets" }
        page: { type: integer, minimum: 1 }
        pageSize: { type: integer, minimum: 1, maximum: 100 }
        totalCount: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }
        queryEcho: { type: string, nullable: true, maxLength: 200 }
        generatedAt: { type: string, format: date-time }

    SavedView:
      type: object
      required: [id, name, viewType, visibility, criteria, ownerUserId, isDefault, createdAt, updatedAt, rowVersion]
      properties:
        id: { type: string, format: uuid }
        name: { type: string, minLength: 1, maxLength: 80 }
        description: { type: string, nullable: true, maxLength: 300 }
        viewType:
          type: string
          enum: [Search, WorkloadReport, WorkflowAgingReport]
        visibility:
          type: string
          enum: [Personal, Team]
        teamScopeType:
          type: string
          nullable: true
          enum: [Role, Region, Program, Territory]
        teamScopeKey:
          type: string
          nullable: true
          maxLength: 120
        criteria:
          type: object
          description: Structured criteria; never grants record access.
          additionalProperties: true
        ownerUserId: { type: string, format: uuid }
        ownerDisplayName: { type: string, nullable: true, maxLength: 160 }
        lastEditedByUserId: { type: string, format: uuid, nullable: true }
        lastEditedByDisplayName: { type: string, nullable: true, maxLength: 160 }
        isDefault: { type: boolean }
        archivedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        rowVersion: { type: string, minLength: 1 }

    SavedViewUpsertRequest:
      type: object
      required: [name, viewType, visibility, criteria]
      properties:
        name: { type: string, minLength: 1, maxLength: 80 }
        description: { type: string, nullable: true, maxLength: 300 }
        viewType:
          type: string
          enum: [Search, WorkloadReport, WorkflowAgingReport]
        visibility:
          type: string
          enum: [Personal, Team]
        teamScopeType:
          type: string
          nullable: true
          enum: [Role, Region, Program, Territory]
        teamScopeKey:
          type: string
          nullable: true
          maxLength: 120
        criteria:
          type: object
          additionalProperties: true
        isDefault:
          type: boolean
          default: false

    PaginatedSavedViewList:
      type: object
      required: [data, page, pageSize, totalCount, totalPages]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/SavedView" }
        page: { type: integer, minimum: 1 }
        pageSize: { type: integer, minimum: 1, maximum: 100 }
        totalCount: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }

    OperationalWorkloadReport:
      type: object
      required: [asOfDate, summary, ownerRows, statusRows, drilldown, generatedAt]
      properties:
        asOfDate: { type: string, format: date }
        summary:
          type: object
          required: [dueToday, overdue, openSubmissions, openRenewals, openTasks]
          properties:
            dueToday: { type: integer, minimum: 0 }
            overdue: { type: integer, minimum: 0 }
            openSubmissions: { type: integer, minimum: 0 }
            openRenewals: { type: integer, minimum: 0 }
            openTasks: { type: integer, minimum: 0 }
        ownerRows:
          type: array
          items: { $ref: "#/components/schemas/OperationalOwnerWorkloadRow" }
        statusRows:
          type: array
          items: { $ref: "#/components/schemas/OperationalStatusWorkloadRow" }
        drilldown:
          type: array
          items: { $ref: "#/components/schemas/GlobalSearchResult" }
        generatedAt: { type: string, format: date-time }

    OperationalOwnerWorkloadRow:
      type: object
      required: [ownerUserId, ownerDisplayName, dueToday, overdue, openCount]
      properties:
        ownerUserId: { type: string, format: uuid, nullable: true }
        ownerDisplayName: { type: string }
        dueToday: { type: integer, minimum: 0 }
        overdue: { type: integer, minimum: 0 }
        openCount: { type: integer, minimum: 0 }

    OperationalStatusWorkloadRow:
      type: object
      required: [objectType, status, count]
      properties:
        objectType: { type: string }
        status: { type: string }
        count: { type: integer, minimum: 0 }

    WorkflowAgingReport:
      type: object
      required: [asOfDate, agingRows, backlogRows, drilldown, generatedAt]
      properties:
        asOfDate: { type: string, format: date }
        agingRows:
          type: array
          items: { $ref: "#/components/schemas/WorkflowAgingRow" }
        backlogRows:
          type: array
          items: { $ref: "#/components/schemas/WorkflowBacklogRow" }
        drilldown:
          type: array
          items: { $ref: "#/components/schemas/GlobalSearchResult" }
        generatedAt: { type: string, format: date-time }

    WorkflowAgingRow:
      type: object
      required: [workflowType, status, ageBand, count]
      properties:
        workflowType:
          type: string
          enum: [Submission, Renewal]
        status: { type: string }
        ageBand:
          type: string
          enum: [OnTrack, ApproachingSla, Overdue]
        count: { type: integer, minimum: 0 }
        oldestDaysInStatus: { type: integer, nullable: true, minimum: 0 }

    WorkflowBacklogRow:
      type: object
      required: [workflowType, ownerDisplayName, openCount, overdueCount]
      properties:
        workflowType:
          type: string
          enum: [Submission, Renewal]
        ownerUserId: { type: string, format: uuid, nullable: true }
        ownerDisplayName: { type: string }
        openCount: { type: integer, minimum: 0 }
        overdueCount: { type: integer, minimum: 0 }

    DistributionRollupReport:
      type: object
      required: [groupBy, metricFamily, asOf, generatedAt, totals, rows]
      properties:
        groupBy:
          type: string
          enum: [Hierarchy, Territory, Producer]
        metricFamily:
          type: string
          enum: [Production, Workflow, Activity]
        asOf: { type: string, format: date }
        generatedAt: { type: string, format: date-time }
        scope:
          type: object
          required: [rootNodeId, territoryId, producerUserId]
          properties:
            rootNodeId: { type: string, format: uuid, nullable: true }
            territoryId: { type: string, format: uuid, nullable: true }
            producerUserId: { type: string, format: uuid, nullable: true }
        totals:
          $ref: "#/components/schemas/DistributionRollupMetricSet"
        rows:
          type: array
          items: { $ref: "#/components/schemas/DistributionRollupRow" }

    DistributionRollupRow:
      type: object
      required: [groupKey, groupLabel, groupType, metrics, drilldownUrl]
      properties:
        groupKey: { type: string, minLength: 1, maxLength: 120 }
        groupLabel: { type: string, minLength: 1, maxLength: 160 }
        groupType:
          type: string
          enum: [Hierarchy, Territory, Producer]
        metrics:
          $ref: "#/components/schemas/DistributionRollupMetricSet"
        drilldownUrl: { type: string, nullable: true, maxLength: 500 }
        unavailableReason: { type: string, nullable: true, maxLength: 200 }

    DistributionRollupMetricSet:
      type: object
      required: [recordCount, productionCount, workflowOpen, workflowOverdue, activityCount]
      properties:
        recordCount: { type: integer, minimum: 0 }
        productionCount: { type: integer, minimum: 0 }
        workflowOpen: { type: integer, minimum: 0 }
        workflowOverdue: { type: integer, minimum: 0 }
        activityCount: { type: integer, minimum: 0 }

    # ──────────────────────────────────────────────────────────────
    # F0008 Broker Insights schemas
    # Source-of-truth schemas live in planning-mds/schemas/broker-insight-*.json.
    # ──────────────────────────────────────────────────────────────
    BrokerInsightScorecard:
      type: object
      required: [brokerId, brokerName, periodStart, periodEnd, metrics, generatedAt]
      properties:
        brokerId: { type: string, format: uuid }
        brokerName: { type: string, minLength: 1, maxLength: 200 }
        periodStart: { type: string, format: date }
        periodEnd: { type: string, format: date }
        comparisonPeriodStart: { type: string, format: date, nullable: true }
        comparisonPeriodEnd: { type: string, format: date, nullable: true }
        filters: { $ref: "#/components/schemas/BrokerInsightFilterContext" }
        metrics:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/BrokerInsightMetricCard" }
        partialData: { type: boolean, default: false }
        generatedAt: { type: string, format: date-time }

    BrokerInsightFilterContext:
      type: object
      properties:
        producerId: { type: string, format: uuid, nullable: true }
        territoryId: { type: string, format: uuid, nullable: true }
        programId: { type: string, format: uuid, nullable: true }
        lineOfBusiness: { type: string, nullable: true, maxLength: 80 }
        region: { type: string, nullable: true, maxLength: 80 }

    BrokerInsightMetricCard:
      type: object
      required: [metricKey, label, value, unit, denominator, sourceRecordCount, status, lastRefreshedAt]
      properties:
        metricKey:
          type: string
          enum: [quoteCount, bindCount, quoteToBindRate, retentionRate, openPipelineCount, activityCount, productionAmount]
        label: { type: string, minLength: 1, maxLength: 120 }
        value: { type: number, nullable: true }
        comparisonValue: { type: number, nullable: true }
        unit:
          type: string
          enum: [count, percentage, currency]
        denominator: { type: integer, minimum: 0 }
        sourceRecordCount: { type: integer, minimum: 0 }
        status:
          type: string
          enum: [Available, NoData, Partial, Unavailable]
        drilldownAvailable: { type: boolean, default: false }
        lastRefreshedAt: { type: string, format: date-time }

    BrokerInsightTrend:
      type: object
      required: [brokerId, metricKey, bucket, periodStart, periodEnd, points, sourceRows, generatedAt]
      properties:
        brokerId: { type: string, format: uuid }
        metricKey: { type: string, maxLength: 80 }
        bucket:
          type: string
          enum: [day, week, month, quarter]
        periodStart: { type: string, format: date }
        periodEnd: { type: string, format: date }
        points:
          type: array
          items: { $ref: "#/components/schemas/BrokerInsightTrendPoint" }
        sourceRows:
          type: array
          items: { $ref: "#/components/schemas/GlobalSearchResult" }
        partialData: { type: boolean, default: false }
        generatedAt: { type: string, format: date-time }

    BrokerInsightTrendPoint:
      type: object
      required: [bucketStart, bucketEnd, value, denominator, sourceRecordCount]
      properties:
        bucketStart: { type: string, format: date }
        bucketEnd: { type: string, format: date }
        value: { type: number, nullable: true }
        denominator: { type: integer, minimum: 0 }
        sourceRecordCount: { type: integer, minimum: 0 }
        status:
          type: string
          enum: [Available, NoData, Partial, Unavailable]

    BrokerInsightBenchmark:
      type: object
      required: [brokerId, periodStart, periodEnd, peerSet, metrics, generatedAt]
      properties:
        brokerId: { type: string, format: uuid }
        periodStart: { type: string, format: date }
        periodEnd: { type: string, format: date }
        peerSet: { $ref: "#/components/schemas/BrokerInsightPeerSet" }
        metrics:
          type: array
          items: { $ref: "#/components/schemas/BrokerInsightBenchmarkMetric" }
        generatedAt: { type: string, format: date-time }

    BrokerInsightPeerSet:
      type: object
      required: [type, visiblePeerCount, minimumPeerCount, status]
      properties:
        type:
          type: string
          enum: [visibleBrokerGroup, producer, territory, program, region]
        visiblePeerCount: { type: integer, minimum: 0 }
        minimumPeerCount: { type: integer, minimum: 1 }
        status:
          type: string
          enum: [Available, InsufficientPeers, NoData]

    BrokerInsightBenchmarkMetric:
      type: object
      required: [metricKey, brokerValue, denominator, peerMedian, rank, percentile, variance, status]
      properties:
        metricKey: { type: string, maxLength: 80 }
        brokerValue: { type: number, nullable: true }
        denominator: { type: integer, minimum: 0 }
        peerMedian: { type: number, nullable: true }
        rank: { type: integer, nullable: true, minimum: 1 }
        percentile: { type: number, nullable: true, minimum: 0, maximum: 100 }
        variance: { type: number, nullable: true }
        status:
          type: string
          enum: [Available, Suppressed, NoData]

    BrokerInsightSnapshot:
      type: object
      required: [brokerId, brokerName, periodStart, periodEnd, highlights, risks, sourceLinks, generatedAt]
      properties:
        brokerId: { type: string, format: uuid }
        brokerName: { type: string, minLength: 1, maxLength: 200 }
        periodStart: { type: string, format: date }
        periodEnd: { type: string, format: date }
        highlights:
          type: array
          items: { $ref: "#/components/schemas/BrokerInsightSnapshotItem" }
        risks:
          type: array
          items: { $ref: "#/components/schemas/BrokerInsightSnapshotItem" }
        activitySummary: { type: string, nullable: true, maxLength: 1000 }
        opportunitySummary: { type: string, nullable: true, maxLength: 1000 }
        sourceLinks:
          type: array
          items: { $ref: "#/components/schemas/GlobalSearchResult" }
        partialData: { type: boolean, default: false }
        generatedAt: { type: string, format: date-time }

    BrokerInsightSnapshotItem:
      type: object
      required: [label, value, sourceRecordCount]
      properties:
        label: { type: string, minLength: 1, maxLength: 160 }
        value: { type: string, minLength: 1, maxLength: 300 }
        sourceRecordCount: { type: integer, minimum: 0 }

    # ──────────────────────────────────────────────────────────────
    # Document component schemas (F0020)
    # Source-of-truth schemas live in planning-mds/schemas/document-*.json.
    # The OpenAPI shapes below mirror those schemas using OpenAPI 3.0.3
    # nullable syntax per SOLUTION-PATTERNS §3.
    # ──────────────────────────────────────────────────────────────
    DocumentParentRef:
      type: object
      required: [type, id]
      properties:
        type:
          type: string
          enum: [account, submission, policy, renewal]
        id:
          type: string
          format: uuid

    DocumentLatestUpload:
      type: object
      required: [atUtc, byUserId]
      properties:
        atUtc: { type: string, format: date-time }
        byUserId: { type: string, format: uuid }

    DocumentListItem:
      type: object
      required: [documentId, logicalName, type, classification, latestVersion, status, latestUpload, parent]
      properties:
        documentId:
          type: string
          pattern: "^doc_[0-9A-HJKMNP-TV-Z]{26}$"
        logicalName: { type: string, minLength: 1, maxLength: 200 }
        type: { type: string }
        classification:
          type: string
          enum: [public, confidential, restricted]
        latestVersion: { type: integer, minimum: 1 }
        status:
          type: string
          enum: [quarantined, available, failed_promote]
        latestUpload:
          $ref: "#/components/schemas/DocumentLatestUpload"
        parent:
          $ref: "#/components/schemas/DocumentParentRef"

    PaginatedDocumentList:
      type: object
      required: [documents, pagination]
      properties:
        documents:
          type: array
          items: { $ref: "#/components/schemas/DocumentListItem" }
        pagination:
          type: object
          required: [page, pageSize, total]
          properties:
            page: { type: integer, minimum: 1 }
            pageSize: { type: integer, minimum: 1, maximum: 100 }
            total: { type: integer, minimum: 0 }

    DocumentVersion:
      type: object
      required: [n, fileName, sizeBytes, sha256, status, uploadedAt, uploadedByUserId]
      properties:
        n: { type: integer, minimum: 1 }
        fileName:
          type: string
          pattern: "^[A-Za-z0-9._-]+-v[1-9][0-9]*\\.(pdf|png|docx|xlsx|csv)$"
        sizeBytes: { type: integer, minimum: 1, maximum: 5242880 }
        sha256:
          type: string
          pattern: "^[0-9a-f]{64}$"
        status:
          type: string
          enum: [quarantined, available, failed_promote]
        uploadedAt: { type: string, format: date-time }
        uploadedByUserId: { type: string, format: uuid }
        supersedes: { type: integer, nullable: true, minimum: 1 }

    DocumentEvent:
      type: object
      required: [kind, at, byUserId]
      properties:
        kind:
          type: string
          enum:
            - uploaded
            - promoted
            - promote_failed
            - scan_infected
            - scan_inconclusive
            - downloaded
            - replaced
            - classified
            - metadata_edited
            - linked
            - materialised
            - swept
        at: { type: string, format: date-time }
        byUserId:
          type: string
          description: Internal NebulaPrincipal.UserId or system principal token (e.g., system:quarantine-worker, system:retention-sweeper).
        version: { type: integer, nullable: true, minimum: 1 }
        fromVersion: { type: integer, nullable: true, minimum: 1 }
        toVersion: { type: integer, nullable: true, minimum: 1 }
        from: { type: string, nullable: true }
        to: { type: string, nullable: true }
        changes: { type: object, nullable: true, additionalProperties: true }
        error: { type: string, nullable: true }
        reason: { type: string, nullable: true }

    DocumentSidecar:
      type: object
      required: [documentId, logicalName, parent, classification, type, metadataSchema, metadata, versions, events]
      properties:
        documentId:
          type: string
          pattern: "^doc_[0-9A-HJKMNP-TV-Z]{26}$"
        logicalName: { type: string, minLength: 1, maxLength: 200 }
        parent:
          $ref: "#/components/schemas/DocumentParentRef"
        classification:
          type: string
          enum: [public, confidential, restricted]
        type: { type: string }
        tags:
          type: array
          maxItems: 10
          items: { type: string, maxLength: 32 }
        metadataSchema:
          $ref: "#/components/schemas/DocumentMetadataSchemaRef"
        metadata:
          type: object
          description: Type-specific JSON metadata validated against metadataSchema.
          additionalProperties: true
        uploaderId: { type: string, format: uuid }
        auditTimestamps:
          type: object
          required: [createdAtUtc, updatedAtUtc]
          properties:
            createdAtUtc: { type: string, format: date-time }
            updatedAtUtc: { type: string, format: date-time }
        provenance:
          type: object
          nullable: true
          properties:
            source: { type: string, pattern: "^(upload|template:doc_[0-9A-HJKMNP-TV-Z]{26})$" }
            materializedAt: { type: string, format: date-time, nullable: true }
            byUserId: { type: string, format: uuid, nullable: true }
        versions:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/DocumentVersion" }
        useCount: { type: integer, nullable: true, minimum: 0 }
        lastUsedAt: { type: string, format: date-time, nullable: true }
        events:
          type: array
          items: { $ref: "#/components/schemas/DocumentEvent" }

    DocumentDetail:
      type: object
      required: [sidecar, previewUrls]
      properties:
        sidecar: { $ref: "#/components/schemas/DocumentSidecar" }
        previewUrls:
          type: array
          description: Aligned by index with sidecar.versions[]; null where the version is non-renderable or non-available.
          items: { type: string, format: uri, nullable: true }

    DocumentUploadFileMetadata:
      type: object
      properties:
        classification:
          type: string
          enum: [public, confidential, restricted]
          nullable: true
        type: { type: string, nullable: true }
        tags:
          type: array
          maxItems: 10
          items: { type: string, maxLength: 32 }
          nullable: true
        metadata:
          type: object
          nullable: true
          additionalProperties: true

    DocumentUploadAcceptedItem:
      type: object
      required: [documentId, logicalName, status]
      properties:
        documentId:
          type: string
          pattern: "^doc_[0-9A-HJKMNP-TV-Z]{26}$"
        logicalName: { type: string }
        status:
          type: string
          enum: [quarantined]

    DocumentUploadRejectedItem:
      type: object
      required: [index, code]
      properties:
        index: { type: integer, minimum: 0 }
        logicalName: { type: string, nullable: true }
        code:
          type: string
          enum:
            - unsupported_type
            - file_too_large
            - empty_file
            - invalid_filename
            - parent_access_denied
            - classification_access_denied
            - folder_entry_unsupported
        detail: { type: string, nullable: true }

    DocumentUploadResponse:
      type: object
      required: [documents]
      properties:
        documents:
          type: array
          items: { $ref: "#/components/schemas/DocumentUploadAcceptedItem" }
        rejected:
          type: array
          items: { $ref: "#/components/schemas/DocumentUploadRejectedItem" }

    DocumentReplaceResponse:
      type: object
      required: [documentId, version, status]
      properties:
        documentId:
          type: string
          pattern: "^doc_[0-9A-HJKMNP-TV-Z]{26}$"
        version: { type: integer, minimum: 1 }
        status:
          type: string
          enum: [quarantined]

    DocumentMetadataUpdateRequest:
      type: object
      properties:
        classification:
          type: string
          enum: [public, confidential, restricted]
          nullable: true
        type: { type: string, nullable: true }
        tags:
          type: array
          maxItems: 10
          items: { type: string, maxLength: 32 }
          nullable: true
        metadata:
          type: object
          nullable: true
          additionalProperties: true

    DocumentMetadataSchemaRef:
      type: object
      required: [id, version, schemaHash]
      properties:
        id: { type: string }
        version: { type: integer, minimum: 1 }
        schemaHash:
          type: string
          pattern: "^sha256:[0-9a-f]{64}$"

    DocumentMetadataSchema:
      type: object
      required: [id, version, status, schemaHash, schema]
      properties:
        id: { type: string }
        version: { type: integer, minimum: 1 }
        status: { type: string, enum: [active, deprecated] }
        schemaHash:
          type: string
          pattern: "^sha256:[0-9a-f]{64}$"
        schema:
          type: object
          description: JSON Schema document used by API validation and frontend metadata forms.
          additionalProperties: true

    DocumentMetadataSchemaRegistry:
      type: object
      required: [schemas]
      properties:
        schemas:
          type: array
          items: { $ref: "#/components/schemas/DocumentMetadataSchema" }

    DocumentCompletenessSignal:
      type: object
      required: [parent, totals, byType, byClassification]
      properties:
        parent: { $ref: "#/components/schemas/DocumentParentRef" }
        totals:
          type: object
          required: [available, quarantined, failed_promote]
          properties:
            available: { type: integer, minimum: 0 }
            quarantined: { type: integer, minimum: 0 }
            failed_promote: { type: integer, minimum: 0 }
        byType:
          type: array
          items:
            type: object
            required: [type, count]
            properties:
              type: { type: string }
              count: { type: integer, minimum: 0 }
        byClassification:
          type: array
          items:
            type: object
            required: [classification, count]
            properties:
              classification:
                type: string
                enum: [public, confidential, restricted]
              count: { type: integer, minimum: 0 }

    GeneratedDocumentRequest:
      type: object
      required: [parent, artifactFamily, templateDocumentId]
      properties:
        parent:
          $ref: "#/components/schemas/DocumentParentRef"
        artifactFamily:
          type: string
          enum: [coi, acord, proposal]
        templateDocumentId:
          type: string
          pattern: "^doc_[0-9A-HJKMNP-TV-Z]{26}$"
        templateVersion:
          type: integer
          nullable: true
          minimum: 1
        classification:
          type: string
          enum: [public, confidential, restricted]
          default: confidential
        regeneratedFromDocumentId:
          type: string
          nullable: true
          pattern: "^doc_[0-9A-HJKMNP-TV-Z]{26}$"
        regenerationReason:
          type: string
          nullable: true
          maxLength: 500

    GeneratedDocumentPreviewResponse:
      type: object
      required: [artifactFamily, templateDocumentId, sourceSnapshotHash, status, mergeDiagnostics]
      properties:
        artifactFamily:
          type: string
          enum: [coi, acord, proposal]
        templateDocumentId:
          type: string
          pattern: "^doc_[0-9A-HJKMNP-TV-Z]{26}$"
        templateVersion:
          type: integer
          minimum: 1
        sourceSnapshotHash:
          type: string
          pattern: "^sha256:[0-9a-f]{64}$"
        status:
          type: string
          enum: [ready, missing_merge_data, render_failed]
        previewUrl:
          type: string
          format: uri
          nullable: true
        expiresAtUtc:
          type: string
          format: date-time
          nullable: true
        mergeDiagnostics:
          type: array
          items:
            type: object
            required: [field, status]
            properties:
              field: { type: string }
              status: { type: string, enum: [ok, missing, invalid] }
              detail: { type: string, nullable: true, maxLength: 500 }

    GeneratedDocumentIssueResponse:
      type: object
      required: [documentId, artifactFamily, templateDocumentId, templateVersion, issuedAtUtc, issuedByUserId, sourceSnapshotHash]
      properties:
        documentId:
          type: string
          pattern: "^doc_[0-9A-HJKMNP-TV-Z]{26}$"
        artifactFamily:
          type: string
          enum: [coi, acord, proposal]
        templateDocumentId:
          type: string
          pattern: "^doc_[0-9A-HJKMNP-TV-Z]{26}$"
        templateVersion:
          type: integer
          minimum: 1
        issuedAtUtc:
          type: string
          format: date-time
        issuedByUserId:
          type: string
          format: uuid
        sourceSnapshotHash:
          type: string
          pattern: "^sha256:[0-9a-f]{64}$"
        regeneratedFromDocumentId:
          type: string
          nullable: true
          pattern: "^doc_[0-9A-HJKMNP-TV-Z]{26}$"
        downloadUrl:
          type: string
          format: uri
          nullable: true

    DocumentTemplate:
      type: object
      required: [templateId, logicalName, type, classification, useCount]
      properties:
        templateId:
          type: string
          pattern: "^doc_[0-9A-HJKMNP-TV-Z]{26}$"
        logicalName: { type: string, minLength: 1, maxLength: 200 }
        type:
          type: string
          enum: [template]
        classification:
          type: string
          enum: [public, confidential, restricted]
        tags:
          type: array
          maxItems: 10
          items: { type: string, maxLength: 32 }
        useCount: { type: integer, minimum: 0 }
        lastUsedAt: { type: string, format: date-time, nullable: true }
        uploadedAtUtc: { type: string, format: date-time }
        uploadedByUserId: { type: string, format: uuid }

    PaginatedDocumentTemplateList:
      type: object
      required: [templates, pagination]
      properties:
        templates:
          type: array
          items: { $ref: "#/components/schemas/DocumentTemplate" }
        pagination:
          type: object
          required: [page, pageSize, total]
          properties:
            page: { type: integer, minimum: 1 }
            pageSize: { type: integer, minimum: 1, maximum: 100 }
            total: { type: integer, minimum: 0 }
