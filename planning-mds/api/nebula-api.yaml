          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [Open, InProgress, Done]
        priority:
          type: string
          enum: [Low, Normal, High, Urgent]
        dueDate:
          type: string
          format: date
          nullable: true
        assignedToUserId:
          type: string
          format: uuid
        assignedToDisplayName:
          type: string
