          additionalProperties: true
        coverageSnapshot:
          type: array
          items:
            type: object
            additionalProperties: true
        premiumSnapshot:
          type: object
          additionalProperties: true
        createdAt: { type: string, format: date-time }
        createdByUserId: { type: string, format: uuid, nullable: true }

    PolicyEndorsement:
      type: object
      required: [id, policyId, endorsementNumber, policyVersionId, endorsementReasonCode, effectiveDate, premiumDelta, lobAttributes, createdAt]
      properties:
        id: { type: string, format: uuid }
