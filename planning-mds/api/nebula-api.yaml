        pageSize:
          type: integer
        totalCount:
          type: integer
        totalPages:
          type: integer

    TerritoryAssignmentLookupResponse:
      type: object
      required:
        - memberType
        - memberId
        - asOf
        - assignment
      additionalProperties: false
