        endorsementCount: { type: integer, minimum: 0 }
        coverageLineCount: { type: integer, nullable: true, minimum: 0 }
        openRenewalCount: { type: integer, nullable: true, minimum: 0 }
        producerUserId: { type: string, format: uuid, nullable: true }
        producerDisplayName: { type: string, nullable: true }
        importSource:
          type: string
          nullable: true
          enum: [manual, csv-import, f0019-bind-hook]
        externalPolicyReference: { type: string, nullable: true }
        availableTransitions:
          type: array
          items: { type: string }
        rowVersion: { type: string }
        createdAt: { type: string, format: date-time, nullable: true }
        createdByUserId: { type: string, format: uuid, nullable: true }
        updatedAt: { type: string, format: date-time, nullable: true }
        updatedByUserId: { type: string, format: uuid, nullable: true }

    PolicyCoverageInput:
      type: object
      required: [coverageCode, limit, premium]
      properties:
        coverageCode: { type: string, maxLength: 40 }
        coverageName: { type: string, nullable: true, maxLength: 200 }
        limit: { type: number, minimum: 0 }
        deductible: { type: number, nullable: true, minimum: 0 }
        premium: { type: number, minimum: 0 }
        exposureBasis: { type: string, nullable: true, maxLength: 40 }
        exposureQuantity: { type: number, nullable: true, minimum: 0 }

