openapi: 3.0.3
info:
  title: Nebula API
  version: 0.8.0
  description: |
    Public baseline API contract for the Nebula insurance CRM reference implementation.
    Version 0.8.0 adds F0008 Broker Insights read-only endpoints:
    broker scorecards, trends/source rows, authorized benchmark comparison,
    and review snapshots. Governed by ADR-029.
    Version 0.7.0 adds F0038 Neuron Companion engine endpoints (NeuronCompanion tag):
    renewals needing attention, per-renewal companion context, persist outreach draft,
    mock-send (commits Identified→Outreach without dispatching email), and companion
    telemetry ingest. Called by the Neuron service as the user; governed by ADR-027/ADR-028.
    F0028 adds CRM-side carrier and market relationship management under the
    CarrierMarkets tag: market directory/profile management, underwriter contacts,
    appetite notes, appointment context, and links to submissions/policies.
    F0032 adds AdminConfiguration endpoints for governed runtime configuration:
    domain catalog, drafts, validation/compare, publish, rollback, refresh status,
    and permission-safe audit history.
    Version 0.6.0 adds F0023 Global Search, Saved Views, and Operational Reporting:
    permission-filtered cross-object search, personal/team saved-view management,
    and workload / workflow-aging operational report endpoints.
    Version 0.5.0 adds F0007 Renewal Pipeline: renewal list with due-window filtering,
    create from policy, detail with policy context, assignment/handoff, transition with
    conditional fields (Lost reason, Completed policy link), and renewal timeline.
    Renewal entity redesigned with 6-status lifecycle and computed urgency.
    F0034 adds dynamic LOB attribute envelopes, schema-bundle read APIs, and
    schema-pinned product metadata for Submission, Renewal, PolicyVersion, and
    PolicyEndorsement. Policy responses expose current attributes through
    CurrentVersionId -> PolicyVersion; Policy has no independent attribute source.
servers:
  - url: https://api.nebula.local
security:
  - bearerAuth: []
tags:
  - name: Brokers
    description: Broker CRUD operations
  - name: DistributionHierarchy
    description: Distribution node hierarchy traversal and reparenting (F0017)
  - name: ProducerOwnership
    description: Effective-dated producer ownership assignment and lookup (F0017)
  - name: Territories
    description: Territory definition and effective-dated membership (F0017)
  - name: Contacts
    description: Contact CRUD operations
  - name: CarrierMarkets
    description: CRM-side carrier and market relationship management (F0028)
  - name: Accounts
    description: Account operations
  - name: MGAs
    description: MGA operations
  - name: Programs
    description: Program operations
  - name: Submissions
    description: Submission workflow operations
  - name: Renewals
    description: Renewal workflow operations
  - name: Policies
    description: Policy lifecycle, versioning, endorsements, cancellation, reinstatement (F0018)
  - name: LobSchemas
    description: Product schema registry and dynamic LOB attribute bundles (F0034)
  - name: Dashboard
    description: Dashboard widget data endpoints (F0001)
  - name: Tasks
    description: Task CRUD for My Tasks widget and Task Center
  - name: WorkQueues
    description: Work queues, assignment rules, coverage windows, routing audit, and manager reassignment controls (F0022)
  - name: Users
    description: User search for assignee picker (F0004)
  - name: Search
    description: Permission-filtered global CRM search (F0023)
  - name: SavedViews
    description: Personal and team saved criteria for search and operational reports (F0023)
  - name: OperationalReports
    description: ABAC-scoped workload and workflow aging report endpoints (F0023)
  - name: Commissions
    description: Commission schedules, producer splits, expected commission review, adjustments, and revenue attribution rollups (F0025)
  - name: BrokerInsights
    description: Permission-filtered broker scorecards, trends, benchmarks, and review snapshots (F0008)
  - name: Timeline
    description: Activity timeline event queries
  - name: Documents
    description: Document storage, classification, versioning, and parent linkage (F0020). See ADR-012 + ADR-019.
  - name: DocumentTemplates
    description: Reusable document templates (F0020-S0012). Materialise into a parent record to start from a boilerplate.
  - name: OutboundDocumentGeneration
    description: F0027 preview, issue, and regenerate flows for COI, ACORD, and reusable proposal artifacts.
  - name: SessionTelemetry
    description: Internal telemetry ingest for F0035 session-continuity events (silent renewal, idle warning, forced redirect, auth-error classification, form-snapshot skip). Governed by ADR-024.
  - name: NeuronCompanion
    description: F0038 Neuron Companion engine endpoints — renewals needing attention, per-renewal companion context, persist outreach draft, mock-send (commit Identified→Outreach, fake SMTP), and companion telemetry ingest. Called by the Neuron service as the user. Governed by ADR-027 + ADR-028.
  - name: AdminConfiguration
    description: F0032 governed admin configuration domains, draft/validate/publish lifecycle, rollback, and audit.

paths:
  # ──────────────────────────────────────────────────────────────
  # F0022 Work queues, assignment rules, and coverage management
  # ──────────────────────────────────────────────────────────────
  /work-queues:
    get:
      operationId: listWorkQueues
      summary: List work queues
      description: Returns manager-visible queue definitions and backlog counters. Queue rows are scope-filtered and source item details remain source-ABAC filtered.
      tags: [WorkQueues]
      parameters:
        - name: workType
          in: query
          required: false
          schema:
            type: string
            enum: [Task, Submission, Renewal, Mixed]
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [Active, Inactive]
      responses:
        "200":
          description: Work queues
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/WorkQueue"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      operationId: createWorkQueue
      summary: Create work queue
      description: Creates a queue definition. Requires queue:manage; emits ActivityTimelineEvent.
      tags: [WorkQueues]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkQueueUpsertRequest"
      responses:
        "201":
          description: Queue created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkQueue"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableContent" }

  /work-queues/{queueId}:
    parameters:
      - $ref: "#/components/parameters/QueueId"
    get:
      operationId: getWorkQueueById
      summary: Get work queue
      tags: [WorkQueues]
      responses:
        "200":
          description: Queue detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkQueue"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      operationId: updateWorkQueue
      summary: Update work queue
      description: Updates queue metadata/status. Requires queue:manage and If-Match; emits ActivityTimelineEvent.
      tags: [WorkQueues]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkQueueUpsertRequest"
      responses:
        "200":
          description: Queue updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkQueue"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }
        "422": { $ref: "#/components/responses/UnprocessableContent" }

  /work-queues/{queueId}/members:
    parameters:
      - $ref: "#/components/parameters/QueueId"
    put:
      operationId: replaceWorkQueueMembers
      summary: Replace queue membership
      description: Replaces the effective membership set for a queue. Requires queue:manage and If-Match; emits ActivityTimelineEvent.
      tags: [WorkQueues]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueueMemberUpsertRequest"
      responses:
        "200":
          description: Queue updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkQueue"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }
        "422": { $ref: "#/components/responses/UnprocessableContent" }

  /work-queues/{queueId}/items:
    parameters:
      - $ref: "#/components/parameters/QueueId"
    get:
      operationId: listQueueWorkItems
      summary: List queue work items
      description: Returns queue worklist rows. Each row is filtered by both queue scope and linked source-record ABAC.
      tags: [WorkQueues]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: sourceType
          in: query
          required: false
          schema:
            type: string
            enum: [Task, Submission, Renewal]
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [Open, InProgress, Closed, Skipped]
      responses:
        "200":
          description: Paginated queue work items
          content:
            application/json:
              schema:
                type: object
                required: [data, page, pageSize, totalCount]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/QueueWorkItem"
                  page: { type: integer }
                  pageSize: { type: integer }
                  totalCount: { type: integer }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /assignment-rules:
    get:
      operationId: listAssignmentRules
      summary: List assignment rules
      tags: [WorkQueues]
      parameters:
        - name: queueId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [Draft, Active, Superseded, Disabled]
      responses:
        "200":
          description: Assignment rules
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AssignmentRule"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      operationId: createAssignmentRule
      summary: Create assignment rule
      description: Creates a rule version. Requires queue:manage; emits ActivityTimelineEvent.
      tags: [WorkQueues]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignmentRuleUpsertRequest"
      responses:
        "201":
          description: Rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignmentRule"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableContent" }

  /assignment-rules/{ruleId}:
    parameters:
      - $ref: "#/components/parameters/RuleId"
    put:
      operationId: updateAssignmentRule
      summary: Update assignment rule
      description: Updates a draft rule or creates a new active version. Requires queue:manage and If-Match.
      tags: [WorkQueues]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignmentRuleUpsertRequest"
      responses:
        "200":
          description: Rule updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignmentRule"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }
        "422": { $ref: "#/components/responses/UnprocessableContent" }

  /coverage-windows:
    get:
      operationId: listCoverageWindows
      summary: List coverage windows
      tags: [WorkQueues]
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: queueId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Coverage windows
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CoverageWindow"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      operationId: createCoverageWindow
      summary: Create coverage window
      description: Creates explicit backup coverage. Requires queue:manage; inactivity alone never creates coverage.
      tags: [WorkQueues]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoverageWindowUpsertRequest"
      responses:
        "201":
          description: Coverage window created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoverageWindow"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableContent" }

  /coverage-windows/{coverageWindowId}:
    parameters:
      - $ref: "#/components/parameters/CoverageWindowId"
    put:
      operationId: updateCoverageWindow
      summary: Update coverage window
      description: Updates or cancels explicit backup coverage. Requires queue:manage and If-Match.
      tags: [WorkQueues]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoverageWindowUpsertRequest"
      responses:
        "200":
          description: Coverage window updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoverageWindow"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }
        "422": { $ref: "#/components/responses/UnprocessableContent" }

  /queue-work-items/{queueItemId}/assignment:
    parameters:
      - $ref: "#/components/parameters/QueueItemId"
    put:
      operationId: reassignQueueWorkItem
      summary: Reassign queue work item
      description: Manual manager/admin reassignment. Requires queue:assign and If-Match; writes RoutingDecisionLog and ActivityTimelineEvent.
      tags: [WorkQueues]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueueReassignmentRequest"
      responses:
        "200":
          description: Queue item reassigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueWorkItem"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }
        "422": { $ref: "#/components/responses/UnprocessableContent" }

  /work-queues/{queueId}/rebalance:
    parameters:
      - $ref: "#/components/parameters/QueueId"
    post:
      operationId: rebalanceWorkQueue
      summary: Rebalance selected queue work items
      description: Bulk manager/admin reassignment with item-level success/failure results.
      tags: [WorkQueues]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueueRebalanceRequest"
      responses:
        "201":
          description: Rebalance results
          content:
            application/json:
              schema:
                type: object
                required: [results]
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      required: [queueWorkItemId, status]
                      properties:
                        queueWorkItemId: { type: string, format: uuid }
                        status: { type: string, enum: [Succeeded, Failed, Skipped] }
                        reasonCode: { type: string, nullable: true }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableContent" }

  /routing-events:
    get:
      operationId: listRoutingEvents
      summary: List routing audit events
      description: Returns append-only routing decision events for manager/admin diagnostics.
      tags: [WorkQueues]
      parameters:
        - name: sourceType
          in: query
          required: false
          schema:
            type: string
            enum: [Task, Submission, Renewal]
        - name: sourceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Routing events
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/RoutingEvent"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # ──────────────────────────────────────────────────────────────
  # F0017 Distribution hierarchy, producer ownership, and territory
  # ──────────────────────────────────────────────────────────────
  /distribution-nodes/{nodeId}/parent:
    parameters:
      - $ref: "#/components/parameters/DistributionNodeId"
    put:
      operationId: setDistributionNodeParent
      summary: Set or clear a distribution node parent
      description: |
        Sets or clears the parent of an MGA, broker, sub-broker, or producer
        distribution node. Requires `If-Match` with the node `rowVersion`.
        The service rejects self-parent attempts
        (`distribution_node_self_parent`, 422), cycle-producing moves
        (`distribution_node_cycle`, 409), inactive or invalid parents
        (`invalid_distribution_parent`, 422), and stale versions
        (`precondition_failed`, 412). Successful reparent recomputes cached
        ancestry for the node and its descendants and emits immutable timeline
        events atomically.
      tags: [DistributionHierarchy]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DistributionNodeParentRequest"
      responses:
        "200":
          description: Parent updated; ancestry cache recomputed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DistributionNode"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "422":
          $ref: "#/components/responses/UnprocessableContent"

  /distribution-nodes/{nodeId}/ancestors:
    parameters:
      - $ref: "#/components/parameters/DistributionNodeId"
    get:
      operationId: getDistributionNodeAncestors
      summary: Get distribution node ancestors
      description: |
        Returns the requested node and its cached root-to-node ancestry path.
        F0017 read scope is authenticated internal access; hierarchy-aware read
        scoping is deferred to F0037.
      tags: [DistributionHierarchy]
      responses:
        "200":
          description: Ancestors for the distribution node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DistributionNodeAncestorsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /distribution-nodes/{nodeId}/descendants:
    parameters:
      - $ref: "#/components/parameters/DistributionNodeId"
    get:
      operationId: listDistributionNodeDescendants
      summary: List distribution node descendants
      description: |
        Returns a depth-bounded, paginated descendant list for lazy hierarchy
        expansion. `depth` defaults to 2 and is capped to prevent unbounded tree
        responses.
      tags: [DistributionHierarchy]
      parameters:
        - $ref: "#/components/parameters/Depth"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Paginated descendant nodes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedDistributionNodeList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /producer-ownership:
    get:
      operationId: getProducerOwnership
      summary: Get producer ownership for a scope
      description: |
        Returns the effective-dated owner for an account or broker relationship
        scope. When `asOf` is omitted, returns the open/current ownership period.
      tags: [ProducerOwnership]
      parameters:
        - $ref: "#/components/parameters/OwnershipScopeType"
        - $ref: "#/components/parameters/OwnershipScopeId"
        - $ref: "#/components/parameters/AsOfDate"
      responses:
        "200":
          description: Producer ownership lookup result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProducerOwnershipLookupResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: assignProducerOwnership
      summary: Assign or reassign producer ownership
      description: |
        Creates an effective-dated producer ownership period. Reassignment with
        a later effective date closes the prior period and opens the new period
        in one transaction. Requires `If-Match` with the owned scope rowVersion.
        Overlap conflicts return `ownership_period_overlap` (409); invalid
        backdating/order returns `ownership_period_invalid` (422); stale scope
        versions return `precondition_failed` (412). Successful changes emit
        immutable timeline events atomically.
      tags: [ProducerOwnership]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProducerOwnershipAssignmentRequest"
      responses:
        "201":
          description: Producer ownership period created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProducerOwnership"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "422":
          $ref: "#/components/responses/UnprocessableContent"

  /commission-schedules:
    get:
      operationId: listCommissionSchedules
      summary: List commission schedules
      description: Returns effective-dated commission schedules filtered by carrier market, line of business, state, product code, and as-of date.
      tags: [Commissions]
      parameters:
        - name: carrierMarketId
          in: query
          schema: { type: string, format: uuid }
        - name: lineOfBusiness
          in: query
          schema: { type: string, maxLength: 80 }
        - name: state
          in: query
          schema: { type: string, pattern: "^[A-Z]{2}$" }
        - name: productCode
          in: query
          schema: { type: string, maxLength: 80 }
        - name: asOf
          in: query
          schema: { type: string, format: date }
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Commission schedules
          content:
            application/json:
              schema:
                type: object
                required: [data, page, pageSize, totalCount, totalPages]
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/CommissionSchedule" }
                  page: { type: integer }
                  pageSize: { type: integer }
                  totalCount: { type: integer }
                  totalPages: { type: integer }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      operationId: createCommissionSchedule
      summary: Create commission schedule
      description: Creates an effective-dated commission schedule. Overlapping active schedules for the same scope return `commission_schedule_overlap` (409). Successful creates emit timeline events.
      tags: [Commissions]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CommissionScheduleUpsertRequest" }
      responses:
        "201":
          description: Commission schedule created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommissionSchedule" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableContent" }

  /commission-schedules/{scheduleId}:
    parameters:
      - name: scheduleId
        in: path
        required: true
        schema: { type: string, format: uuid }
    put:
      operationId: updateCommissionSchedule
      summary: Update commission schedule
      description: Updates a commission schedule with `If-Match` row-version protection. Successful updates emit timeline events.
      tags: [Commissions]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CommissionScheduleUpsertRequest" }
      responses:
        "200":
          description: Commission schedule updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommissionSchedule" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }
        "422": { $ref: "#/components/responses/UnprocessableContent" }

  /producer-splits:
    post:
      operationId: upsertProducerSplitAssignment
      summary: Create or replace producer split assignment
      description: Creates an effective-dated policy split assignment. Active assignments must total 100.0000 percent and cannot overlap the same policy/effective period. Successful mutations emit timeline events.
      tags: [Commissions]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProducerSplitAssignmentUpsertRequest" }
      responses:
        "201":
          description: Producer split assignment created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProducerSplitAssignment" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }
        "422": { $ref: "#/components/responses/UnprocessableContent" }

  /policies/{policyId}/producer-splits:
    parameters:
      - $ref: "#/components/parameters/PolicyId"
    get:
      operationId: listPolicyProducerSplits
      summary: List producer split assignments for a policy
      tags: [Commissions]
      parameters:
        - name: asOf
          in: query
          schema: { type: string, format: date }
      responses:
        "200":
          description: Producer split assignments
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ProducerSplitAssignment" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /expected-commissions:
    get:
      operationId: listExpectedCommissions
      summary: Search expected commission records
      description: Returns source-record-authorized expected commission records for the commission workspace.
      tags: [Commissions]
      parameters:
        - name: policyId
          in: query
          schema: { type: string, format: uuid }
        - name: carrierMarketId
          in: query
          schema: { type: string, format: uuid }
        - name: producerNodeId
          in: query
          schema: { type: string, format: uuid }
        - name: calculationStatus
          in: query
          schema: { $ref: "#/components/schemas/CommissionCalculationStatus" }
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Expected commission records
          content:
            application/json:
              schema:
                type: object
                required: [data, page, pageSize, totalCount, totalPages]
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/ExpectedCommission" }
                  page: { type: integer }
                  pageSize: { type: integer }
                  totalCount: { type: integer }
                  totalPages: { type: integer }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /expected-commissions/{expectedCommissionId}/calculate:
    parameters:
      - name: expectedCommissionId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: calculateExpectedCommission
      summary: Recalculate expected commission
      description: Recalculates expected commission from policy premium, schedule, and split source data. Missing inputs produce named exception statuses rather than zero amounts.
      tags: [Commissions]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      responses:
        "201":
          description: Expected commission recalculated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExpectedCommission" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }

  /expected-commissions/{expectedCommissionId}/adjustments:
    parameters:
      - name: expectedCommissionId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: listCommissionAdjustments
      summary: List commission adjustments
      tags: [Commissions]
      responses:
        "200":
          description: Commission adjustments
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CommissionAdjustment" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      operationId: requestCommissionAdjustment
      summary: Request commission adjustment
      description: Creates a pending commission adjustment request and emits a timeline event.
      tags: [Commissions]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CommissionAdjustmentRequest" }
      responses:
        "201":
          description: Commission adjustment requested
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommissionAdjustment" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/UnprocessableContent" }

  /commission-adjustments/{adjustmentId}/decision:
    parameters:
      - name: adjustmentId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: decideCommissionAdjustment
      summary: Approve or reject commission adjustment
      description: Records an approval or rejection decision. Same-user request and approval returns `commission_adjustment_self_approval_denied` (403).
      tags: [Commissions]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CommissionAdjustmentDecisionRequest" }
      responses:
        "201":
          description: Commission adjustment decision recorded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommissionAdjustment" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }
        "422": { $ref: "#/components/responses/UnprocessableContent" }

  /revenue-attribution/rollups:
    get:
      operationId: getRevenueAttributionRollups
      summary: Get revenue attribution rollups
      description: Returns source-record-authorized revenue attribution totals by producer, broker, territory, carrier market, or policy period.
      tags: [Commissions]
      parameters:
        - name: groupBy
          in: query
          required: true
          schema: { type: string, enum: [Producer, Broker, Territory, CarrierMarket, PolicyPeriod] }
        - name: periodStart
          in: query
          schema: { type: string, format: date }
        - name: periodEnd
          in: query
          schema: { type: string, format: date }
        - name: carrierMarketId
          in: query
          schema: { type: string, format: uuid }
        - name: producerNodeId
          in: query
          schema: { type: string, format: uuid }
        - name: territoryId
          in: query
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Revenue attribution rollup response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RevenueAttributionRollupResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /territories:
    post:
      operationId: createTerritory
      summary: Create territory
      description: |
        Creates a territory definition with region/segment criteria. Active
        territory names must be unique; duplicate names return
        `territory_duplicate_name` (409). Successful creates emit immutable
        timeline events atomically.
      tags: [Territories]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TerritoryCreateRequest"
      responses:
        "201":
          description: Territory created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Territory"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableContent"

  /territories/{territoryId}/members:
    parameters:
      - $ref: "#/components/parameters/TerritoryId"
    get:
      operationId: listTerritoryMembers
      summary: List territory members as of a date
      description: |
        Returns members assigned to a territory for the requested as-of date.
        When `asOf` is omitted, returns current/open assignments.
      tags: [Territories]
      parameters:
        - $ref: "#/components/parameters/AsOfDate"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Paginated territory assignments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedTerritoryAssignmentList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: assignTerritoryMember
      summary: Assign or reassign a territory member
      description: |
        Creates an effective-dated territory assignment for a broker or producer.
        Requires `If-Match` with the territory `rowVersion`. Reassignment closes
        the prior period and opens the new period in one transaction. Duplicate
        or conflicting active overlaps return `territory_assignment_overlap`
        (409); invalid date order returns `territory_assignment_period_invalid`
        (422); stale territory versions return `precondition_failed` (412).
        Successful changes emit immutable timeline events atomically.
      tags: [Territories]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TerritoryMemberAssignmentRequest"
      responses:
        "201":
          description: Territory assignment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerritoryAssignment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "422":
          $ref: "#/components/responses/UnprocessableContent"

  /territory-assignments:
    get:
      operationId: getTerritoryAssignmentForMember
      summary: Get territory assignment for a member
      description: |
        Returns the territory assignment for a broker or producer member as of
        a date. When `asOf` is omitted, returns the current/open assignment if
        one exists.
      tags: [Territories]
      parameters:
        - $ref: "#/components/parameters/TerritoryMemberType"
        - $ref: "#/components/parameters/TerritoryMemberId"
        - $ref: "#/components/parameters/AsOfDate"
      responses:
        "200":
          description: Territory assignment lookup result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerritoryAssignmentLookupResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────────────────────────
  # Broker endpoints (existing)
  # ──────────────────────────────────────────────────────────────
  /brokers:
    get:
      operationId: listBrokers
      summary: List brokers
      description: >
        Returns a paginated list of brokers. For brokers with Status=Inactive,
        email and phone fields are returned as null (masking sentinel).
      tags: [Brokers]
      parameters:
        - $ref: "#/components/parameters/BrokerSearchQuery"
        - $ref: "#/components/parameters/BrokerStatusFilter"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Paginated broker list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedBrokerList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createBroker
      summary: Create broker
      description: >
        Creates a new broker. Status is omitted from the request and defaults
        to "Pending" server-side. Use PUT /brokers/{id} to change status.
      tags: [Brokers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrokerCreateRequest"
      responses:
        "201":
          description: Broker created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Broker"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /brokers/{brokerId}:
    parameters:
      - $ref: "#/components/parameters/BrokerId"
    get:
      operationId: getBrokerById
      summary: Get broker by id
      tags: [Brokers]
      responses:
        "200":
          description: Broker details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Broker"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateBroker
      summary: Update broker
      description: >
        Updates a broker record. Requires the If-Match header containing the current
        rowVersion. Returns 412 with code=precondition_failed if another user
        modified the broker since the caller last read it.
      tags: [Brokers]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrokerUpdateRequest"
      responses:
        "200":
          description: Broker updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Broker"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      operationId: deleteBroker
      summary: Deactivate broker
      description: >
        Soft-deactivates a broker (sets Status=Inactive, IsDeleted=true).
        Returns 409 with code=active_dependencies_exist if active submissions or
        renewals are linked to the broker. The record is retained for audit purposes;
        use POST /brokers/{brokerId}/reactivate (F0002-S0008) to reverse.
      tags: [Brokers]
      responses:
        "204":
          description: Broker deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ──────────────────────────────────────────────────────────────
  # Broker reactivate (F0002-S0008)
  # ──────────────────────────────────────────────────────────────
  /brokers/{brokerId}/reactivate:
    post:
      operationId: reactivateBroker
      summary: Reactivate a deactivated broker
      description: >
        Reverses deactivation (F0002-S0005). Sets Status=Active and IsDeleted=false.
        Requires broker:reactivate permission (DistributionManager or Admin).
        Returns 409 with code=already_active if the broker is not currently deactivated.
      tags: [Brokers]
      parameters:
        - name: brokerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Broker reactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ──────────────────────────────────────────────────────────────
  # Contact endpoints (existing)
  # ──────────────────────────────────────────────────────────────
  /contacts:
    get:
      operationId: listContacts
      summary: List contacts
      description: >
        Returns a paginated list of contacts, optionally filtered by brokerId.
        This endpoint uses a query-parameter filter (not a sub-resource URL) because
        contacts may belong to different brokers and a flat list with filters is
        more flexible for cross-broker search in future phases.
        For contacts whose parent broker has Status=Inactive, email and phone
        fields are returned as null (masking sentinel).
      tags: [Contacts]
      parameters:
        - name: brokerId
          in: query
          required: false
          description: Filter contacts for a specific broker.
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Paginated contact list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedContactList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createContact
      summary: Create contact
      tags: [Contacts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactCreateRequest"
      responses:
        "201":
          description: Contact created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /contacts/{contactId}:
    parameters:
      - $ref: "#/components/parameters/ContactId"
    get:
      operationId: getContactById
      summary: Get contact by id
      tags: [Contacts]
      responses:
        "200":
          description: Contact details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateContact
      summary: Update contact
      tags: [Contacts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactUpdateRequest"
      responses:
        "200":
          description: Contact updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteContact
      summary: Delete contact
      tags: [Contacts]
      responses:
        "204":
          description: Contact deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────────────────────────
  # F0028 Carrier and market relationship management
  # ──────────────────────────────────────────────────────────────
  /carrier-markets:
    get:
      operationId: listCarrierMarkets
      summary: List carrier markets
      description: Returns ABAC-scoped carrier market profiles for the market directory.
      tags: [CarrierMarkets]
      parameters:
        - name: q
          in: query
          required: false
          schema: { type: string, minLength: 2, maxLength: 200 }
        - name: status
          in: query
          required: false
          schema: { type: string, enum: [Active, Inactive, Prospect] }
        - name: marketType
