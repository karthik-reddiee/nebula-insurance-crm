        email:
          type: string
          format: email
        roles:
          type: array
          items:
            type: string
        isActive:
          type: boolean

    TaskCreateRequest:
      type: object
      description: Payload to create a task. DistributionManager/Admin can assign to any active user (F0004).
      required:
        - title
        - assignedToUserId
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 2000
        priority:
          type: string
          enum: [Low, Normal, High, Urgent]
          default: Normal
        dueDate:
          type: string
          format: date
        assignedToUserId:
          type: string
          format: uuid
          description: UserId (uuid) of user to assign. Must match authenticated user for non-manager roles. DistributionManager/Admin can specify any active user (F0004).
        linkedEntityType:
          type: string
        linkedEntityId:
          type: string
          format: uuid

    TaskUpdateRequest:
      type: object
      description: Payload to update a task. Creator (DistributionManager/Admin) can change assignee. Only assignee can change status (F0004).
      required: []
      minProperties: 1
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 2000
        status:
          type: string
          enum: [Open, InProgress, Done]
        priority:
          type: string
          enum: [Low, Normal, High, Urgent]
        dueDate:
          type: string
          format: date
          nullable: true
        assignedToUserId:
          type: string
          format: uuid
          description: If provided by assignee, must match own UserId. Creator (DistributionManager/Admin) can set to any active user for reassignment (F0004).

    # ── Timeline Schemas (NEW) ──────────────────────────────────
    TimelineEvent:
      type: object
      description: Activity timeline event for the activity feed.
      required:
        - id
        - entityType
        - entityId
        - eventType
        - occurredAt
      properties:
        id:
          type: string
          format: uuid
        entityType:
          type: string
          description: Type of entity this event relates to.
          example: Broker
        entityId:
          type: string
          format: uuid
        eventType:
          type: string
          description: Machine-readable event type.
          example: BrokerCreated
        eventDescription:
          type: string
          description: Human-readable event summary.
          example: New broker added by Sarah Chen
        entityName:
          type: string
          description: Resolved name of the related entity.
          example: Pacific Reinsurance
        actorDisplayName:
          type: string
          description: Display name of the user who performed the action.
          example: Sarah Chen
        occurredAt:
          type: string
          format: date-time

    # ── Policy Schemas (F0018) ──────────────────────────────────
    Policy:
      type: object
      description: Policy aggregate parent row. Immutable term / coverage history lives in PolicyVersion + PolicyCoverageLine. See ADR-018.
      required:
        - id
        - accountId
        - brokerOfRecordId
        - policyNumber
        - lineOfBusiness
        - carrierId
        - status
        - effectiveDate
        - expirationDate
        - totalPremium
        - premiumCurrency
        - currentVersionId
        - currentLobAttributes
        - versionCount
        - rowVersion
        - createdAt
        - updatedAt
      properties:
        id: { type: string, format: uuid }
        accountId: { type: string, format: uuid }
        brokerOfRecordId: { type: string, format: uuid }
        policyNumber:
          type: string
          maxLength: 40
          description: NEB-{LOB-prefix}-{yyyy}-{6-digit-sequence}. Server-assigned at create; immutable.
        lineOfBusiness:
          type: string
          enum: [Property, GeneralLiability, CommercialAuto, WorkersCompensation, ProfessionalLiability, Marine, Umbrella, Surety, Cyber, DirectorsOfficers]
        carrierId: { type: string, format: uuid }
        carrierName:
          type: string
          nullable: true
        status:
          type: string
          enum: [Pending, Issued, Cancelled, Expired]
        effectiveDate: { type: string, format: date }
        expirationDate: { type: string, format: date }
        boundAt: { type: string, format: date-time, nullable: true }
        issuedAt: { type: string, format: date-time, nullable: true }
        cancelledAt: { type: string, format: date-time, nullable: true }
        cancellationEffectiveDate: { type: string, format: date, nullable: true }
        cancellationReasonCode:
          type: string
          nullable: true
          enum: [NonPayment, InsuredRequest, UnderwritingDecision, MaterialMisrepresentation, CoverageNoLongerNeeded, CarrierWithdrawal, Other]
        cancellationReasonDetail:
          type: string
          nullable: true
          maxLength: 500
        reinstatementDeadline: { type: string, format: date, nullable: true }
        expiredAt: { type: string, format: date-time, nullable: true }
        predecessorPolicyId: { type: string, format: uuid, nullable: true }
        successorPolicyId:
          type: string
          format: uuid
          nullable: true
          description: Computed at read time from F0007 Renewal.BoundPolicyId. Never persisted.
        currentVersionId: { type: string, format: uuid }
        currentVersionNumber: { type: integer, minimum: 1 }
        currentLobAttributes:
          allOf:
            - $ref: "#/components/schemas/LobAttributeEnvelope"
          description: Current policy-stage attributes resolved from CurrentVersionId -> PolicyVersion; not an independent Policy write source.
        versionCount: { type: integer, minimum: 1 }
        totalPremium: { type: number, minimum: 0 }
        premiumCurrency:
          type: string
          enum: [USD]
        producerUserId: { type: string, format: uuid, nullable: true }
        producerDisplayName:
          type: string
          nullable: true
        importSource:
          type: string
          nullable: true
          enum: [manual, csv-import, f0019-bind-hook]
        externalPolicyReference:
          type: string
          nullable: true
          maxLength: 100
        accountDisplayNameAtLink:
          type: string
          nullable: true
          description: Denormalized per ADR-017 fallback contract.
        accountStatusAtRead:
          type: string
          nullable: true
          enum: [Active, Inactive, Merged, Deleted]
        accountSurvivorId: { type: string, format: uuid, nullable: true }
        availableTransitions:
          type: array
          items: { type: string }
        rowVersion: { type: string }
        createdAt: { type: string, format: date-time }
        createdByUserId: { type: string, format: uuid, nullable: true }
        updatedAt: { type: string, format: date-time }
        updatedByUserId: { type: string, format: uuid, nullable: true }

    PolicyListItem:
      type: object
      description: Compact policy row for list views. Fallback-aware account columns per ADR-017.
      required: [id, policyNumber, accountId, lineOfBusiness, status, effectiveDate, expirationDate, rowVersion]
      properties:
        id: { type: string, format: uuid }
        policyNumber: { type: string, maxLength: 40 }
