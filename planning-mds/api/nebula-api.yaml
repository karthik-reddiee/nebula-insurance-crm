        coverages:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/PolicyCoverageInput"

    PolicyUpdateRequest:
      type: object
      description: Material-term edits on Issued/Cancelled/Expired policies return 409 code=must_use_endorse.
      minProperties: 1
      properties:
        producerUserId: { type: string, format: uuid, nullable: true }
        brokerOfRecordId: { type: string, format: uuid, nullable: true }
        carrierId: { type: string, format: uuid, nullable: true }
        effectiveDate: { type: string, format: date, nullable: true }
        expirationDate: { type: string, format: date, nullable: true }
        totalPremium: { type: number, nullable: true, minimum: 0 }
        externalPolicyReference: { type: string, nullable: true, maxLength: 100 }

    PolicyIssueRequest:
      type: object
      properties:
        issueNotes: { type: string, nullable: true, maxLength: 500 }

    PolicyEndorsementRequest:
      type: object
      required: [endorsementReasonCode, effectiveDate, coverages]
      properties:
        endorsementReasonCode:
          type: string
          enum: [CoverageIncrease, CoverageDecrease, CoverageAdded, CoverageRemoved, PremiumAdjustment, NamedInsuredChange, AddressChange, DeductibleChange, OtherAdministrative]
        endorsementReasonDetail: { type: string, nullable: true, maxLength: 1000 }
        effectiveDate: { type: string, format: date }
        premiumDelta: { type: number, nullable: true }
        lobAttributes:
          allOf:
            - $ref: "#/components/schemas/LobAttributeEnvelope"
          description: Dynamic endorsement-stage attributes. Persistence targets the resulting PolicyVersion and PolicyEndorsement rows.
        coverages:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/PolicyCoverageInput"

