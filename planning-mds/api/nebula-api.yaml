          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [Open, InProgress, Done]
        priority:
          type: string
          enum: [Low, Normal, High, Urgent]
        dueDate:
          type: string
          format: date
          nullable: true
        assignedToUserId:
          type: string
          format: uuid
          description: Internal UserId (uuid) of assigned user per F0005.
        linkedEntityType:
          type: string
          nullable: true
        linkedEntityId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
