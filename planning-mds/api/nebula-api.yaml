  # ──────────────────────────────────────────────────────────────
  # Account, MGA, Program endpoints (existing)
  # ──────────────────────────────────────────────────────────────
  # ──────────────────────────────────────────────────────────────
  # Account endpoints (F0016 — Account 360 & Insured Management)
  # ──────────────────────────────────────────────────────────────
  /accounts:
    get:
      operationId: listAccounts
      summary: List accounts with search and filtering
      description: |
        Returns a paginated, filterable list of accounts. Supports search by
        displayName / legalName / taxId (prefix and contains), and filter by
        status, territory, broker-of-record, region, and primary LOB.
        ABAC-scoped to the authenticated user (region/territory/broker scope).
        Deleted accounts are excluded by default; `includeRemoved=true` is
        admin-only and returns Deleted accounts too. Merged accounts are
        returned only when filtered explicitly.
      tags: [Accounts]
      parameters:
        - name: q
          in: query
          required: false
          description: Case-insensitive search across displayName / legalName / taxId.
          schema: { type: string, minLength: 1, maxLength: 100 }
        - name: status
          in: query
          required: false
          description: Comma-separated status filter. Defaults to Active,Inactive.
          schema: { type: string }
        - name: territoryCode
          in: query
          required: false
          schema: { type: string }
        - name: region
          in: query
          required: false
          schema: { type: string }
        - name: brokerOfRecordId
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: primaryLineOfBusiness
          in: query
          required: false
          schema: { type: string }
        - name: include
          in: query
          required: false
          description: Comma-separated include hints. `summary` adds per-row counts.
          schema: { type: string }
        - name: includeRemoved
          in: query
          required: false
          description: Admin-only. Include Deleted accounts when true. Default false.
          schema: { type: boolean, default: false }
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [displayName, lastActivityAt, status, territoryCode]
            default: displayName
        - name: sortDir
          in: query
          required: false
          schema: { type: string, enum: [asc, desc], default: asc }
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Paginated account list
          content:
            application/json:
              schema:
                type: object
                required: [data, page, pageSize, totalCount, totalPages]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AccountListItem"
                  page: { type: integer }
                  pageSize: { type: integer }
                  totalCount: { type: integer }
                  totalPages: { type: integer }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      operationId: createAccount
      summary: Create an account
      description: |
        Creates an insured account. Optionally links an originating submission
        or policy for the from-submission / from-policy convenience flow.
        Returns a duplicate-hint payload (200 advisory) but does not block on
        name-match or tax-id-match unless `Idempotency-Key` repeats.
      tags: [Accounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountCreateRequest"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }

  /accounts/{accountId}:
    parameters:
      - $ref: "#/components/parameters/AccountId"
    get:
      operationId: getAccountById
      summary: Get account detail (tombstone-aware)
      description: |
        Returns full account detail. For Merged accounts returns `200` with
        `status=Merged` and `survivorAccountId` populated (frontend navigates
        to survivor). For Deleted accounts returns `410 Gone` with a
        ProblemDetails body including `stableDisplayName`, `removedAt`,
        `reasonCode`. See ADR-017.
      tags: [Accounts]
      responses:
        "200":
          description: Account detail (Active, Inactive, or Merged)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "410":
          description: Account deleted (tombstone)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    put:
      operationId: updateAccount
      summary: Update account profile
      description: |
        Updates profile fields. Requires If-Match (RowVersion). Returns 412 on
        stale token. Allowed only when status ∈ {Active, Inactive}.
      tags: [Accounts]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountUpdateRequest"
      responses:
        "200":
          description: Updated account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }

  /accounts/{accountId}/lifecycle:
    parameters:
      - $ref: "#/components/parameters/AccountId"
    post:
      operationId: transitionAccountLifecycle
      summary: Transition account lifecycle (deactivate / reactivate / delete)
      description: |
        Applies a lifecycle transition per the account state machine.
        `toState=Inactive` deactivates an Active account; `toState=Active`
        reactivates an Inactive account; `toState=Deleted` requires
        `reasonCode` (and `reasonDetail` when reasonCode=Other).
        Appends one WorkflowTransition and one ActivityTimelineEvent.
        Role: DistributionManager or Admin.
      tags: [Accounts]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountLifecycleRequest"
      responses:
        "200":
          description: Transition applied; returns updated account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }

  /accounts/{accountId}/merge:
    parameters:
      - $ref: "#/components/parameters/AccountId"
    post:
      operationId: mergeAccount
      summary: Merge this account into a survivor
      description: |
        Merges this (source) account into `survivorAccountId`. Source must be
        Active or Inactive; survivor must be Active; self-merge rejected.
        Commit is synchronous. Source transitions to Merged; `MergedIntoAccountId`
        set; RemovedAt stamped; StableDisplayName frozen. Appends a
        WorkflowTransition and ActivityTimelineEvent on source AND one mirror
        ActivityTimelineEvent on survivor. Retry-idempotent on same input.
        See ADR-017. Role: DistributionManager or Admin.
      tags: [Accounts]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountMergeRequest"
      responses:
        "200":
          description: Merge applied; returns source account in Merged state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }

