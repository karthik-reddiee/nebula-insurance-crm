        brokerName: { type: string, nullable: true }
        carrierId: { type: string, format: uuid, nullable: true }
        carrierName: { type: string, nullable: true }
        lineOfBusiness:
          type: string
          enum: [Property, GeneralLiability, CommercialAuto, WorkersCompensation, ProfessionalLiability, Marine, Umbrella, Surety, Cyber, DirectorsOfficers]
        status:
          type: string
