policy_rules:
  - id: policy_rule:account-contact-manage
    label: account:contact:manage
    action: contact:manage
    allowed_roles:
      - role:admin
      - role:distribution-manager
      - role:distribution-user
      - role:relationship-manager
    related_nodes:
      - capability:authorization-enforcement
      - entity:account
      - entity:contact
    resource: account
    source_docs:
      - planning-mds/security/authorization-matrix.md
      - planning-mds/security/policies/policy.csv
  - id: policy_rule:account-create
    label: account:create
    action: create
    allowed_roles:
      - role:admin
      - role:distribution-manager
      - role:distribution-user
    related_nodes:
      - capability:authorization-enforcement
      - entity:account
    resource: account
    source_docs:
      - planning-mds/security/authorization-matrix.md
      - planning-mds/security/policies/policy.csv
  - id: policy_rule:account-deactivate
    label: account:deactivate
    action: deactivate
    allowed_roles:
      - role:admin
      - role:distribution-manager
    related_nodes:
      - capability:authorization-enforcement
      - entity:account
      - entity:workflow-transition
      - workflow:account-lifecycle
    resource: account
    source_docs:
      - planning-mds/security/authorization-matrix.md
      - planning-mds/security/policies/policy.csv
  - id: policy_rule:account-delete
    label: account:delete
    action: delete
    allowed_roles:
      - role:admin
      - role:distribution-manager
    notes: Terminal tombstone — no FK re-pointing. Dependent views return 410 Gone keyed by accountId.
    related_nodes:
      - capability:authorization-enforcement
      - entity:account
      - entity:workflow-transition
      - workflow:account-lifecycle
    resource: account
    source_docs:
      - planning-mds/security/authorization-matrix.md
      - planning-mds/security/policies/policy.csv
  - id: policy_rule:account-merge
    label: account:merge
    action: merge
    allowed_roles:
      - role:admin
      - role:distribution-manager
    notes: Tombstone-forward merge — source becomes Merged with MergedIntoAccountId set to survivorAccountId;
      no FK re-pointing. Dependent reads return 200 with survivorAccountId.
    related_nodes:
      - capability:authorization-enforcement
      - entity:account
      - entity:workflow-transition
      - workflow:account-lifecycle
    resource: account
    source_docs:
      - planning-mds/architecture/decisions/ADR-017-account-merge-tombstone-and-fallback-contract.md
      - planning-mds/security/authorization-matrix.md
      - planning-mds/security/policies/policy.csv
  - id: policy_rule:account-reactivate
    label: account:reactivate
    action: reactivate
    allowed_roles:
      - role:admin
      - role:distribution-manager
    related_nodes:
      - capability:authorization-enforcement
      - entity:account
      - entity:workflow-transition
      - workflow:account-lifecycle
    resource: account
    source_docs:
      - planning-mds/security/authorization-matrix.md
      - planning-mds/security/policies/policy.csv
  - id: policy_rule:account-read
    label: account:read
    action: read
    allowed_roles:
      - role:admin
      - role:broker-user
      - role:distribution-manager
      - role:distribution-user
      - role:program-manager
      - role:relationship-manager
      - role:underwriter
    notes: Broker/region/territory ABAC scoping applied per role; BrokerUser reads are broker-tenant scoped
      and return 410 on deleted and 200+survivorAccountId on merged.
    related_nodes:
      - capability:authorization-enforcement
      - entity:account
    resource: account
    source_docs:
      - F0016/README.md
      - planning-mds/security/authorization-matrix.md
      - planning-mds/security/policies/policy.csv
  - id: policy_rule:account-relationship-change
    label: account:relationship:change
    action: relationship:change
    allowed_roles:
      - role:admin
      - role:distribution-manager
    notes: Appends AccountRelationshipHistory + ActivityTimelineEvent. Used for BrokerOfRecord, PrimaryProducer,
      Territory changes.
    related_nodes:
      - capability:authorization-enforcement
      - entity:account
      - entity:broker
    resource: account
    source_docs:
      - planning-mds/security/authorization-matrix.md
      - planning-mds/security/policies/policy.csv
  - id: policy_rule:account-update
    label: account:update
    action: update
    allowed_roles:
      - role:admin
      - role:distribution-manager
      - role:distribution-user
    notes: If-Match required; 412 on stale RowVersion. Update is profile-only; lifecycle, merge, and relationship
      changes have dedicated endpoints.
    related_nodes:
      - capability:authorization-enforcement
      - entity:account
    resource: account
    source_docs:
      - planning-mds/security/authorization-matrix.md
      - planning-mds/security/policies/policy.csv
  - id: policy_rule:broker-create
    label: broker:create
    action: create
    allowed_roles:
      - role:admin
      - role:distribution-manager
      - role:distribution-user
      - role:relationship-manager
    related_nodes:
      - capability:authorization-enforcement
      - capability:broker-relationship-management
      - entity:broker
    resource: broker
    source_docs:
      - planning-mds/security/authorization-matrix.md
      - planning-mds/security/policies/policy.csv
  - id: policy_rule:broker-delete
    label: broker:delete
    action: delete
    allowed_roles:
      - role:admin
      - role:distribution-manager
      - role:distribution-user
    notes: RelationshipManager delete is explicitly DENY (authorization-matrix.md §2.1 OQ-4 resolution);
      structural record changes require DistributionUser/Manager or Admin.
    related_nodes:
      - capability:authorization-enforcement
      - capability:broker-relationship-management
      - entity:broker
    resource: broker
    source_docs:
      - planning-mds/security/authorization-matrix.md
      - planning-mds/security/policies/policy.csv
  - id: policy_rule:broker-insight-read
    label: broker_insight:read
    action: read
    allowed_roles:
      - role:admin
      - role:distribution-manager
      - role:distribution-user
      - role:program-manager
      - role:relationship-manager
      - role:underwriter
    notes: External BrokerUser and ExternalUser receive no F0008 policy lines.
    rationale:
      - adr: adr:031
        section: Decision §2
        summary: A high-level broker_insight:read gate is followed by source-record query filtering before
          any aggregate counts, peer sets, ranks, trends, or links leave the server.
    related_nodes:
      - capability:authorization-enforcement
      - capability:broker-insights
      - entity:broker-insight-projection
    resource: broker_insight
    source_docs:
      - planning-mds/architecture/decisions/ADR-031-broker-insights-read-models.md
      - planning-mds/security/authorization-matrix.md
      - planning-mds/security/policies/policy.csv
  - id: policy_rule:broker-reactivate
    label: broker:reactivate
    action: reactivate
    allowed_roles:
      - role:admin
      - role:distribution-manager
    notes: Reverse of broker:delete (F0002-S0008). Manager authority required; DistributionUser and RelationshipManager
      excluded because structural record change requires manager authority.
    related_nodes:
      - capability:authorization-enforcement
      - capability:broker-relationship-management
      - entity:broker
    resource: broker
    source_docs:
      - planning-mds/security/authorization-matrix.md
      - planning-mds/security/policies/policy.csv
  - id: policy_rule:broker-read
    label: broker:read
    action: read
    allowed_roles:
      - role:admin
      - role:broker-user
      - role:distribution-manager
      - role:distribution-user
      - role:program-manager
      - role:relationship-manager
      - role:underwriter
    related_nodes:
