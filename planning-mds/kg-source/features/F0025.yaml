notes:
  - Phase A refined on 2026-07-07 via plan run 2026-07-07-8a9b2629. F0025 is bounded to expected commission
    visibility, producer split attribution, adjustment capture, and management rollups; full accounting,
    payments, billing, reconciliation, payouts, tax, statements, GL export, and external compensation
    portals remain out of scope.
  - Phase B architecture drafted on 2026-07-07 via plan run 2026-07-07-8a9b2629. ADR-032 defines the CommissionRevenue
    module, persisted expected commission review records, effective-dated schedules/splits, single-step
    adjustment approval, source-authorized rollups, and timeline audit.
phase: Brokerage Platform Expansion
