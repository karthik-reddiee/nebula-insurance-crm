notes:
  - 'F0038↔F0007 reconciliation (ADR-028 §3): mock-send commits the real Identified→Outreach transition,
    but this is Distribution-owned in F0007. Resolved by a dedicated least-privilege renewal:draft_outreach
    (Underwriter only) gating draft+mock-send; the engine WorkflowStateMachine permits Identified→Outreach
    for an Underwriter only on the mock-send path. General renewal:transition ownership unchanged. #1
    operator ratification item at G5.'
  - Neuron owns its neuron.* operation store directly (threads/messages/message_parts/agent_runs/tool_calls/provenance_events;
    data-model §11), NOT via an engine pass-through. Cross-store writes are engine-first authoritative
    + idempotent Neuron record referencing the engine id (ADR-028 §2).
  - Phase B Architect bindings (plan run 2026-06-30-d1dd91f7), governed by ADR-027 (A2A-aligned orchestration
    foundation) + ADR-028 (persistence schema, cross-store write consistency, outreach authorization).
    Neuron is a stateless secondary interface; the .NET engine is the CRM source of truth and authorization
    boundary.
  - 'code-index.yaml bindings intentionally deferred: no neuron/ implementation code exists at plan; the
    F0038 feature action binds the as-built neuron/ + engine/ paths.'
