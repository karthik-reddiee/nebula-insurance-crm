  - id: event:neuron-companion-telemetry
    label: NeuronCompanionTelemetry
    event_type: NeuronCompanionTelemetry
    rationale:
      - adr: adr:024
        section: Decision §6
        summary: 'Reuses the F0035 SessionTelemetry fire-and-forget-to-Serilog ingest pattern; needs-attention-surfaced/draft-ready
          bracket the baseline metric, plus the minimal secondary set. PII boundary: correlation ids +
          metric fields only.'
    related_nodes:
      - capability:neuron-companion-telemetry
    source_docs:
      - F0038/F0038-S0008-companion-telemetry-instrumentation.md
      - planning-mds/schemas/neuron-companion-telemetry-event.schema.json
  - id: event:renewal-outreach-drafted
    label: RenewalOutreachDrafted
    event_type: RenewalOutreachDrafted
    rationale:
      - adr: adr:028
        section: Decision §3
        summary: Draft persists as an InternalOnly AI-generated renewal ActivityTimelineEvent with provenance
          (actor/model/prompt id+version/content hash); generation does NOT transition the renewal.
    related_nodes:
      - capability:neuron-outreach-drafter
      - entity:activity-timeline-event
      - entity:renewal
    source_docs:
      - F0038/F0038-S0005-renewal-outreach-draft.md
      - planning-mds/architecture/decisions/ADR-028-neuron-companion-persistence-and-outreach-authorization.md
  - id: event:renewal-outreach-mock-sent
    label: RenewalOutreachMockSent
    event_type: RenewalOutreachMockSent
    rationale:
      - adr: adr:028
        section: Decision §3
        summary: Mock-send commits the real Identified→Outreach WorkflowTransition + a 'sent (simulated)'
          ActivityTimelineEvent atomically, but fakes SMTP — no real email. Reuses event:renewal-transitioned
          for the transition itself.
    related_nodes:
      - capability:neuron-outreach-drafter
      - entity:activity-timeline-event
      - entity:renewal
      - entity:workflow-transition
    source_docs:
      - F0038/F0038-S0006-mock-send-and-workflow-transition.md
      - planning-mds/architecture/decisions/ADR-028-neuron-companion-persistence-and-outreach-authorization.md
  - id: event:renewal-transitioned
    label: RenewalTransitioned
    event_type: RenewalTransitioned
    rationale:
      - adr: adr:011
        section: F0007 Renewal Workflow Specification
        summary: Renewal transitions follow the same append-only audit pattern as submission transitions
          for consistent cross-workflow reporting.
    related_nodes:
      - entity:activity-timeline-event
      - entity:renewal
      - entity:workflow-transition
    source_docs:
      - F0007/F0007-S0003-renewal-status-transitions.md
      - planning-mds/architecture/decisions/ADR-011-crm-workflow-state-machines-and-transition-history.md
