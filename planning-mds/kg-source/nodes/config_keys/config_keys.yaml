  - id: config_key:published-configuration-sets
    label: Published Operational Configuration Sets
    key: published-configuration-sets
    rationale:
      - adr: adr:016
        section: Decision
        summary: Governed publish semantics with versioning and validation prevent ad hoc runtime configuration
          and ensure audit trails for rollback.
    related_nodes:
      - adr:016
    source_docs:
      - planning-mds/architecture/decisions/ADR-016-published-operational-configuration-governance.md
  - id: config_key:workflow-sla-thresholds
    label: WorkflowSlaThresholds
    key: WorkflowSlaThresholds
    rationale:
      - adr: adr:009
        section: Decision §2
        summary: SLA configuration stored as entities rather than hardcoded day-range buckets, enabling
          per-status warning/target thresholds.
    related_nodes:
      - entity:workflow-sla-threshold
      - workflow:renewal
      - workflow:submission
    source_docs:
      - planning-mds/architecture/decisions/ADR-009-lob-classification-and-sla-configuration.md
      - planning-mds/architecture/decisions/ADR-014-workflow-sla-threshold-per-lob-extension.md
