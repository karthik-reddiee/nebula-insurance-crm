id: capability:neuron-message-envelope
label: Versioned Multi-Part Message/Component Envelope
notes: 'Versioned envelope (text|app|status|sources|actions) keyed by thread_id so persisted threads replay
  correctly. Component-registry rendering only.

  '
rationale:
  - adr: adr:027
    section: Decision §6
    summary: A2A messages/parts/artifacts map onto the envelope part types; the frontend renders only
      registered components from validated props — Neuron never returns executable markup or model-emitted
      numbers.
