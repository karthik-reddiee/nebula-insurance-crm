id: capability:commission-revenue-tracking
label: Commission Revenue Tracking
notes: Internal-only expected commission, producer split attribution, adjustment, and revenue rollup visibility
  for F0025; explicitly excludes settlement, billing, payments, reconciliation, statements, tax, and producer
  payout execution.
rationale:
  - adr: adr:032
    section: Decision
    summary: F0025 introduces a CommissionRevenue module that persists expected commission review records
      with source snapshots, effective-dated schedules/splits, single-step adjustments, and source-authorized
      rollup projections.
