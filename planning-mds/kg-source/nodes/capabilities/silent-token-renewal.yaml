id: capability:silent-token-renewal
label: Silent Token Renewal
rationale:
  - adr: adr:024
    section: Decision §2
    summary: Coalescing semaphore guarantees exactly one in-flight refresh per expiry burst; queued requests
      retry once on success. Mutations are never auto-replayed; only reads.
