id: entity:document-template
label: DocumentTemplate
rationale:
  - adr: adr:012
    section: Decision §10
    summary: Templates are documents stored under <docroot>/templates/ with the same sidecar JSON shape;
      materialising a template into a parent record creates an independent document with provenance.source
      = template:{id}.
