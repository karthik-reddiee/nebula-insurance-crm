      - planning-mds/features/archive/F0023-global-search-saved-views-and-operational-reporting/feature-assembly-plan.md
      - planning-mds/schemas/saved-view.schema.json
  - id: capability:session-context-restore
    label: Session Context Restore (Route + Form State)
    rationale:
      - adr: adr:024
        section: Decision §4
        summary: sessionStorage snapshot keyed by (user_id, route, form_key); 1-hour TTL; 256 KB cap;
          mutations require explicit user re-confirm — never auto-replayed.
    related_nodes:
      - capability:authentication
    source_docs:
      - planning-mds/architecture/decisions/ADR-024-session-continuity-and-token-refresh.md
      - planning-mds/features/archive/F0035-session-continuity-and-token-refresh/F0035-S0003-forced-reauth-context-restore.md
  - id: capability:session-continuity
    label: Session Continuity
    rationale:
      - adr: adr:024
        section: Decision
        summary: Five coordinated mechanisms (auth-error discriminator, silent renewal with coalescing,
          idle modal, forced-reauth context restore, telemetry) remove disruptive mid-workflow login redirects
          while preserving F0009 auth boundaries.
    related_nodes:
      - capability:auth-error-classification
      - capability:authentication
      - capability:idle-warning
      - capability:session-context-restore
      - capability:session-telemetry
      - capability:silent-token-renewal
    source_docs:
      - planning-mds/architecture/decisions/ADR-024-session-continuity-and-token-refresh.md
      - planning-mds/features/archive/F0035-session-continuity-and-token-refresh/PRD.md
  - id: capability:session-telemetry
    label: Session Continuity Telemetry
    rationale:
      - adr: adr:024
        section: Decision §5
        summary: '9 event types emitted fire-and-forget to Serilog category Nebula.Session.Continuity.
          Hard PII boundary: UserId + session_id only; no email/name/IP/raw tokens/broker_tenant_id/role
          list/form contents.'
    related_nodes:
      - capability:session-continuity
    source_docs:
      - planning-mds/architecture/decisions/ADR-024-session-continuity-and-token-refresh.md
      - planning-mds/features/archive/F0035-session-continuity-and-token-refresh/F0035-S0005-session-telemetry-events.md
  - id: capability:silent-token-renewal
    label: Silent Token Renewal
    rationale:
      - adr: adr:024
        section: Decision §2
        summary: Coalescing semaphore guarantees exactly one in-flight refresh per expiry burst; queued
          requests retry once on success. Mutations are never auto-replayed; only reads.
    related_nodes:
      - capability:auth-error-classification
      - capability:authentication
    source_docs:
      - planning-mds/architecture/decisions/ADR-024-session-continuity-and-token-refresh.md
      - planning-mds/features/archive/F0035-session-continuity-and-token-refresh/F0035-S0001-silent-token-renewal.md
