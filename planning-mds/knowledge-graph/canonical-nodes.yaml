  - id: config_key:published-configuration-sets
    label: Published Operational Configuration Sets
    key: published-configuration-sets
    source_docs:
      - planning-mds/architecture/decisions/ADR-016-published-operational-configuration-governance.md
    related_nodes:
      - adr:016
    rationale:
      - adr: adr:016
        section: "Decision"
        summary: "Governed publish semantics with versioning and validation prevent ad hoc runtime configuration and ensure audit trails for rollback."
  - id: config_key:document-taxonomy
    label: Document Type Taxonomy
    key: configuration/taxonomy.yaml
    source_docs:
      - planning-mds/architecture/decisions/ADR-012-shared-document-storage-and-metadata-architecture.md
    related_nodes:
      - entity:document
      - capability:document-management
    rationale:
      - adr: adr:012
        section: "Decision §6"
        summary: "Document type taxonomy is canonical YAML inside the reserved configuration/ folder; code never embeds document type values."
  - id: config_key:document-metadata-schema-registry
    label: Document Metadata Schema Registry
    key: configuration/metadata-schemas/registry.yaml
    source_docs:
      - planning-mds/architecture/decisions/ADR-012-shared-document-storage-and-metadata-architecture.md
      - planning-mds/schemas/document-metadata-schema-registry.schema.json
    related_nodes:
      - entity:document
      - entity:document-template
      - capability:document-management
      - schema:document-sidecar
      - schema:document-metadata-schema-registry
    rationale:
      - adr: adr:012
        section: "Decision §6.1"
        summary: "Type-specific document metadata is validated by versioned JSON Schemas in document configuration; sidecars pin the schema version so historical metadata stays readable."
  - id: config_key:document-retention-policies
    label: Document Retention Policies
    key: configuration/document-retention-policies.yaml
    source_docs:
      - planning-mds/architecture/decisions/ADR-012-shared-document-storage-and-metadata-architecture.md
      - planning-mds/architecture/decisions/ADR-019-mock-quarantine-then-promote-ingest-pipeline.md
      - planning-mds/schemas/document-retention-policy.schema.json
    related_nodes:
      - entity:document
      - workflow:document-ingest
      - capability:document-retention
      - schema:document-retention-policy
    rationale:
      - adr: adr:012
        section: "Decision §7"
        summary: "Per-type retention with hard 10-day MVP ceiling; sweeper reads YAML and removes documents past their per-type window. Loader rejects values above the ceiling so MVP cannot silently retain too long."
      - adr: adr:019
        section: "Decision §Configuration"
        summary: "Quarantine knobs (holdSeconds, workerTickSeconds, maxRetries) colocated in the same retention YAML so all document repository configuration is in one file."
  - id: config_key:document-classification-policy
    label: Document Classification Policy (Casbin)
    key: configuration/casbin-document-roles.yaml
    source_docs:
      - planning-mds/features/archive/F0020-document-management-and-acord-intake/F0020-S0009-classification-based-access-control.md
      - planning-mds/security/authorization-matrix.md
      - planning-mds/schemas/document-classification-policy.schema.json
    related_nodes:
      - entity:document
      - capability:document-classification
      - schema:document-classification-policy
    rationale:
      - adr: adr:012
        section: "Decision §5"
        summary: "Classification policy table is YAML, not code. Closed-by-default missing entries deny; loader rejects malformed files and keeps the prior policy in force."

