entities:
  - id: entity:account
    label: Account
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/domain/glossary.md
  - id: entity:activity-timeline-event
    label: ActivityTimelineEvent
    source_docs:
      - planning-mds/architecture/data-model.md
  - id: entity:broker
    label: Broker
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/domain/glossary.md
  - id: entity:broker-region
    label: BrokerRegion
    source_docs:
      - planning-mds/architecture/data-model.md
  - id: entity:carrier-ref
    label: CarrierRef
    rationale:
      - adr: adr:018
        section: Decision §1
        summary: Carrier reference-data seed used by the Policy aggregate in MVP; a full Carrier lifecycle
          is a follow-up feature.
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-018-policy-aggregate-versioning-and-reinstatement-window.md
  - id: entity:communication-event
    label: CommunicationEvent
    notes: Durable source record for structured notes, calls, meetings, and email-linked references; projected
      into ActivityTimelineEvent for timelines.
    source_docs:
      - planning-mds/architecture/decisions/ADR-029-communication-activity-capture-and-redaction.md
      - planning-mds/features/archive/F0021-communication-hub-and-activity-capture/architecture-plan.md
  - id: entity:communication-link
    label: CommunicationLink
    notes: Link between a communication source record and approved CRM records such as broker, account,
      submission, policy, renewal, or task.
    source_docs:
      - planning-mds/features/archive/F0021-communication-hub-and-activity-capture/architecture-plan.md
  - id: entity:communication-participant
    label: CommunicationParticipant
    notes: Structured participant metadata for captured communication; not an outbound delivery recipient
      model.
    source_docs:
      - planning-mds/features/archive/F0021-communication-hub-and-activity-capture/architecture-plan.md
  - id: entity:contact
    label: Contact
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/domain/glossary.md
  - id: entity:document
    label: Document
    rationale:
      - adr: adr:012
        section: Decision
        summary: Shared document subsystem prevents fragmented per-feature file models that would duplicate
          metadata rules, weaken auditability, and complicate access control.
    source_docs:
      - planning-mds/architecture/decisions/ADR-012-shared-document-storage-and-metadata-architecture.md
      - planning-mds/domain/glossary.md
  - id: entity:document-template
    label: DocumentTemplate
    rationale:
      - adr: adr:012
        section: Decision §10
        summary: Templates are documents stored under <docroot>/templates/ with the same sidecar JSON
          shape; materialising a template into a parent record creates an independent document with provenance.source
          = template:{id}.
    source_docs:
      - planning-mds/architecture/decisions/ADR-012-shared-document-storage-and-metadata-architecture.md
      - planning-mds/features/archive/F0020-document-management-and-acord-intake/F0020-S0012-document-templates-library.md
  - id: entity:lob-bundle-activation-event
    label: LobBundleActivationEvent
    rationale:
      - adr: adr:020
        section: Decision
        summary: Bundle activation, deprecation, retirement, and rollback need append-only evidence because
          product schema changes alter validation behavior.
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-020-lob-extensible-attribute-architecture.md
  - id: entity:lob-product
    label: LobProduct
    rationale:
      - adr: adr:020
        section: Decision
        summary: Product identity, kind, code, and line-of-business semantics are separated from individual
          product versions so sentinels and standard products share one registry model.
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-020-lob-extensible-attribute-architecture.md
  - id: entity:lob-product-version
    label: LobProductVersion
    rationale:
      - adr: adr:020
        section: Decision
        summary: Lifecycle rows pin a deterministic product version id to keep historical attributes resolvable
          after new schema versions activate.
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-020-lob-extensible-attribute-architecture.md
  - id: entity:lob-schema-bundle
    label: LobSchemaBundle
    rationale:
      - adr: adr:022
        section: Decision
        summary: Resolved schema bundles are the runtime validation and dynamic-form contract; OpenAPI
          receives a 3.0.3 projection, not the authoritative source.
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-020-lob-extensible-attribute-architecture.md
      - planning-mds/architecture/decisions/ADR-022-validator-equivalence-restricted-profile.md
      - planning-mds/schemas/lob-schema-bundle.schema.json
  - id: entity:mga
    label: MGA
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/domain/glossary.md
  - id: entity:operational-report-projection
    label: OperationalReportProjection
    rationale:
      - adr: adr:014-search
        section: Operational Report Projection Design
        summary: Queryable report fact rows store source dimensions so workload and aging reports aggregate
          only after authorization filtering.
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-014-search-index-and-saved-view-architecture.md
      - planning-mds/features/archive/F0023-global-search-saved-views-and-operational-reporting/feature-assembly-plan.md
  - id: entity:policy
    label: Policy
    rationale:
      - adr: adr:018
        section: Decision §1
        summary: Policy aggregate is a mutable parent row (lifecycle state + denormalized context) plus
          immutable PolicyVersion snapshots and materialized PolicyCoverageLine rows; endorsements and
          reinstatements produce new versions rather than mutating history.
      - adr: adr:020
        section: Decision
        summary: Policy is not an independent LOB attribute carrier; current product attributes are read
          through CurrentVersionId -> PolicyVersion.
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-018-policy-aggregate-versioning-and-reinstatement-window.md
      - planning-mds/architecture/decisions/ADR-020-lob-extensible-attribute-architecture.md
      - planning-mds/domain/glossary.md
  - id: entity:policy-coverage-line
    label: PolicyCoverageLine
    rationale:
      - adr: adr:018
        section: Decision §1
        summary: Materialized coverage line attached to a specific PolicyVersion. Re-materialized on every
          endorsement/reinstatement so that queries for current coverages do not require walking snapshot
          blobs.
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-018-policy-aggregate-versioning-and-reinstatement-window.md
  - id: entity:policy-endorsement
    label: PolicyEndorsement
    rationale:
      - adr: adr:018
        section: Decision §1
        summary: Endorsement record on an Issued policy; ties 1:1 to the PolicyVersion it produced and
          carries reason code, effective date, and premium delta.
      - adr: adr:020
        section: Decision
        summary: PolicyEndorsement carries endorsement-stage LOB attributes until the resulting PolicyVersion
          freezes the authoritative policy-stage attributes.
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-018-policy-aggregate-versioning-and-reinstatement-window.md
      - planning-mds/architecture/decisions/ADR-020-lob-extensible-attribute-architecture.md
  - id: entity:policy-version
    label: PolicyVersion
    rationale:
      - adr: adr:018
        section: Decision §1
        summary: Immutable term snapshot captured at issue, endorsement, or reinstatement. VersionNumber
          is monotonic per PolicyId and the source of truth for historical policy terms.
      - adr: adr:020
        section: Decision
        summary: PolicyVersion is the authoritative policy-level LOB attribute carrier; attributes_json
          supplements platform snapshots rather than replacing them.
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-018-policy-aggregate-versioning-and-reinstatement-window.md
      - planning-mds/architecture/decisions/ADR-020-lob-extensible-attribute-architecture.md
  - id: entity:producer
    label: Producer
    rationale:
      - adr: adr:026
        section: Decision
        summary: Producers are distribution nodes in the self-referencing hierarchy and the subject of
          effective-dated ownership; node_type ordering is advisory so depth is unbounded.
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-026-broker-mga-hierarchy-producer-ownership-and-territory.md
  - id: entity:producer-ownership
    label: ProducerOwnership
    rationale:
      - adr: adr:026
        section: Decision
        summary: 'Effective-dated ownership relationship (effective_from/to): reassignment closes the
          prior period and opens a new one so point-in-time attribution is preserved.'
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-026-broker-mga-hierarchy-producer-ownership-and-territory.md
  - id: entity:program
    label: Program
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/domain/glossary.md
  - id: entity:renewal
    label: Renewal
    rationale:
      - adr: adr:020
        section: Decision
        summary: Renewal is a variant attribute carrier whose renewal-stage attributes are schema-pinned
          independently of core renewal workflow state.
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-020-lob-extensible-attribute-architecture.md
      - planning-mds/domain/glossary.md
  - id: entity:saved-view
    label: SavedView
    rationale:
      - adr: adr:014-search
        section: Saved View Design
        summary: Saved views persist reusable criteria for personal or team scopes; applying a view always
          reruns current authorization and never grants access.
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-014-search-index-and-saved-view-architecture.md
      - planning-mds/features/archive/F0023-global-search-saved-views-and-operational-reporting/feature-assembly-plan.md
      - planning-mds/schemas/saved-view.schema.json
  - id: entity:saved-view-audit-event
    label: SavedViewAuditEvent
    rationale:
      - adr: adr:014-search
        section: Decision
        summary: Saved-view administrative mutations append immutable audit rows separate from source-record
          timelines.
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-014-search-index-and-saved-view-architecture.md
      - planning-mds/features/archive/F0023-global-search-saved-views-and-operational-reporting/feature-assembly-plan.md
  - id: entity:search-document
    label: SearchDocument
    notes: SearchDocument is a read-side projection only; source modules remain authoritative for detail
      and access semantics.
    rationale:
      - adr: adr:014-search
        section: Search Index Design
        summary: One permission-filterable search row per source record enables cross-object search without
          querying every transactional aggregate for each request.
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-014-search-index-and-saved-view-architecture.md
      - planning-mds/features/archive/F0023-global-search-saved-views-and-operational-reporting/feature-assembly-plan.md
  - id: entity:submission
    label: Submission
    rationale:
      - adr: adr:020
        section: Decision
        summary: 'Submission is a variant attribute carrier: core fields remain columned while product-specific
          intake attributes are pinned by lob_product_version_id and stored in attributes_json.'
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-020-lob-extensible-attribute-architecture.md
      - planning-mds/domain/glossary.md
  - id: entity:submission-approval-decision
    label: SubmissionApprovalDecision
    rationale:
      - adr: adr:025
        section: Decision §3
        summary: Append-only single-approver decision (approver, reason, authority context) gating bind;
          shaped to extend to maker-checker / authority limits without a workflow rewrite.
    source_docs:
      - planning-mds/architecture/decisions/ADR-025-submission-downstream-workflow-quote-approval-bind-and-archive.md
      - planning-mds/features/archive/F0019-submission-quoting-proposal-and-approval/F0019-S0003-underwriting-approval-checkpoint.md
      - planning-mds/features/archive/F0019-submission-quoting-proposal-and-approval/PRD.md
  - id: entity:submission-bind-handoff
    label: SubmissionBindHandoff
    rationale:
      - adr: adr:025
        section: Decision §4
        summary: Append-only bind handoff coordination record created after approval; records handoff
          metadata and supports idempotent bind request/confirmation without creating policies directly.
    source_docs:
      - planning-mds/architecture/decisions/ADR-025-submission-downstream-workflow-quote-approval-bind-and-archive.md
      - planning-mds/features/archive/F0019-submission-quoting-proposal-and-approval/F0019-S0004-bind-decision-and-policy-handoff.md
      - planning-mds/features/archive/F0019-submission-quoting-proposal-and-approval/PRD.md
  - id: entity:submission-quote-packet
    label: SubmissionQuotePacket
    rationale:
      - adr: adr:025
        section: Decision §2
        summary: Submission-scoped coordination record (status, linked F0020 documents, recorded reference
          facts validated for presence/format only) — never computed. A CRM packet, not a quoting/rating
          artifact.
    source_docs:
      - planning-mds/architecture/decisions/ADR-025-submission-downstream-workflow-quote-approval-bind-and-archive.md
      - planning-mds/features/archive/F0019-submission-quoting-proposal-and-approval/F0019-S0002-submission-quote-proposal-packet-lifecycle.md
      - planning-mds/features/archive/F0019-submission-quoting-proposal-and-approval/PRD.md
  - id: entity:task-item
    label: TaskItem
    source_docs:
      - planning-mds/architecture/data-model.md
  - id: entity:territory
    label: Territory
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-026-broker-mga-hierarchy-producer-ownership-and-territory.md
  - id: entity:territory-assignment
    label: TerritoryAssignment
    rationale:
      - adr: adr:026
        section: Decision
        summary: Effective-dated territory membership with no conflicting active overlap for the same
          member/period.
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-026-broker-mga-hierarchy-producer-ownership-and-territory.md
  - id: entity:user-profile
    label: UserProfile
    notes: Identity, roles, regions, and assignment actor root.
    source_docs:
      - planning-mds/architecture/data-model.md
  - id: entity:workflow-sla-threshold
    label: WorkflowSlaThreshold
    rationale:
      - adr: adr:009
        section: Decision §2
        summary: Per-entity-type, per-status SLA thresholds enable aging band computation (on-time/approaching/overdue)
          for dashboard gauges.
      - adr: adr:014-workflow-sla
        section: Decision
        summary: Extended with LOB dimension so SLA targets vary by line of business rather than being
          entity-wide defaults.
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-009-lob-classification-and-sla-configuration.md
      - planning-mds/architecture/decisions/ADR-014-workflow-sla-threshold-per-lob-extension.md
  - id: entity:workflow-transition
    label: WorkflowTransition
    rationale:
      - adr: adr:011
        section: Decision
        summary: Append-only transition history ensures audit consistency and prevents ad hoc status edits
          across all CRM workflows.
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-011-crm-workflow-state-machines-and-transition-history.md
