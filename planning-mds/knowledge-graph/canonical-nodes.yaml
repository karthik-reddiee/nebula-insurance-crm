    label: VITE_OIDC_AUTHORITY
    key: VITE_OIDC_AUTHORITY
    related_nodes:
      - capability:authentication
      - ui_route:login
    source_docs:
      - planning-mds/features/archive/F0005-idp-migration/F0005-S0003-frontend-oidc-flow.md
      - planning-mds/features/archive/F0015-frontend-quality-gates-and-test-infrastructure/GETTING-STARTED.md
