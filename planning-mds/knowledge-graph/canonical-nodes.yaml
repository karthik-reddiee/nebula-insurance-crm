workflows:
  - id: workflow:account-lifecycle
    label: Account lifecycle
    rationale:
      - adr: adr:011
        section: Decision
        summary: Account lifecycle adopts the standardized state-machine + append-only transition history
          pattern used by Submission and Renewal workflows.
      - adr: adr:017
        section: Decision
        summary: Merged and Deleted are terminal tombstone states — no FK re-pointing occurs; dependent
          views consume survivorAccountId plus denormalized display/status fallbacks.
    source_docs:
      - planning-mds/api/nebula-api.yaml
      - planning-mds/architecture/decisions/ADR-011-crm-workflow-state-machines-and-transition-history.md
      - planning-mds/architecture/decisions/ADR-017-account-merge-tombstone-and-fallback-contract.md
      - planning-mds/features/archive/F0016-account-360-and-insured-management/README.md
      - planning-mds/features/archive/F0016-account-360-and-insured-management/feature-assembly-plan.md
    states:
      - id: state:account:active
        label: Active
        transitions_to:
          - state:account:inactive
          - state:account:merged
          - state:account:deleted
      - id: state:account:inactive
        label: Inactive
        transitions_to:
          - state:account:active
          - state:account:merged
          - state:account:deleted
      - id: state:account:merged
        label: Merged
      - id: state:account:deleted
        label: Deleted
  - id: workflow:document-ingest
    label: Document ingest pipeline (quarantine then promote)
    notes: 'Every uploaded binary (single, bulk, replace, template materialise) is held in <docroot>/quarantine/{upload-id}
      for a configurable hold (default 60 s; bounds 30-300 s) before an idempotent worker promotes the
      binary atomically and flips the sidecar JSON status. The MVP scanner is a timer (`MockTimerScanner`);
      real scanners satisfy the same `IQuarantineScanner` interface.

      '
    rationale:
      - adr: adr:019
        section: Decision
