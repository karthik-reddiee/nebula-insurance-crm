  - id: entity:operational-report-projection
    label: OperationalReportProjection
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-014-search-index-and-saved-view-architecture.md
      - planning-mds/features/archive/F0023-global-search-saved-views-and-operational-reporting/feature-assembly-plan.md
    rationale:
      - adr: adr:014-search
        section: "Operational Report Projection Design"
        summary: "Queryable report fact rows store source dimensions so workload and aging reports aggregate only after authorization filtering."
  - id: entity:document-template
    label: DocumentTemplate
    source_docs:
      - planning-mds/architecture/decisions/ADR-012-shared-document-storage-and-metadata-architecture.md
      - planning-mds/features/archive/F0020-document-management-and-acord-intake/F0020-S0012-document-templates-library.md
    rationale:
      - adr: adr:012
        section: "Decision §10"
        summary: "Templates are documents stored under <docroot>/templates/ with the same sidecar JSON shape; materialising a template into a parent record creates an independent document with provenance.source = template:{id}."
  - id: entity:generated-document-artifact
    label: GeneratedDocumentArtifact
    source_docs:
      - planning-mds/features/archive/F0027-coi-acord-and-outbound-document-generation/ARCHITECTURE.md
      - planning-mds/api/nebula-api.yaml
    rationale:
      - adr: adr:012
        section: "Decision §2, §8, §9, §10"
        summary: "F0027 issued artifacts are parent-linked ADR-012 documents with generated-document metadata, immutable binaries, sidecar events, and source-record timeline events; no per-feature document table is introduced."
  - id: entity:submission-quote-packet
    label: SubmissionQuotePacket
    source_docs:
      - planning-mds/features/archive/F0019-submission-quoting-proposal-and-approval/PRD.md
      - planning-mds/features/archive/F0019-submission-quoting-proposal-and-approval/F0019-S0002-submission-quote-proposal-packet-lifecycle.md
      - planning-mds/architecture/decisions/ADR-025-submission-downstream-workflow-quote-approval-bind-and-archive.md
    rationale:
      - adr: adr:025
        section: "Decision §2"
        summary: "Submission-scoped coordination record (status, linked F0020 documents, recorded reference facts validated for presence/format only) — never computed. A CRM packet, not a quoting/rating artifact."
  - id: entity:submission-approval-decision
    label: SubmissionApprovalDecision
    source_docs:
      - planning-mds/features/archive/F0019-submission-quoting-proposal-and-approval/PRD.md
      - planning-mds/features/archive/F0019-submission-quoting-proposal-and-approval/F0019-S0003-underwriting-approval-checkpoint.md
      - planning-mds/architecture/decisions/ADR-025-submission-downstream-workflow-quote-approval-bind-and-archive.md
    rationale:
      - adr: adr:025
        section: "Decision §3"
        summary: "Append-only single-approver decision (approver, reason, authority context) gating bind; shaped to extend to maker-checker / authority limits without a workflow rewrite."
  - id: entity:submission-bind-handoff
    label: SubmissionBindHandoff
    source_docs:
      - planning-mds/features/archive/F0019-submission-quoting-proposal-and-approval/PRD.md
      - planning-mds/features/archive/F0019-submission-quoting-proposal-and-approval/F0019-S0004-bind-decision-and-policy-handoff.md
      - planning-mds/architecture/decisions/ADR-025-submission-downstream-workflow-quote-approval-bind-and-archive.md
    rationale:
      - adr: adr:025
        section: "Decision §4"
        summary: "Append-only bind handoff coordination record created after approval; records handoff metadata and supports idempotent bind request/confirmation without creating policies directly."

workflows:
  - id: workflow:submission
    label: Submission lifecycle
    source_docs:
      - planning-mds/features/archive/F0006-submission-intake-workflow/README.md
      - planning-mds/architecture/feature-assembly-plan.md
      - planning-mds/architecture/decisions/ADR-011-crm-workflow-state-machines-and-transition-history.md
      - planning-mds/api/nebula-api.yaml
      - planning-mds/architecture/decisions/ADR-025-submission-downstream-workflow-quote-approval-bind-and-archive.md
    notes: >
      F0006 owns the intake half of this workflow through ReadyForUWReview.
      F0019 activates and extends the downstream quote, approval, bind, decline, and withdrawal
      path, owns the archive/deactivate lifecycle, and is bounded as CRM status/workflow only
      (recorded, never computed) — not an underwriting workbench.
    rationale:
      - adr: adr:011
        section: "Decision"
        summary: "Explicit state machine with declared transitions and append-only history prevents ad hoc status edits and enables audit-ready reporting."
      - adr: adr:025
        section: "Decision §1, §6"
        summary: "F0019 deliberately activates the downstream transitions (boundary move beyond F0006) and bounds the workflow as CRM status coordination — no rating/pricing/scoring; quote figures are recorded, never computed."
    states:
      - id: state:submission:received
        label: Received
        transitions_to: [state:submission:triaging]
      - id: state:submission:triaging
        label: Triaging
        transitions_to:
          - state:submission:waiting-on-broker
          - state:submission:ready-for-uw-review
      - id: state:submission:waiting-on-broker
        label: WaitingOnBroker
        transitions_to: [state:submission:ready-for-uw-review]
      - id: state:submission:ready-for-uw-review
        label: ReadyForUWReview
        transitions_to: [state:submission:in-review]
      - id: state:submission:in-review
        label: InReview
        transitions_to:
          - state:submission:quoted
          - state:submission:declined
      - id: state:submission:quoted
        label: Quoted
        transitions_to:
          - state:submission:bind-requested
          - state:submission:declined
          - state:submission:withdrawn
      - id: state:submission:bind-requested
        label: BindRequested
        transitions_to:
          - state:submission:bound
          - state:submission:withdrawn
      - id: state:submission:bound
        label: Bound
      - id: state:submission:declined
        label: Declined
      - id: state:submission:withdrawn
        label: Withdrawn
  - id: workflow:renewal
    label: Renewal lifecycle
    source_docs:
      - planning-mds/features/archive/F0007-renewal-pipeline/README.md
      - planning-mds/architecture/feature-assembly-plan.md
      - planning-mds/architecture/decisions/ADR-010-temporal-durable-workflow-orchestration.md
      - planning-mds/architecture/decisions/ADR-011-crm-workflow-state-machines-and-transition-history.md
      - planning-mds/api/nebula-api.yaml
    rationale:
      - adr: adr:011
        section: "F0007 Renewal Workflow Specification"
        summary: "First full application of the standardized state-machine pattern beyond submissions; six states with terminal Completed/Lost."
      - adr: adr:010
        section: "Decision"
        summary: "Temporal adopted for durable orchestration of renewal reminders and escalations that must survive deploys and restarts."
    states:
      - id: state:renewal:identified
        label: Identified
        transitions_to: [state:renewal:outreach]
      - id: state:renewal:outreach
        label: Outreach
        transitions_to: [state:renewal:in-review]
      - id: state:renewal:in-review
        label: InReview
        transitions_to:
          - state:renewal:quoted
          - state:renewal:lost
      - id: state:renewal:quoted
        label: Quoted
        transitions_to:
          - state:renewal:completed
          - state:renewal:lost
      - id: state:renewal:completed
        label: Completed
      - id: state:renewal:lost
        label: Lost
  - id: workflow:account-lifecycle
    label: Account lifecycle
    source_docs:
      - planning-mds/features/archive/F0016-account-360-and-insured-management/README.md
      - planning-mds/features/archive/F0016-account-360-and-insured-management/feature-assembly-plan.md
      - planning-mds/architecture/decisions/ADR-011-crm-workflow-state-machines-and-transition-history.md
      - planning-mds/architecture/decisions/ADR-017-account-merge-tombstone-and-fallback-contract.md
      - planning-mds/api/nebula-api.yaml
    rationale:
      - adr: adr:011
        section: "Decision"
        summary: "Account lifecycle adopts the standardized state-machine + append-only transition history pattern used by Submission and Renewal workflows."
      - adr: adr:017
        section: "Decision"
        summary: "Merged and Deleted are terminal tombstone states — no FK re-pointing occurs; dependent views consume survivorAccountId plus denormalized display/status fallbacks."
    states:
      - id: state:account:active
        label: Active
        transitions_to:
          - state:account:inactive
          - state:account:merged
          - state:account:deleted
      - id: state:account:inactive
        label: Inactive
        transitions_to:
          - state:account:active
          - state:account:merged
          - state:account:deleted
      - id: state:account:merged
        label: Merged
      - id: state:account:deleted
        label: Deleted
  - id: workflow:policy
    label: Policy lifecycle
    source_docs:
      - planning-mds/features/archive/F0018-policy-lifecycle-and-policy-360/README.md
      - planning-mds/features/archive/F0018-policy-lifecycle-and-policy-360/PRD.md
      - planning-mds/architecture/decisions/ADR-011-crm-workflow-state-machines-and-transition-history.md
      - planning-mds/architecture/decisions/ADR-018-policy-aggregate-versioning-and-reinstatement-window.md
      - planning-mds/api/nebula-api.yaml
    rationale:
      - adr: adr:011
        section: "Decision"
        summary: "Policy lifecycle adopts the standardized state-machine + append-only transition history pattern used by Submission, Renewal, and Account workflows."
      - adr: adr:018
        section: "Decision §2"
        summary: "Four canonical states (Pending/Issued/Cancelled/Expired). Cancelled→Issued is the sole non-monotonic transition and is window-gated by LOB."
    states:
      - id: state:policy:pending
        label: Pending
        transitions_to:
          - state:policy:issued
      - id: state:policy:issued
        label: Issued
        transitions_to:
          - state:policy:cancelled
          - state:policy:expired
      - id: state:policy:cancelled
        label: Cancelled
        transitions_to:
          - state:policy:issued
      - id: state:policy:expired
        label: Expired
  - id: workflow:document-ingest
    label: Document ingest pipeline (quarantine then promote)
    source_docs:
      - planning-mds/architecture/decisions/ADR-012-shared-document-storage-and-metadata-architecture.md
      - planning-mds/architecture/decisions/ADR-019-mock-quarantine-then-promote-ingest-pipeline.md
      - planning-mds/features/archive/F0020-document-management-and-acord-intake/F0020-S0003-quarantine-and-mock-scan-workflow.md
    notes: >
      Every uploaded binary (single, bulk, replace, template materialise) is held in
      <docroot>/quarantine/{upload-id} for a configurable hold (default 60 s; bounds 30-300 s)
      before an idempotent worker promotes the binary atomically and flips the sidecar JSON status.
      The MVP scanner is a timer (`MockTimerScanner`); real scanners satisfy the same `IQuarantineScanner`
      interface.
    rationale:
      - adr: adr:019
        section: "Decision"
        summary: "Structural pipeline that lets the mock scanner be replaced with a real scanner via a single interface implementation, and exposes failure modes through sidecar JSON events[]."
    states:
      - id: state:document-ingest:quarantined
        label: Quarantined
        transitions_to:
          - state:document-ingest:available
          - state:document-ingest:failed-promote
      - id: state:document-ingest:available
        label: Available
      - id: state:document-ingest:failed-promote
        label: FailedPromote

