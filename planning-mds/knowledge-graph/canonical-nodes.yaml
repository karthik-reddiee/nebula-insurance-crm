  - id: entity:lob-product
    label: LobProduct
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-020-lob-extensible-attribute-architecture.md
    rationale:
      - adr: adr:020
        section: "Decision"
        summary: "Product identity, kind, code, and line-of-business semantics are separated from individual product versions so sentinels and standard products share one registry model."
  - id: entity:lob-product-version
    label: LobProductVersion
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-020-lob-extensible-attribute-architecture.md
    rationale:
      - adr: adr:020
        section: "Decision"
