  - id: capability:neuron-companion
    label: Neuron Companion
    notes: 'In-CRM conversational companion (stateless Python/FastAPI, secondary interface). Umbrella
      capability for the F0038 epic first slice. Engine remains source of truth; Neuron calls it as the
      user (forwarded token).

      '
    rationale:
      - adr: adr:027
        section: Decision §1
        summary: A2A-aligned internal profile (not ad hoc Python delegation, not a public federation)
          avoids a migration cliff when heads/agents later move across process boundaries, while keeping
          F0038 shippable.
    source_docs:
      - planning-mds/architecture/decisions/ADR-027-neuron-companion-a2a-orchestration.md
      - planning-mds/features/archive/F0038-neuron-day-at-a-glance-shell/README.md
  - id: capability:neuron-companion-telemetry
    label: Neuron Companion Telemetry
    notes: 'Establishes the baseline needs-attention→draft-ready duration plus a minimal secondary v1
      set (DAU, %-actioned, drafts/mock-sent). Fire-and-forget to Serilog; PII-minimized (correlation
      ids + metric fields only).

      '
    source_docs:
      - planning-mds/features/archive/F0038-neuron-day-at-a-glance-shell/F0038-S0008-companion-telemetry-instrumentation.md
      - planning-mds/schemas/neuron-companion-telemetry-event.schema.json
  - id: capability:neuron-day-at-a-glance-shell
    label: Day-at-a-Glance Multi-Zone Shell
    notes: 'Multi-zone frame; assembly, not composition (no cross-zone ranking — that is the deferred
      Day-at-a-Glance brain). Renewals live, three inert stubs.

      '
    source_docs:
      - planning-mds/features/archive/F0038-neuron-day-at-a-glance-shell/F0038-S0002-day-at-a-glance-shell-and-zone-dispatch.md
      - planning-mds/features/archive/F0038-neuron-day-at-a-glance-shell/README.md
  - id: capability:neuron-message-envelope
    label: Versioned Multi-Part Message/Component Envelope
    notes: 'Versioned envelope (text|app|status|sources|actions) keyed by thread_id so persisted threads
      replay correctly. Component-registry rendering only.

      '
    rationale:
      - adr: adr:027
        section: Decision §6
        summary: A2A messages/parts/artifacts map onto the envelope part types; the frontend renders only
          registered components from validated props — Neuron never returns executable markup or model-emitted
          numbers.
    source_docs:
      - planning-mds/architecture/decisions/ADR-027-neuron-companion-a2a-orchestration.md
      - planning-mds/features/archive/F0038-neuron-day-at-a-glance-shell/F0038-S0002-day-at-a-glance-shell-and-zone-dispatch.md
      - planning-mds/schemas/neuron-message-envelope.schema.json
  - id: capability:neuron-operation-persistence
    label: Neuron-Owned Operation Persistence (neuron.* schema)
    notes: 'Neuron owns and writes its own neuron.* schema directly (threads, messages, message_parts,
      agent_runs, tool_calls, provenance_events) — not via an engine pass-through. Service stays stateless;
      threads owner-scoped.

      '
    rationale:
      - adr: adr:028
        section: Decision §1,§2
        summary: Six neuron.* tables; definitions (Agent Cards/prompts) stay checked-in assets referenced
          by id+version+hash; cross-store writes are engine-first authoritative with an idempotent Neuron
          record referencing the engine id (no cross-runtime transaction; outbox deferred).
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-028-neuron-companion-persistence-and-outreach-authorization.md
      - planning-mds/features/archive/F0038-neuron-day-at-a-glance-shell/F0038-S0001-neuron-service-bootstrap.md
  - id: capability:neuron-orchestration-runtime
    label: Neuron Orchestration Runtime (bootstrap, registries, YAML plans, A2A profile)
    notes: 'First runnable stateless runtime: specialist-head registry, tool registry, versioned YAML
      orchestration assets (schema-validated, fail-fast on unknown head/tool or missing terminal state),
      private Agent Card registry, A2A task trace. Heads live under neuron/crm_agents/.

      '
    rationale:
      - adr: adr:027
        section: Decision §3,§4,§10
        summary: Simple versioned YAML + registered Agent Cards is enough for F0038; MS Agent Framework
          is an unnecessary runtime dependency. Every referenced head/tool/terminal state must resolve
          or the asset is refused.
    source_docs:
      - planning-mds/architecture/decisions/ADR-027-neuron-companion-a2a-orchestration.md
      - planning-mds/features/archive/F0038-neuron-day-at-a-glance-shell/F0038-S0001-neuron-service-bootstrap.md
      - planning-mds/schemas/neuron-agent-card.schema.json
      - planning-mds/schemas/neuron-orchestration-plan.schema.json
  - id: capability:neuron-outreach-drafter
    label: Renewal Outreach Drafter (goal agent + persist + mock-send)
    notes: 'The one write. Proactive CTA → generate-on-click → persist InternalOnly AI-generated ActivityTimelineEvent
      → edit in-chat → mock-send (commits Identified→Outreach, fakes SMTP). Underwriter only.

      '
    rationale:
      - adr: adr:028
        section: Decision §3
        summary: Dedicated least-privilege renewal:draft_outreach gates draft+mock-send; the engine state
          machine permits Identified→Outreach for an Underwriter only on the mock-send path, leaving the
          F0007 Distribution-owned transition model intact.
    source_docs:
      - planning-mds/features/archive/F0038-neuron-day-at-a-glance-shell/F0038-S0005-renewal-outreach-draft.md
      - planning-mds/features/archive/F0038-neuron-day-at-a-glance-shell/F0038-S0006-mock-send-and-workflow-transition.md
      - planning-mds/schemas/renewal-outreach-draft-request.schema.json
      - planning-mds/schemas/renewal-outreach-mock-send-request.schema.json
  - id: capability:neuron-renewals-head
    label: Live Renewals Specialist Head
    notes: 'The one live zone in F0038. Reads renewals needing attention (Identified/ Outreach within
      90d of expiry, urgency-ordered, no-contact-30d flag) and per-renewal drill context, permission-respecting
      via the engine.

      '
    source_docs:
      - planning-mds/features/archive/F0038-neuron-day-at-a-glance-shell/F0038-S0003-live-renewals-zone-read.md
      - planning-mds/schemas/renewal-needs-attention-item.schema.json
  - id: capability:neuron-scope-guard
    label: CRM Scope Guard (out_of_scope redirect)
    notes: 'CRM-scoped assistant (intake L8), not a general chatbot. Non-CRM intents route to a polite
      CRM redirect; resistant to prompt-injection; fails safe to the bounded CRM path. Guard decisions
      recorded in the operation store.

      '
    source_docs:
      - planning-mds/architecture/decisions/ADR-027-neuron-companion-a2a-orchestration.md
      - planning-mds/features/archive/F0038-neuron-day-at-a-glance-shell/F0038-S0007-crm-scope-guard.md
  - id: capability:neuron-zone-dispatch
    label: Zone-Dispatch (multi-head extension point)
    notes: 'Orchestrator enumerates registered specialist heads and dispatches per zone; live heads return
      content, stubs return a typed inactive payload. This is the F0040 extension point ("flip a stub
      to live"). Head contract is thin and provisional — do not gold-plate (a stub agrees with anything).

      '
    source_docs:
      - planning-mds/features/archive/F0038-neuron-day-at-a-glance-shell/F0038-S0002-day-at-a-glance-shell-and-zone-dispatch.md
      - planning-mds/features/archive/F0038-neuron-day-at-a-glance-shell/F0038-S0004-stub-zones-inactive-payload.md
