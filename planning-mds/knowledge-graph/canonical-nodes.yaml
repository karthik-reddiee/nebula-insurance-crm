  - id: workflow:submission
    label: Submission lifecycle
    notes: 'F0006 owns the intake half of this workflow through ReadyForUWReview. F0019 activates and
      extends the downstream quote, approval, bind, decline, and withdrawal path, owns the archive/deactivate
      lifecycle, and is bounded as CRM status/workflow only (recorded, never computed) — not an underwriting
      workbench.

      '
    rationale:
      - adr: adr:011
        section: Decision
        summary: Explicit state machine with declared transitions and append-only history prevents ad
          hoc status edits and enables audit-ready reporting.
      - adr: adr:025
        section: Decision §1, §6
        summary: F0019 deliberately activates the downstream transitions (boundary move beyond F0006)
          and bounds the workflow as CRM status coordination — no rating/pricing/scoring; quote figures
          are recorded, never computed.
