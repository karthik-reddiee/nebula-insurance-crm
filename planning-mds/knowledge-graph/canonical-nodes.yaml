  # ── Neuron Companion (F0038) ──────────────────────────────────────────────
  - id: event:renewal-outreach-drafted
    label: RenewalOutreachDrafted
    event_type: RenewalOutreachDrafted
    source_docs:
      - planning-mds/features/F0038-neuron-day-at-a-glance-shell/F0038-S0005-renewal-outreach-draft.md
      - planning-mds/architecture/decisions/ADR-028-neuron-companion-persistence-and-outreach-authorization.md
    related_nodes:
      - entity:renewal
      - entity:activity-timeline-event
      - capability:neuron-outreach-drafter
    rationale:
      - adr: adr:028
        section: "Decision §3"
        summary: "Draft persists as an InternalOnly AI-generated renewal ActivityTimelineEvent with provenance (actor/model/prompt id+version/content hash); generation does NOT transition the renewal."
  - id: event:renewal-outreach-mock-sent
    label: RenewalOutreachMockSent
    event_type: RenewalOutreachMockSent
    source_docs:
      - planning-mds/features/F0038-neuron-day-at-a-glance-shell/F0038-S0006-mock-send-and-workflow-transition.md
      - planning-mds/architecture/decisions/ADR-028-neuron-companion-persistence-and-outreach-authorization.md
    related_nodes:
      - entity:renewal
      - entity:workflow-transition
      - entity:activity-timeline-event
      - capability:neuron-outreach-drafter
    rationale:
      - adr: adr:028
        section: "Decision §3"
        summary: "Mock-send commits the real Identified→Outreach WorkflowTransition + a 'sent (simulated)' ActivityTimelineEvent atomically, but fakes SMTP — no real email. Reuses event:renewal-transitioned for the transition itself."
  - id: event:neuron-companion-telemetry
    label: NeuronCompanionTelemetry
    event_type: NeuronCompanionTelemetry
    source_docs:
      - planning-mds/features/F0038-neuron-day-at-a-glance-shell/F0038-S0008-companion-telemetry-instrumentation.md
      - planning-mds/schemas/neuron-companion-telemetry-event.schema.json
    related_nodes:
      - capability:neuron-companion-telemetry
    rationale:
      - adr: adr:024
        section: "Decision §6"
        summary: "Reuses the F0035 SessionTelemetry fire-and-forget-to-Serilog ingest pattern; needs-attention-surfaced/draft-ready bracket the baseline metric, plus the minimal secondary set. PII boundary: correlation ids + metric fields only."

