      - planning-mds/architecture/decisions/ADR-020-lob-extensible-attribute-architecture.md
    rationale:
      - adr: adr:020
        section: "Decision"
        summary: "Renewal is a variant attribute carrier whose renewal-stage attributes are schema-pinned independently of core renewal workflow state."
  - id: entity:lob-product
    label: LobProduct
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-020-lob-extensible-attribute-architecture.md
    rationale:
      - adr: adr:020
        section: "Decision"
        summary: "Product identity, kind, code, and line-of-business semantics are separated from individual product versions so sentinels and standard products share one registry model."
  - id: entity:lob-product-version
    label: LobProductVersion
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-020-lob-extensible-attribute-architecture.md
    rationale:
      - adr: adr:020
        section: "Decision"
        summary: "Lifecycle rows pin a deterministic product version id to keep historical attributes resolvable after new schema versions activate."
  - id: entity:lob-schema-bundle
    label: LobSchemaBundle
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-020-lob-extensible-attribute-architecture.md
      - planning-mds/architecture/decisions/ADR-022-validator-equivalence-restricted-profile.md
      - planning-mds/schemas/lob-schema-bundle.schema.json
    rationale:
      - adr: adr:022
        section: "Decision"
        summary: "Resolved schema bundles are the runtime validation and dynamic-form contract; OpenAPI receives a 3.0.3 projection, not the authoritative source."
  - id: entity:lob-bundle-activation-event
    label: LobBundleActivationEvent
    source_docs:
