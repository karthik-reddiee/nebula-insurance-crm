        summary: "Append-only transition history ensures audit consistency and prevents ad hoc status edits across all CRM workflows."
  - id: entity:workflow-sla-threshold
    label: WorkflowSlaThreshold
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-009-lob-classification-and-sla-configuration.md
      - planning-mds/architecture/decisions/ADR-014-workflow-sla-threshold-per-lob-extension.md
    rationale:
      - adr: adr:009
        section: "Decision §2"
        summary: "Per-entity-type, per-status SLA thresholds enable aging band computation (on-time/approaching/overdue) for dashboard gauges."
      - adr: adr:014-workflow-sla
        section: "Decision"
        summary: "Extended with LOB dimension so SLA targets vary by line of business rather than being entity-wide defaults."
  - id: entity:search-document
    label: SearchDocument
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-014-search-index-and-saved-view-architecture.md
      - planning-mds/features/archive/F0023-global-search-saved-views-and-operational-reporting/feature-assembly-plan.md
    rationale:
      - adr: adr:014-search
        section: "Search Index Design"
        summary: "One permission-filterable search row per source record enables cross-object search without querying every transactional aggregate for each request."
    notes: SearchDocument is a read-side projection only; source modules remain authoritative for detail and access semantics.
  - id: entity:saved-view
    label: SavedView
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-014-search-index-and-saved-view-architecture.md
      - planning-mds/features/archive/F0023-global-search-saved-views-and-operational-reporting/feature-assembly-plan.md
      - planning-mds/schemas/saved-view.schema.json
    rationale:
      - adr: adr:014-search
        section: "Saved View Design"
        summary: "Saved views persist reusable criteria for personal or team scopes; applying a view always reruns current authorization and never grants access."
  - id: entity:saved-view-audit-event
    label: SavedViewAuditEvent
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-014-search-index-and-saved-view-architecture.md
      - planning-mds/features/archive/F0023-global-search-saved-views-and-operational-reporting/feature-assembly-plan.md
    rationale:
      - adr: adr:014-search
        section: "Decision"
