        section: "Decision §1"
        summary: "Carrier reference-data seed used by the Policy aggregate in MVP; a full Carrier lifecycle is a follow-up feature."
  - id: entity:renewal
    label: Renewal
    source_docs:
      - planning-mds/architecture/data-model.md
