    label: Published Operational Configuration Sets
    key: published-configuration-sets
    rationale:
      - adr: adr:016
        section: Decision
        summary: Governed publish semantics with versioning and validation prevent ad hoc runtime configuration
          and ensure audit trails for rollback.
    related_nodes:
