  - id: capability:session-continuity
    label: Session Continuity
    source_docs:
      - planning-mds/features/archive/F0035-session-continuity-and-token-refresh/PRD.md
      - planning-mds/architecture/decisions/ADR-024-session-continuity-and-token-refresh.md
    related_nodes:
      - capability:authentication
      - capability:silent-token-renewal
      - capability:idle-warning
      - capability:session-context-restore
      - capability:auth-error-classification
      - capability:session-telemetry
    rationale:
      - adr: adr:024
        section: "Decision"
        summary: "Five coordinated mechanisms (auth-error discriminator, silent renewal with coalescing, idle modal, forced-reauth context restore, telemetry) remove disruptive mid-workflow login redirects while preserving F0009 auth boundaries."
  - id: capability:silent-token-renewal
    label: Silent Token Renewal
    source_docs:
      - planning-mds/features/archive/F0035-session-continuity-and-token-refresh/F0035-S0001-silent-token-renewal.md
      - planning-mds/architecture/decisions/ADR-024-session-continuity-and-token-refresh.md
    related_nodes:
      - capability:authentication
      - capability:auth-error-classification
    rationale:
      - adr: adr:024
        section: "Decision §2"
        summary: "Coalescing semaphore guarantees exactly one in-flight refresh per expiry burst; queued requests retry once on success. Mutations are never auto-replayed; only reads."
  - id: capability:idle-warning
    label: Idle Warning Modal
    source_docs:
      - planning-mds/features/archive/F0035-session-continuity-and-token-refresh/F0035-S0002-idle-warning-modal.md
      - planning-mds/architecture/decisions/ADR-024-session-continuity-and-token-refresh.md
    rationale:
      - adr: adr:024
        section: "Decision §3"
        summary: "25 min inactivity → modal with 5:00 grace; Stay-signed-in triggers silent renewal; Sign-out uses ?reason=signed_out (not session_expired); unattended grace triggers forced re-auth with idle_timeout cause."
  - id: capability:session-context-restore
    label: Session Context Restore (Route + Form State)
    source_docs:
      - planning-mds/features/archive/F0035-session-continuity-and-token-refresh/F0035-S0003-forced-reauth-context-restore.md
      - planning-mds/architecture/decisions/ADR-024-session-continuity-and-token-refresh.md
    related_nodes:
      - capability:authentication
    rationale:
      - adr: adr:024
        section: "Decision §4"
        summary: "sessionStorage snapshot keyed by (user_id, route, form_key); 1-hour TTL; 256 KB cap; mutations require explicit user re-confirm — never auto-replayed."
  - id: capability:auth-error-classification
    label: Auth Error Classification (401-expired / 401-failed / 403-denied)
    source_docs:
      - planning-mds/features/archive/F0035-session-continuity-and-token-refresh/F0035-S0004-auth-error-semantics.md
      - planning-mds/architecture/decisions/ADR-024-session-continuity-and-token-refresh.md
    related_nodes:
      - capability:authentication
      - capability:authorization-enforcement
    rationale:
      - adr: adr:024
        section: "Decision §1"
        summary: "Backend pairs WWW-Authenticate header with ProblemDetails type URI from a closed set of auth/* and authz/* URIs. Defensive default: unknown 401 → treat as auth_token_invalid, force re-auth."
  - id: capability:session-telemetry
    label: Session Continuity Telemetry
    source_docs:
      - planning-mds/features/archive/F0035-session-continuity-and-token-refresh/F0035-S0005-session-telemetry-events.md
      - planning-mds/architecture/decisions/ADR-024-session-continuity-and-token-refresh.md
    related_nodes:
      - capability:session-continuity
    rationale:
      - adr: adr:024
        section: "Decision §5"
        summary: "9 event types emitted fire-and-forget to Serilog category Nebula.Session.Continuity. Hard PII boundary: UserId + session_id only; no email/name/IP/raw tokens/broker_tenant_id/role list/form contents."
  # ── Neuron Companion (F0038) ──────────────────────────────────────────────
  - id: capability:neuron-companion
    label: Neuron Companion
    source_docs:
      - planning-mds/features/F0038-neuron-day-at-a-glance-shell/README.md
      - planning-mds/architecture/decisions/ADR-027-neuron-companion-a2a-orchestration.md
    notes: >
      In-CRM conversational companion (stateless Python/FastAPI, secondary
      interface). Umbrella capability for the F0038 epic first slice. Engine
      remains source of truth; Neuron calls it as the user (forwarded token).
    rationale:
      - adr: adr:027
        section: "Decision §1"
        summary: "A2A-aligned internal profile (not ad hoc Python delegation, not a public federation) avoids a migration cliff when heads/agents later move across process boundaries, while keeping F0038 shippable."
  - id: capability:neuron-orchestration-runtime
    label: Neuron Orchestration Runtime (bootstrap, registries, YAML plans, A2A profile)
    source_docs:
      - planning-mds/features/F0038-neuron-day-at-a-glance-shell/F0038-S0001-neuron-service-bootstrap.md
      - planning-mds/architecture/decisions/ADR-027-neuron-companion-a2a-orchestration.md
      - planning-mds/schemas/neuron-orchestration-plan.schema.json
      - planning-mds/schemas/neuron-agent-card.schema.json
    notes: >
      First runnable stateless runtime: specialist-head registry, tool registry,
      versioned YAML orchestration assets (schema-validated, fail-fast on unknown
      head/tool or missing terminal state), private Agent Card registry, A2A task
      trace. Heads live under neuron/crm_agents/.
    rationale:
      - adr: adr:027
        section: "Decision §3,§4,§10"
        summary: "Simple versioned YAML + registered Agent Cards is enough for F0038; MS Agent Framework is an unnecessary runtime dependency. Every referenced head/tool/terminal state must resolve or the asset is refused."
  - id: capability:neuron-day-at-a-glance-shell
    label: Day-at-a-Glance Multi-Zone Shell
    source_docs:
      - planning-mds/features/F0038-neuron-day-at-a-glance-shell/F0038-S0002-day-at-a-glance-shell-and-zone-dispatch.md
      - planning-mds/features/F0038-neuron-day-at-a-glance-shell/README.md
    notes: >
      Multi-zone frame; assembly, not composition (no cross-zone ranking — that
      is the deferred Day-at-a-Glance brain). Renewals live, three inert stubs.
  - id: capability:neuron-zone-dispatch
    label: Zone-Dispatch (multi-head extension point)
    source_docs:
      - planning-mds/features/F0038-neuron-day-at-a-glance-shell/F0038-S0002-day-at-a-glance-shell-and-zone-dispatch.md
      - planning-mds/features/F0038-neuron-day-at-a-glance-shell/F0038-S0004-stub-zones-inactive-payload.md
      - planning-mds/schemas/neuron-zone-payload.schema.json
    notes: >
      Orchestrator enumerates registered specialist heads and dispatches per zone;
      live heads return content, stubs return a typed inactive payload. This is the
      F0040 extension point ("flip a stub to live"). Head contract is thin and
      provisional — do not gold-plate (a stub agrees with anything).
  - id: capability:neuron-message-envelope
    label: Versioned Multi-Part Message/Component Envelope
    source_docs:
      - planning-mds/features/F0038-neuron-day-at-a-glance-shell/F0038-S0002-day-at-a-glance-shell-and-zone-dispatch.md
      - planning-mds/schemas/neuron-message-envelope.schema.json
      - planning-mds/architecture/decisions/ADR-027-neuron-companion-a2a-orchestration.md
    notes: >
      Versioned envelope (text|app|status|sources|actions) keyed by thread_id so
      persisted threads replay correctly. Component-registry rendering only.
    rationale:
      - adr: adr:027
        section: "Decision §6"
        summary: "A2A messages/parts/artifacts map onto the envelope part types; the frontend renders only registered components from validated props — Neuron never returns executable markup or model-emitted numbers."
  - id: capability:neuron-renewals-head
    label: Live Renewals Specialist Head
    source_docs:
      - planning-mds/features/F0038-neuron-day-at-a-glance-shell/F0038-S0003-live-renewals-zone-read.md
      - planning-mds/schemas/renewal-needs-attention-item.schema.json
    notes: >
      The one live zone in F0038. Reads renewals needing attention (Identified/
      Outreach within 90d of expiry, urgency-ordered, no-contact-30d flag) and
      per-renewal drill context, permission-respecting via the engine.
  - id: capability:neuron-scope-guard
    label: CRM Scope Guard (out_of_scope redirect)
    source_docs:
      - planning-mds/features/F0038-neuron-day-at-a-glance-shell/F0038-S0007-crm-scope-guard.md
      - planning-mds/architecture/decisions/ADR-027-neuron-companion-a2a-orchestration.md
    notes: >
      CRM-scoped assistant (intake L8), not a general chatbot. Non-CRM intents
      route to a polite CRM redirect; resistant to prompt-injection; fails safe to
      the bounded CRM path. Guard decisions recorded in the operation store.
  - id: capability:neuron-outreach-drafter
    label: Renewal Outreach Drafter (goal agent + persist + mock-send)
    source_docs:
      - planning-mds/features/F0038-neuron-day-at-a-glance-shell/F0038-S0005-renewal-outreach-draft.md
      - planning-mds/features/F0038-neuron-day-at-a-glance-shell/F0038-S0006-mock-send-and-workflow-transition.md
      - planning-mds/schemas/renewal-outreach-draft-request.schema.json
      - planning-mds/schemas/renewal-outreach-mock-send-request.schema.json
    notes: >
      The one write. Proactive CTA → generate-on-click → persist InternalOnly
      AI-generated ActivityTimelineEvent → edit in-chat → mock-send (commits
      Identified→Outreach, fakes SMTP). Underwriter only.
    rationale:
      - adr: adr:028
        section: "Decision §3"
        summary: "Dedicated least-privilege renewal:draft_outreach gates draft+mock-send; the engine state machine permits Identified→Outreach for an Underwriter only on the mock-send path, leaving the F0007 Distribution-owned transition model intact."
  - id: capability:neuron-operation-persistence
    label: Neuron-Owned Operation Persistence (neuron.* schema)
    source_docs:
      - planning-mds/architecture/decisions/ADR-028-neuron-companion-persistence-and-outreach-authorization.md
      - planning-mds/architecture/data-model.md
      - planning-mds/features/F0038-neuron-day-at-a-glance-shell/F0038-S0001-neuron-service-bootstrap.md
    notes: >
      Neuron owns and writes its own neuron.* schema directly (threads, messages,
      message_parts, agent_runs, tool_calls, provenance_events) — not via an engine
      pass-through. Service stays stateless; threads owner-scoped.
    rationale:
      - adr: adr:028
        section: "Decision §1,§2"
        summary: "Six neuron.* tables; definitions (Agent Cards/prompts) stay checked-in assets referenced by id+version+hash; cross-store writes are engine-first authoritative with an idempotent Neuron record referencing the engine id (no cross-runtime transaction; outbox deferred)."
  - id: capability:neuron-companion-telemetry
    label: Neuron Companion Telemetry
    source_docs:
      - planning-mds/features/F0038-neuron-day-at-a-glance-shell/F0038-S0008-companion-telemetry-instrumentation.md
      - planning-mds/schemas/neuron-companion-telemetry-event.schema.json
    notes: >
      Establishes the baseline needs-attention→draft-ready duration plus a minimal
      secondary v1 set (DAU, %-actioned, drafts/mock-sent). Fire-and-forget to
      Serilog; PII-minimized (correlation ids + metric fields only).

