        section: "Decision"
        summary: "Submission is a variant attribute carrier: core fields remain columned while product-specific intake attributes are pinned by lob_product_version_id and stored in attributes_json."
  - id: entity:policy
    label: Policy
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/domain/glossary.md
      - planning-mds/architecture/decisions/ADR-018-policy-aggregate-versioning-and-reinstatement-window.md
      - planning-mds/architecture/decisions/ADR-020-lob-extensible-attribute-architecture.md
    rationale:
      - adr: adr:018
        section: "Decision §1"
        summary: "Policy aggregate is a mutable parent row (lifecycle state + denormalized context) plus immutable PolicyVersion snapshots and materialized PolicyCoverageLine rows; endorsements and reinstatements produce new versions rather than mutating history."
      - adr: adr:020
        section: "Decision"
        summary: "Policy is not an independent LOB attribute carrier; current product attributes are read through CurrentVersionId -> PolicyVersion."
  - id: entity:policy-version
    label: PolicyVersion
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-018-policy-aggregate-versioning-and-reinstatement-window.md
      - planning-mds/architecture/decisions/ADR-020-lob-extensible-attribute-architecture.md
    rationale:
      - adr: adr:018
        section: "Decision §1"
        summary: "Immutable term snapshot captured at issue, endorsement, or reinstatement. VersionNumber is monotonic per PolicyId and the source of truth for historical policy terms."
      - adr: adr:020
        section: "Decision"
        summary: "PolicyVersion is the authoritative policy-level LOB attribute carrier; attributes_json supplements platform snapshots rather than replacing them."
  - id: entity:policy-endorsement
    label: PolicyEndorsement
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-018-policy-aggregate-versioning-and-reinstatement-window.md
      - planning-mds/architecture/decisions/ADR-020-lob-extensible-attribute-architecture.md
    rationale:
      - adr: adr:018
        section: "Decision §1"
        summary: "Endorsement record on an Issued policy; ties 1:1 to the PolicyVersion it produced and carries reason code, effective date, and premium delta."
      - adr: adr:020
        section: "Decision"
        summary: "PolicyEndorsement carries endorsement-stage LOB attributes until the resulting PolicyVersion freezes the authoritative policy-stage attributes."
  - id: entity:policy-coverage-line
    label: PolicyCoverageLine
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-018-policy-aggregate-versioning-and-reinstatement-window.md
    rationale:
      - adr: adr:018
        section: "Decision §1"
        summary: "Materialized coverage line attached to a specific PolicyVersion. Re-materialized on every endorsement/reinstatement so that queries for current coverages do not require walking snapshot blobs."
  - id: entity:carrier-ref
    label: CarrierRef
    source_docs:
      - planning-mds/architecture/data-model.md
      - planning-mds/architecture/decisions/ADR-018-policy-aggregate-versioning-and-reinstatement-window.md
    rationale:
