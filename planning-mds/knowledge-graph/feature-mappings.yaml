    interface; the .NET engine is the CRM source of truth and authorization boundary.
  - "Neuron owns its neuron.* operation store directly (threads/messages/message_parts/agent_runs/tool_calls/provenance_events;\
    \ data-model \xA711), NOT via an engine pass-through. Cross-store writes are engine-first authoritative + idempotent Neuron\
    \ record referencing the engine id (ADR-028 \xA72)."
  - "F0038\u2194F0007 reconciliation (ADR-028 \xA73): mock-send commits the real Identified\u2192Outreach transition, but\
    \ this is Distribution-owned in F0007. Resolved by a dedicated least-privilege renewal:draft_outreach (Underwriter only)\
    \ gating draft+mock-send; the engine WorkflowStateMachine permits Identified\u2192Outreach for an Underwriter only on\
    \ the mock-send path. General renewal:transition ownership unchanged. #1 operator ratification item at G5."
  - 'code-index.yaml bindings intentionally deferred: no neuron/ implementation code exists at plan; the F0038 feature action
    binds the as-built neuron/ + engine/ paths.'
